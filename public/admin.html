<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const BASE_URL = window.location.origin;
const PLACEMENTS = ['window-left','window-right','bar','table','door','ambulance','tour-flyer','other'];
const TYPES = ['event','opportunity','enrolment','bene','menu','generic'];
const FORMATS = [
  {id:'a5-portrait',label:'A5 Portrait',w:'148mm',h:'210mm',small:false},
  {id:'a4-portrait',label:'A4 Portrait',w:'210mm',h:'297mm',small:false},
  {id:'a3-portrait',label:'A3 Portrait',w:'297mm',h:'420mm',small:false},
  {id:'third-a4',label:'1/3 A4',w:'99mm',h:'210mm',small:false},
  {id:'business-card',label:'Business Card',w:'85mm',h:'55mm',small:true},
  {id:'playing-card',label:'Playing Card',w:'63mm',h:'88mm',small:true},
  {id:'tarot-card',label:'Tarot Card',w:'70mm',h:'121mm',small:true},
  {id:'beer-mat',label:'Beer Mat',w:'95mm',h:'95mm',small:true},
  {id:'instagram-feed',label:'Instagram Feed',w:'540px',h:'540px',small:false,screen:true},
  {id:'instagram-story',label:'Instagram Story / TikTok',w:'405px',h:'720px',small:false,screen:true},
  {id:'facebook-post',label:'Facebook Post',w:'540px',h:'540px',small:false,screen:true},
  {id:'facebook-link',label:'Facebook Link',w:'600px',h:'315px',small:true,screen:true},
  {id:'x-twitter',label:'X / Twitter',w:'600px',h:'338px',small:true,screen:true},
  {id:'tablet-portrait',label:'Tablet Portrait',w:'384px',h:'512px',small:false,screen:true},
  {id:'tablet-landscape',label:'Tablet Landscape',w:'512px',h:'384px',small:true,screen:true},
  {id:'tv-landscape',label:'TV / Monitor',w:'640px',h:'360px',small:true,screen:true},
];
const CHANNELS = {
  print:{label:'Print',section:'Physical'},
  'screen-window':{label:'Screen — Window',section:'Screens'},
  'screen-pos':{label:'Screen — POS',section:'Screens'},
  'screen-wall':{label:'Screen — Wall',section:'Screens'},
  whatsapp:{label:'WhatsApp',section:'Messaging'},
  email:{label:'Email',section:'Messaging'},
  'social-instagram-feed':{label:'Instagram Feed',section:'Social'},
  'social-instagram-story':{label:'Instagram Story',section:'Social'},
  'social-facebook-post':{label:'Facebook Post',section:'Social'},
  'social-facebook-link':{label:'Facebook Link',section:'Social'},
  'social-x':{label:'X / Twitter',section:'Social'},
  'social-tiktok':{label:'TikTok',section:'Social'},
};
const CHANNEL_SECTIONS = ['Physical','Screens','Messaging','Social'];
const SCREEN_FORMATS = ['instagram-feed','instagram-story','facebook-post','facebook-link','x-twitter','tablet-portrait','tablet-landscape','tv-landscape'];
const SMALL_PHYSICAL = ['business-card','playing-card','tarot-card','beer-mat','third-a4','a5-portrait'];

const BLANK_POSTER = {
  title:'', subtitle:'', dateText:'', price:'',
  cta:'Scan to find out more', format:'a5-portrait',
  fgImage:null, fgImageUrl:null,
  bgImage:null, bgImageUrl:null,
  overlayOpacity:0.5, overlayColor:'#000000', textColor:'#111111',
};

function isScreenFormat(id){ return SCREEN_FORMATS.includes(id); }
function filenamify(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

async function supabase(path, method='GET', body=null, prefer=null) {
  const res = await fetch('/api/supabase', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({path,method,body,prefer})
  });
  return res.json();
}

async function uploadImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const base64 = e.target.result.split(',')[1];
        const res = await fetch('/api/upload', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({base64, filename:file.name, contentType:file.type})
        });
        const data = await res.json();
        if(data.url) resolve(data.url);
        else reject(new Error(data.error||'Upload failed'));
      } catch(err){ reject(err); }
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function slugify(s){
  return s.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').substring(0,40);
}

function TypeBadge({type}){
  return <span className={`badge badge-${type}`}>{type}</span>;
}

function QRWidget({url,size=120}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!url)return;
    ref.current.innerHTML='';
    new QRCode(ref.current,{text:url,width:size,height:size,colorDark:'#111',colorLight:'#fff'});
  },[url,size]);
  return <div ref={ref}/>;
}

function hasDestinationWarning(code){
  if(!code.destination_history||!code.destination_history.length) return false;
  const lastChange=new Date(code.destination_history[code.destination_history.length-1].changed_at);
  const lastAction=code.last_printed_at||code.last_distributed_at;
  if(!lastAction) return false;
  return lastChange>new Date(lastAction);
}

// ── CROP MARKS  ────────────────────────────────────────────
function CropMarks({posterW, posterH}){
  const pw = parseFloat(posterW);
  const ph = parseFloat(posterH);
  const hGap = (210 - pw) / 2;
  const vGap = (297 - ph) / 2;
  const arm = 5;
  const gap = 3;

  const marks = [
    {cls:'h', style:{top:`${vGap - gap}mm`, left:0, width:`${hGap - gap}mm`}},
    {cls:'v', style:{left:`${hGap - gap}mm`, top:0, height:`${vGap - gap}mm`}},
    {cls:'h', style:{top:`${vGap - gap}mm`, right:0, width:`${hGap - gap}mm`}},
    {cls:'v', style:{right:`${hGap - gap}mm`, top:0, height:`${vGap - gap}mm`}},
    {cls:'h', style:{bottom:`${vGap - gap}mm`, left:0, width:`${hGap - gap}mm`}},
    {cls:'v', style:{left:`${hGap - gap}mm`, bottom:0, height:`${vGap - gap}mm`}},
    {cls:'h', style:{bottom:`${vGap - gap}mm`, right:0, width:`${hGap - gap}mm`}},
    {cls:'v', style:{right:`${hGap - gap}mm`, bottom:0, height:`${vGap - gap}mm`}},
  ];

  return (
    <>
      {marks.map((m,i)=>(
        <div key={i} className={`crop-mark ${m.cls}`} style={m.style}/>
      ))}
    </>
  );
}

// ── POSTER EDITOR ─────────────────────────────────────────
function PosterEditor({code, templates, designs, onClose, onSaved}){
  const [poster,setPoster]=useState({...BLANK_POSTER,title:code?.label||''});
  const [uploading,setUploading]=useState({fg:false,bg:false});
  const [saveMode,setSaveMode]=useState(null);
  const [saveName,setSaveName]=useState('');
  const [saveStatus,setSaveStatus]=useState(null);
  const [loadTemplateId,setLoadTemplateId]=useState('');
  const [loadDesignId,setLoadDesignId]=useState('');
  const [downloading,setDownloading]=useState(false);
  const [duplex,setDuplex]=useState('none');
  const [backPoster,setBackPoster]=useState({...BLANK_POSTER});
  const [backUploading,setBackUploading]=useState({fg:false,bg:false});
  const posterRef=useRef(null);
  const backPosterRef=useRef(null);

  const fmt=FORMATS.find(f=>f.id===poster.format)||FORMATS[0];
  const codeDesigns=(designs||[]).filter(d=>d.qr_code_id===code?.id);
  const isScreen=isScreenFormat(poster.format);
  const needsCropMarks=SMALL_PHYSICAL.includes(poster.format);

function applyDesign(d){
    setPoster(p=>({
      ...p,
      title: d.title_override||p.title,
      subtitle: d.subtitle||'',
      dateText: d.date_text||'',
      price: d.price||'',
      cta: d.cta||'Scan to find out more',
      format: d.format||'a5-portrait',
      overlayOpacity: d.overlay_opacity??0.5,
      overlayColor: d.overlay_color||'#000000',
      textColor: d.text_color||'#111111',
      fgImageUrl: d.fg_image_url||null,
      bgImageUrl: d.bg_image_url||null,
      fgImage: d.fg_image_url||null,
      bgImage: d.bg_image_url||null,
    }));
    if(d.duplex) setDuplex(d.duplex);
    if(d.back_design) setBackPoster({
      title: d.back_design.title||'',
      subtitle: d.back_design.subtitle||'',
      dateText: d.back_design.date_text||'',
      price: d.back_design.price||'',
      cta: d.back_design.cta||'Scan to find out more',
      format: d.format||'a5-portrait',
      overlayOpacity: d.back_design.overlay_opacity??0.5,
      overlayColor: d.back_design.overlay_color||'#000000',
      textColor: d.back_design.text_color||'#111111',
      fgImageUrl: d.back_design.fg_image_url||null,
      bgImageUrl: d.back_design.bg_image_url||null,
      fgImage: d.back_design.fg_image_url||null,
      bgImage: d.back_design.bg_image_url||null,
    });
  }

  function handleLoadTemplate(id){
    setLoadTemplateId(id);
    const t=templates.find(t=>t.id===id);
    if(t) applyDesign(t);
  }

  function handleLoadDesign(id){
    setLoadDesignId(id);
    const d=codeDesigns.find(d=>d.id===id);
    if(d) applyDesign(d);
  }

  async function handleImageUpload(file, key){
    if(!file)return;
    setUploading(u=>({...u,[key]:true}));
    try{
      const url=await uploadImage(file);
      setPoster(p=>({...p,[key+'Image']:url,[key+'ImageUrl']:url}));
    }catch(err){
      setSaveStatus({type:'error',msg:'Image upload failed: '+err.message});
    }
    setUploading(u=>({...u,[key]:false}));
  }

  async function downloadImage(){
    if(!posterRef.current) return;
    setDownloading(true);
    try {
      const canvas = await html2canvas(posterRef.current, {
        useCORS: true,
        allowTaint: true,
        scale: 2,
        backgroundColor: poster.bgImage ? null : '#ffffff',
      });
      const link = document.createElement('a');
      const title = filenamify(poster.title || code?.label || 'poster');
      link.download = `${title}-${poster.format}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(err){
      setSaveStatus({type:'error',msg:'Download failed: '+err.message});
    }
    setDownloading(false);
  }

async function saveDesign(){
    if(!saveName){setSaveStatus({type:'error',msg:'Please enter a name.'});return;}
    const backDesignPayload = duplex==='different' ? {
      title: backPoster.title||null,
      subtitle: backPoster.subtitle||null,
      date_text: backPoster.dateText||null,
      price: backPoster.price||null,
      cta: backPoster.cta||null,
      text_color: backPoster.textColor,
      overlay_color: backPoster.overlayColor,
      overlay_opacity: backPoster.overlayOpacity,
      fg_image_url: backPoster.fgImageUrl||null,
      bg_image_url: backPoster.bgImageUrl||null,
    } : null;
    const payload={
      name:saveName, format:poster.format,
      title_override:poster.title||null,
      subtitle:poster.subtitle||null, date_text:poster.dateText||null,
      price:poster.price||null, cta:poster.cta||null,
      text_color:poster.textColor, overlay_color:poster.overlayColor,
      overlay_opacity:poster.overlayOpacity,
      fg_image_url:poster.fgImageUrl||null,
      bg_image_url:poster.bgImageUrl||null,
      duplex: duplex,
      back_design: backDesignPayload,
    };

  const posterStyle={
    width:fmt.w, height:fmt.h,
    background:poster.bgImage?'transparent':'#fff',
    color:poster.textColor,
    padding:fmt.small?'4mm':'10mm',
    display:'flex', flexDirection:'column',
    alignItems:'center',
    fontFamily:'Georgia,serif', position:'relative', overflow:'hidden',
    border: needsCropMarks ? 'none' : '1px solid #ddd',
    margin: needsCropMarks ? '0' : '1rem auto',
  };

  const PosterContent = (

      <div style={{position:'relative',zIndex:2,width:'100%',display:'flex',flexDirection:'column',alignItems:'center',gap:fmt.small?'2mm':'3mm',flex:1,minHeight:0}}>
        {!fmt.small&&<div style={{fontSize:'9pt',letterSpacing:'.2em',textTransform:'uppercase',opacity:.6,width:'100%'}}>The Artyst · Cambridge</div>}
        <div style={{width:'100%',height:'3px',background:'#c0392b'}}/>
        {poster.fgImage&&<img src={poster.fgImage} style={{width:'100%',flex:1,minHeight:0,objectFit:'contain',objectPosition:'center'}}/>}

              <label>Load Template</label>

                {codeDesigns.map(d=><option key={d.id} value={d.id}>{d.name} ({d.format})</option>)}

        {saveStatus&&<div className={saveStatus.type==='error'?'error':'success'}>{saveStatus.msg}</div>}

        <div className="form-grid">
          <div className="form-group"><label>Title</label>

          <div className="form-group"><label>Subtitle</label>
            <input value={poster.subtitle} onChange={e=>setPoster(p=>({...p,subtitle:e.target.value}))} placeholder="One line description"/>

          </div>
          <div className="form-group"><label>Call to Action</label>
            <input value={poster.cta} onChange={e=>setPoster(p=>({...p,cta:e.target.value}))}/>

            <label>Background Image</label>
            <input type="file" accept="image/*" onChange={e=>handleImageUpload(e.target.files[0],'bg')}/>

            {poster.bgImageUrl&&<span style={{fontSize:'.72rem',color:'#5aff7a',marginTop:'.2rem'}}>✓ Uploaded</span>}

            <input type="color" value={poster.textColor} onChange={e=>setPoster(p=>({...p,textColor:e.target.value}))}/>

              ? <button className="btn btn-primary" onClick={downloadImage} disabled={downloading}>{downloading?'Downloading...':'Download Image'}</button>

        {saveMode&&(

          <div className="warning-box" style={{marginTop:'1rem'}}>

          </div>

      </div>

      <div className="poster-wrap">
        {needsCropMarks ? (
          <div className="crop-wrap">
            <CropMarks posterW={fmt.w} posterH={fmt.h}/>
            {PosterContent}

          PosterContent
        )}
      </div>
    </div>
  );
}

// ── CREATE FORM ───────────────────────────────────────────
function CreateForm({destinations, onCreate}){
  const [form,setForm]=useState({label:'',type:'generic',destination_id:'',custom_url:'',placement:'',slug:''});
  const [useCustom,setUseCustom]=useState(false);
  const [status,setStatus]=useState(null);
  const [loading,setLoading]=useState(false);

  function set(k,v){
    setForm(f=>{
      const n={...f,[k]:v};
      if(k==='label'&&!f._slugEdited) n.slug=slugify(v);
      if(k==='type'){n.destination_id='';n.custom_url='';}
      return n;
    });
  }

  const filteredDests=destinations.filter(d=>d.type===form.type||d.type==='generic');
  const selectedDest=destinations.find(d=>d.id===form.destination_id);
  const finalUrl=useCustom?form.custom_url:(selectedDest?.url||'');

  async function submit(){
    if(!form.label||!form.slug){setStatus({type:'error',msg:'Label and slug are required.'});return;}
    if(!finalUrl){setStatus({type:'error',msg:'Please select a destination or enter a custom URL.'});return;}
    setLoading(true);setStatus(null);
    const res=await supabase('/rest/v1/qr_codes','POST',{
      slug:form.slug,type:form.type,label:form.label,
      destination_url:finalUrl,
      destination_id:(!useCustom&&form.destination_id)||null,
      placement:form.placement||null,
    },'return=representation');
    setLoading(false);
    if(res.error||(Array.isArray(res)&&res[0]?.code)){
      setStatus({type:'error',msg:res.message||res[0]?.message||'Error creating code.'});
    } else {
      setStatus({type:'success',msg:`Code created: ${BASE_URL}/e/${form.slug}`});
      setForm({label:'',type:'generic',destination_id:'',custom_url:'',placement:'',slug:''});
      setUseCustom(false);
      onCreate();
    }
  }

  return (
    <div className="card">
      <h2>New QR Code</h2>
      {status&&<div className={status.type==='error'?'error':'success'}>{status.msg}</div>}
      <div className="form-grid">
        <div className="form-group"><label>Label</label>
          <input value={form.label} onChange={e=>set('label',e.target.value)} placeholder="e.g. Wine Tasting April"/>
        </div>
        <div className="form-group"><label>Type</label>
          <select value={form.type} onChange={e=>set('type',e.target.value)}>
            {TYPES.map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
        {!useCustom?(
          <div className="form-group full">
            <label>Destination</label>
            <select value={form.destination_id} onChange={e=>set('destination_id',e.target.value)}>
              <option value="">— select a destination —</option>
              {filteredDests.map(d=><option key={d.id} value={d.id}>{d.label} — {d.url}</option>)}
            </select>
            <div style={{marginTop:'.4rem'}}>
              <button className="btn btn-secondary btn-small" onClick={()=>setUseCustom(true)}>Use custom URL instead</button>
            </div>
          </div>
        ):(
          <div className="form-group full">
            <label>Custom URL</label>
            <input value={form.custom_url} onChange={e=>set('custom_url',e.target.value)} placeholder="https://..."/>
            <div style={{marginTop:'.4rem'}}>
              <button className="btn btn-secondary btn-small" onClick={()=>setUseCustom(false)}>Use destination library instead</button>
            </div>
          </div>
        )}
        <div className="form-group"><label>Slug (auto-generated)</label>
          <input value={form.slug} onChange={e=>setForm(f=>({...f,slug:e.target.value,_slugEdited:true}))} placeholder="e.g. wine-tasting-april"/>
        </div>
        <div className="form-group"><label>Placement (optional)</label>
          <select value={form.placement} onChange={e=>set('placement',e.target.value)}>
            <option value="">— select —</option>
            {PLACEMENTS.map(p=><option key={p}>{p}</option>)}
          </select>
        </div>
        {form.slug&&finalUrl&&(
          <div className="form-group full" style={{flexDirection:'row',alignItems:'center',gap:'1rem'}}>
            <QRWidget url={`${BASE_URL}/e/${form.slug}`} size={72}/>
            <div>
              <div className="slug-display">{BASE_URL}/e/{form.slug}</div>
              <div style={{fontSize:'.75rem',color:'#555',marginTop:'.3rem'}}>→ {finalUrl}</div>
            </div>
          </div>
        )}
        <div className="form-group full" style={{flexDirection:'row',justifyContent:'flex-end'}}>
          <button className="btn btn-primary" onClick={submit} disabled={loading}>{loading?'Creating...':'Create Code'}</button>
        </div>
      </div>
    </div>
  );
}

// ── DESTINATIONS ──────────────────────────────────────────
function Destinations({destinations, onRefresh}){
  const [form,setForm]=useState({label:'',url:'',type:'generic',pinned:false});
  const [editing,setEditing]=useState(null);
  const [status,setStatus]=useState(null);

  async function save(){
    if(!form.label||!form.url){setStatus({type:'error',msg:'Label and URL are required.'});return;}
    if(editing){
      await supabase(`/rest/v1/destinations?id=eq.${editing}`,'PATCH',{label:form.label,url:form.url,type:form.type,pinned:form.pinned});
      setStatus({type:'success',msg:'Destination updated.'});
      setEditing(null);
    } else {
      await supabase('/rest/v1/destinations','POST',{label:form.label,url:form.url,type:form.type,pinned:form.pinned});
      setStatus({type:'success',msg:'Destination created.'});
    }
    setForm({label:'',url:'',type:'generic',pinned:false});
    onRefresh();
  }

  async function remove(id){
    await supabase(`/rest/v1/destinations?id=eq.${id}`,'DELETE');
    onRefresh();
  }

  function startEdit(d){
    setEditing(d.id);
    setForm({label:d.label,url:d.url,type:d.type,pinned:d.pinned});
  }

  const byType=TYPES.reduce((acc,t)=>{acc[t]=destinations.filter(d=>d.type===t);return acc;},{});

  return (
    <div>
      <div className="card">
        <h2>{editing?'Edit Destination':'New Destination'}</h2>
        {status&&<div className={status.type==='error'?'error':'success'}>{status.msg}</div>}
        <div className="form-grid">
          <div className="form-group"><label>Label</label>
            <input value={form.label} onChange={e=>setForm(f=>({...f,label:e.target.value}))} placeholder="e.g. Wine Tasting April — Tickets"/>
          </div>
          <div className="form-group"><label>Type</label>
            <select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
              {TYPES.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div className="form-group full"><label>URL</label>
            <input value={form.url} onChange={e=>setForm(f=>({...f,url:e.target.value}))} placeholder="https://..."/>
          </div>
          <div className="form-group full">
            <label style={{flexDirection:'row',display:'flex',alignItems:'center',gap:'.5rem',cursor:'pointer'}}>
              <input type="checkbox" checked={form.pinned} onChange={e=>setForm(f=>({...f,pinned:e.target.checked}))}/>
              Pin — never auto-update QR codes pointing here
            </label>
          </div>
          <div className="form-group full" style={{flexDirection:'row',justifyContent:'flex-end',gap:'.5rem'}}>
            {editing&&<button className="btn btn-secondary" onClick={()=>{setEditing(null);setForm({label:'',url:'',type:'generic',pinned:false});}}>Cancel</button>}
            <button className="btn btn-primary" onClick={save}>{editing?'Save Changes':'Add Destination'}</button>
          </div>
        </div>
      </div>
      {TYPES.map(type=>{
        const items=byType[type]||[];
        if(!items.length) return null;
        return (
          <div key={type} className="card">
            <h2><TypeBadge type={type}/><span style={{marginLeft:'.5rem'}}>{type} destinations</span></h2>
            {items.map(d=>(
              <div className="dest-item" key={d.id}>
                <div className="dest-info">
                  <div className="dest-label">{d.label}{d.pinned&&<span className="pin-badge">PINNED</span>}</div>
                  <div className="dest-url">{d.url}</div>
                </div>
                <div className="actions">
                  <button className="btn btn-secondary btn-small" onClick={()=>startEdit(d)}>Edit</button>
                  <button className="btn btn-secondary btn-small" onClick={()=>remove(d.id)}>Delete</button>
                </div>
              </div>
            ))}
          </div>
        );
      })}
      {!destinations.length&&<div className="empty">No destinations yet</div>}
    </div>
  );
}

// ── DISTRIBUTE ────────────────────────────────────────────
function Distribute({codes,groups,staffList,onStaffCreated,onDistributed,initialCode}){
  const [selectedCode,setSelectedCode]=useState(initialCode?.id||'');
  const [selectedChannels,setSelectedChannels]=useState([]);
  const [selectedGroups,setSelectedGroups]=useState([]);
  const [confirming,setConfirming]=useState(false);
  const [staffName,setStaffName]=useState('');
  const [staffSuggestions,setStaffSuggestions]=useState([]);
  const [note,setNote]=useState('');
  const [replyTo,setReplyTo]=useState('jobs@theartyst.co.uk');
  const [status,setStatus]=useState(null);
  const [loading,setLoading]=useState(false);

  useEffect(()=>{if(initialCode) setSelectedCode(initialCode.id);},[initialCode]);

  function toggleChannel(ch){setSelectedChannels(s=>s.includes(ch)?s.filter(c=>c!==ch):[...s,ch]);}
  function toggleGroup(id){setSelectedGroups(s=>s.includes(id)?s.filter(g=>g!==id):[...s,id]);}

  function handleStaffInput(val){
    setStaffName(val);
    if(val.length<2){setStaffSuggestions([]);return;}
    setStaffSuggestions(staffList.filter(s=>s.name.toLowerCase().includes(val.toLowerCase())));
  }

  async function confirmDistribute(){
    if(!staffName){setStatus({type:'error',msg:'Please enter your name.'});return;}
    setLoading(true);

    const code=codes.find(c=>c.id===selectedCode);
    const errors=[];

    // ── Email — call send-email endpoint ───────────────────────────────
    if(selectedChannels.includes('email')){
      try{
        const res=await fetch('/api/send-email',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            qr_code_id:  selectedCode,
            slug:         code?.slug,
            label:        code?.label,
            type:         code?.type,
            redirect_url: `${BASE_URL}/e/${code?.slug}`,
            destination_url: code?.destination_url,
            group_ids:    selectedGroups,
            staff_name:   staffName,
            note:         note||null,
            reply_to:     replyTo,
          })
        });
        const data=await res.json();
        if(!res.ok) errors.push('Email: '+(data.error||'failed'));
      }catch(e){
        errors.push('Email: network error');
      }
    }

    // ── WhatsApp — call send-whatsapp endpoint ──────────────────────────
    if(selectedChannels.includes('whatsapp')){
      try{
        const res=await fetch('/api/send-whatsapp',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            qr_code_id: selectedCode,
            slug:        code?.slug,
            label:       code?.label,
            type:        code?.type,
            redirect_url:`${BASE_URL}/e/${code?.slug}`,
            channel:     'artyst',
            staff_name:  staffName,
            note:        note||null,
          })
        });
        const data=await res.json();
        if(!res.ok) errors.push('WhatsApp: '+(data.error||'failed'));
      }catch(e){
        errors.push('WhatsApp: network error');
      }
    }

    // ── Other channels — log only (not yet wired) ───────────────────────
    const otherChannels=selectedChannels.filter(c=>c!=='whatsapp');
    if(otherChannels.length>0){
      let staffId;
      const existing=staffList.find(s=>s.name.toLowerCase()===staffName.toLowerCase());
      if(existing){staffId=existing.id;}
      else{
        const res=await supabase('/rest/v1/staff','POST',{name:staffName},'return=representation');
        staffId=Array.isArray(res)?res[0]?.id:res?.id;
        if(staffId) onStaffCreated();
      }
      await supabase('/rest/v1/distributions','POST',{
        qr_code_id:selectedCode,staff_id:staffId,
        note:note||null,channels:otherChannels,
        groups:selectedGroups,status:'sent',
      });
      await supabase(`/rest/v1/qr_codes?id=eq.${selectedCode}`,'PATCH',{last_distributed_at:new Date().toISOString()});
    }

    setLoading(false);
    if(errors.length>0){
      setStatus({type:'error',msg:errors.join(' · ')});
    } else {
      setStatus({type:'success',msg:'Sent successfully.'});
      setConfirming(false);
      setSelectedCode('');setSelectedChannels([]);setSelectedGroups([]);setNote('');setStaffName('');setReplyTo('jobs@theartyst.co.uk');
      onDistributed();
    }
  }

  const code=codes.find(c=>c.id===selectedCode);
  const needsGroups=selectedChannels.includes('email');

  return (
    <div className="card">
      <h2>Distribute</h2>
      {status&&<div className={status.type==='error'?'error':'success'}>{status.msg}</div>}
      <div className="form-group" style={{marginBottom:'1.5rem'}}>
        <label>Select Code</label>
        <select value={selectedCode} onChange={e=>setSelectedCode(e.target.value)}>
          <option value="">— select a code —</option>
          {codes.map(c=><option key={c.id} value={c.id}>{c.label} · /e/{c.slug}</option>)}
        </select>
      </div>
      {CHANNEL_SECTIONS.map(section=>(
        <div className="channel-section" key={section}>
          <h3>{section}</h3>
          <div className="channel-grid">
            {Object.entries(CHANNELS).filter(([,v])=>v.section===section).map(([id,{label}])=>(
              <div key={id} className={`channel-btn${selectedChannels.includes(id)?' selected':''}`}
                onClick={()=>toggleChannel(id)}>{label}</div>
            ))}
          </div>
        </div>
      ))}
      {needsGroups&&(
        <div className="channel-section">
          <h3>Target Groups</h3>
          {!groups.length&&<div style={{fontSize:'.82rem',color:'#555'}}>No groups yet — create them in the Groups tab</div>}
          <div className="channel-grid">
            {groups.map(g=>(
              <div key={g.id} className={`channel-btn${selectedGroups.includes(g.id)?' selected':''}`}
                onClick={()=>toggleGroup(g.id)}>{g.name}</div>
            ))}
          </div>
        </div>
      )}
      {selectedCode&&selectedChannels.length>0&&(
        <div style={{display:'flex',justifyContent:'flex-end',marginTop:'1rem'}}>
          <button className="btn btn-primary" onClick={()=>setConfirming(true)}>Review & Send</button>
        </div>
      )}
      {confirming&&(
        <div className="confirm-panel">
          <h3>Confirm Distribution</h3>
          <ul className="confirm-list">
            <li><strong>Code:</strong> {code?.label}</li>
            <li><strong>Channels:</strong> {selectedChannels.map(c=>CHANNELS[c]?.label).join(', ')}</li>
            {selectedGroups.length>0&&<li><strong>Groups:</strong> {selectedGroups.map(id=>groups.find(g=>g.id===id)?.name).join(', ')}</li>}
          </ul>
          <div className="form-grid">
            <div className="form-group">
              <label>Your Name</label>
              <input value={staffName} onChange={e=>handleStaffInput(e.target.value)} placeholder="Start typing..."/>
              {staffSuggestions.length>0&&(
                <div style={{background:'#222',border:'1px solid #333',borderRadius:'2px',marginTop:'2px'}}>
                  {staffSuggestions.map(s=>(
                    <div key={s.id} style={{padding:'.5rem .8rem',cursor:'pointer',fontSize:'.85rem'}}
                      onClick={()=>{setStaffName(s.name);setStaffSuggestions([]);}}>
                      {s.name}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="form-group">
              <label>Note (optional)</label>
              <input value={note} onChange={e=>setNote(e.target.value)} placeholder="e.g. Pre-event push"/>
            </div>
            {selectedChannels.includes('email')&&(
              <div className="form-group full">
                <label>Reply-to address</label>
                <select value={replyTo} onChange={e=>setReplyTo(e.target.value)}>
                  <option value="jobs@theartyst.co.uk">jobs@theartyst.co.uk</option>
                  <option value="hello@theartyst.co.uk">hello@theartyst.co.uk</option>
                  <option value="events@theartyst.co.uk">events@theartyst.co.uk</option>
                  <option value="matthew@othersyde.co.uk">matthew@othersyde.co.uk</option>
                  <option value="bookings@alcademy.co.uk">bookings@alcademy.co.uk</option>
                </select>
              </div>
            )}
          </div>
          <div style={{display:'flex',gap:'.5rem',justifyContent:'flex-end',marginTop:'1rem'}}>
            <button className="btn btn-secondary" onClick={()=>setConfirming(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={confirmDistribute} disabled={loading}>
              {loading?'Logging...':'Confirm & Send'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SCREENS ───────────────────────────────────────────────
function Screens({codes,zones,assignments,onRefresh}){
  async function assignCode(zoneId,codeId){
    if(!codeId)return;
    await supabase('/rest/v1/screen_assignments','POST',{zone_id:zoneId,qr_code_id:codeId,active:true});
    onRefresh();
  }
  async function removeAssignment(id){
    await supabase(`/rest/v1/screen_assignments?id=eq.${id}`,'DELETE');
    onRefresh();
  }
  return (
    <div>
      {zones.map(zone=>{
        const za=assignments.filter(a=>a.zone_id===zone.id);
        return (
          <div className="zone-card" key={zone.id}>
            <h3>
              <span>{zone.name}</span>
              <a href={`${BASE_URL}/display/${zone.slug}`} target="_blank"
                style={{fontSize:'.7rem',color:'#c0392b',textDecoration:'none',letterSpacing:'.05em'}}>
                OPEN DISPLAY ↗
              </a>
            </h3>
            <div className="zone-url">{BASE_URL}/display/{zone.slug}</div>
            {!za.length&&<div style={{color:'#444',fontSize:'.82rem',marginBottom:'.5rem'}}>Nothing assigned</div>}
            {za.map(a=>{
              const code=codes.find(c=>c.id===a.qr_code_id);
              return (
                <div className="assigned-code" key={a.id}>
                  <span>{code?.label||'Unknown'} <span className="slug-display">/e/{code?.slug}</span></span>
                  <button className="btn btn-secondary btn-small" onClick={()=>removeAssignment(a.id)}>Remove</button>
                </div>
              );
            })}
            <select defaultValue="" style={{marginTop:'.8rem',width:'100%'}} onChange={e=>assignCode(zone.id,e.target.value)}>
              <option value="">Add a code to this zone...</option>
              {codes.filter(c=>c.active).map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
          </div>
        );
      })}
    </div>
  );
}

          <div className="form-group"><label>Group Name</label>
            <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. All Subscribers"/>

            <button className="btn btn-primary" onClick={createGroup}>Create Group</button>

        </div>
      </div>

        <table>

// ── REPORTS ───────────────────────────────────────────────
function Reports({codes,scanEvents}){
  const topCodes=[...codes].sort((a,b)=>b.scan_count-a.scan_count).slice(0,8);
  const maxScans=topCodes[0]?.scan_count||1;
  const byDevice=scanEvents.reduce((acc,e)=>{acc[e.device_type]=(acc[e.device_type]||0)+1;return acc;},{});
  const totalScans=scanEvents.length||1;
  const byDay=scanEvents.reduce((acc,e)=>{
    const d=new Date(e.scanned_at).toLocaleDateString('en-GB',{weekday:'short'});
    acc[d]=(acc[d]||0)+1;return acc;
  },{});
  const byHour=scanEvents.reduce((acc,e)=>{
    const h=`${new Date(e.scanned_at).getHours()}:00`;
    acc[h]=(acc[h]||0)+1;return acc;
  },{});
  const topHours=Object.entries(byHour).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const byPlacement=codes.reduce((acc,c)=>{
    if(c.placement) acc[c.placement]=(acc[c.placement]||0)+c.scan_count;
    return acc;
  },{});
  const maxPlacement=Math.max(...Object.values(byPlacement),1);

  function Bar({value,max}){
    return <div style={{background:'#222',borderRadius:'2px',height:'8px'}}><div className="report-bar" style={{width:`${(value/max)*100}%`}}/></div>;
  }

  return (
    <div>
      <div className="two-col">
        <div className="card">
          <h2>Top Codes by Scans</h2>
          {topCodes.map(c=>(<div className="report-row" key={c.id}><div className="report-label"><span>{c.label}</span><span>{c.scan_count}</span></div><Bar value={c.scan_count} max={maxScans}/></div>))}
          {!topCodes.length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}
        </div>
        <div className="card">
          <h2>Scans by Device</h2>
          {Object.entries(byDevice).map(([type,count])=>(<div className="report-row" key={type}><div className="report-label"><span style={{textTransform:'capitalize'}}>{type}</span><span>{Math.round((count/totalScans)*100)}%</span></div><Bar value={count} max={totalScans}/></div>))}
          {!Object.keys(byDevice).length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}
        </div>
      </div>
      <div className="two-col">
        <div className="card">
          <h2>Scans by Placement</h2>
          {Object.entries(byPlacement).sort((a,b)=>b[1]-a[1]).map(([p,count])=>(<div className="report-row" key={p}><div className="report-label"><span>{p}</span><span>{count}</span></div><Bar value={count} max={maxPlacement}/></div>))}
          {!Object.keys(byPlacement).length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}
        </div>
        <div className="card">
          <h2>Peak Scan Hours</h2>
          {topHours.map(([h,count])=>(<div className="report-row" key={h}><div className="report-label"><span>{h}</span><span>{count}</span></div><Bar value={count} max={topHours[0]?.[1]||1}/></div>))}
          {!topHours.length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}
        </div>
      </div>
      <div className="card">
        <h2>Scans by Day of Week</h2>
        <div style={{display:'flex',gap:'1rem',alignItems:'flex-end',height:'80px',marginTop:'.5rem'}}>
          {['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>{
            const count=byDay[d]||0;
            const max=Math.max(...Object.values(byDay),1);
            return (<div key={d} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}}><div style={{width:'100%',background:'#c0392b',height:`${(count/max)*60}px`,borderRadius:'2px',minHeight:count?'4px':'0'}}/><span style={{fontSize:'.7rem',color:'#555'}}>{d}</span></div>);
          })}
        </div>
        {!Object.keys(byDay).length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}
      </div>
    </div>
  );
}

// ── APPLICATIONS ──────────────────────────────────────────
function Applications({applications, onRefresh}){
  const [filterStatus,setFilterStatus]=useState('all');
  const [filterSlug,setFilterSlug]=useState('all');
  const [updating,setUpdating]=useState(null);
  const [expanded,setExpanded]=useState(null);

  const STATUSES=['new','reviewed','shortlisted','rejected'];
  const STATUS_BG={new:'#1a3a5c',reviewed:'#2a2a1a',shortlisted:'#1a3a1a',rejected:'#3a1a1a'};
  const STATUS_FG={new:'#5aafff',reviewed:'#ffee5a',shortlisted:'#5aff7a',rejected:'#ff5a5a'};

  async function updateStatus(id,status){
    setUpdating(id);
    await supabase('/rest/v1/applications?id=eq.'+id,'PATCH',{status});
    await onRefresh();
    setUpdating(null);
  }

  const slugs=[...new Set(applications.map(a=>a.opportunity_slug))];
  const filtered=applications.filter(a=>{
    if(filterStatus!=='all'&&a.status!==filterStatus) return false;
    if(filterSlug!=='all'&&a.opportunity_slug!==filterSlug) return false;
    return true;
  });
  const newCount=applications.filter(a=>a.status==='new').length;
  const bySlug=slugs.reduce((acc,s)=>{acc[s]=applications.filter(a=>a.opportunity_slug===s).length;return acc;},{});

  return (
    <div>
      <div className="stats-grid" style={{marginBottom:'1.5rem'}}>
        <div className="stat"><div className="number">{applications.length}</div><div className="label">Total Applications</div></div>
        <div className="stat" style={newCount?{borderColor:'#2a5a7c'}:{}}><div className="number" style={newCount?{color:'#5aafff'}:{}}>{newCount}</div><div className="label">Unreviewed</div></div>
        <div className="stat"><div className="number">{applications.filter(a=>a.status==='shortlisted').length}</div><div className="label">Shortlisted</div></div>
        <div className="stat"><div className="number">{slugs.length}</div><div className="label">Open Roles</div></div>
      </div>
      <div className="card">
        <div style={{display:'flex',gap:'1rem',marginBottom:'1.2rem',flexWrap:'wrap'}}>
          <div className="form-group" style={{flex:1,minWidth:'160px'}}>
            <label>Filter by Role</label>
            <select value={filterSlug} onChange={e=>setFilterSlug(e.target.value)}>
              <option value="all">All roles ({applications.length})</option>
              {slugs.map(s=><option key={s} value={s}>{s} ({bySlug[s]})</option>)}
            </select>
          </div>
          <div className="form-group" style={{flex:1,minWidth:'160px'}}>
            <label>Filter by Status</label>
            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
              <option value="all">All statuses</option>
              {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        </div>
        {!filtered.length&&<div className="empty" style={{padding:'2rem'}}>No applications match these filters</div>}
        {filtered.map(a=>(
          <div key={a.id} style={{background:'#111',border:'1px solid #2a2a2a',borderRadius:'2px',marginBottom:'.6rem',overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'.8rem 1rem',cursor:'pointer'}}
              onClick={()=>setExpanded(expanded===a.id?null:a.id)}>
              <div style={{display:'flex',gap:'1rem',alignItems:'center',flex:1,minWidth:0}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:'bold',fontSize:'.92rem'}}>{a.name}</div>
                  <div style={{fontSize:'.78rem',color:'#555',marginTop:'.1rem'}}>{a.opportunity_slug} &middot; {new Date(a.submitted_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
                </div>
                <span className="badge" style={{background:STATUS_BG[a.status],color:STATUS_FG[a.status],flexShrink:0}}>{a.status}</span>
              </div>
              <span style={{color:'#444',fontSize:'.8rem',marginLeft:'1rem'}}>{expanded===a.id?'▲':'▼'}</span>
            </div>
            {expanded===a.id&&(
              <div style={{borderTop:'1px solid #1e1e1e',padding:'1rem'}}>
                <div className="form-grid" style={{marginBottom:'1rem'}}>
                  <div>
                    <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',color:'#555',marginBottom:'.3rem'}}>Email</div>
                    <a href={'mailto:'+a.email} style={{color:'#5aafff',fontSize:'.88rem'}}>{a.email}</a>
                  </div>
                  {a.phone&&<div>
                    <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',color:'#555',marginBottom:'.3rem'}}>Phone</div>
                    <div style={{fontSize:'.88rem'}}>{a.phone}</div>
                  </div>}
                  {a.cv_url&&<div>
                    <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',color:'#555',marginBottom:'.3rem'}}>CV</div>
                    <a href={a.cv_url} target="_blank" style={{color:'#5aff7a',fontSize:'.88rem'}}>Download CV ↗</a>
                  </div>}
                </div>
                {a.message&&<div style={{marginBottom:'1rem'}}>
                  <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',color:'#555',marginBottom:'.5rem'}}>Message</div>
                  <div style={{background:'#1a1a1a',border:'1px solid #2a2a2a',borderRadius:'2px',padding:'.8rem 1rem',fontSize:'.88rem',color:'#aaa',lineHeight:1.6,fontStyle:'italic',whiteSpace:'pre-wrap'}}>{a.message}</div>
                </div>}
                <div>
                  <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',color:'#555',marginBottom:'.5rem'}}>Update Status</div>
                  <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap'}}>
                    {STATUSES.map(s=>(
                      <button key={s} className="btn btn-small"
                        style={{background:a.status===s?STATUS_BG[s]:'#1a1a1a',color:a.status===s?STATUS_FG[s]:'#555',border:'1px solid '+(a.status===s?STATUS_BG[s]:'#2a2a2a'),opacity:updating===a.id?0.5:1}}
                        disabled={updating===a.id||a.status===s}
                        onClick={()=>updateStatus(a.id,s)}>{s}</button>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState('library');
  const [codes,setCodes]=useState([]);
  const [destinations,setDestinations]=useState([]);
  const [groups,setGroups]=useState([]);
  const [staffList,setStaffList]=useState([]);
  const [distributions,setDistributions]=useState([]);
  const [zones,setZones]=useState([]);
  const [assignments,setAssignments]=useState([]);
  const [scanEvents,setScanEvents]=useState([]);
  const [templates,setTemplates]=useState([]);
  const [designs,setDesigns]=useState([]);
  const [applications,setApplications]=useState([]);
  const [printQueue,setPrintQueue]=useState([]);
  const [distributeCode,setDistributeCode]=useState(null);
  const [loading,setLoading]=useState(true);

  async function loadAll(){
    setLoading(true);
    const [c,dest,g,s,d,z,a,se,tmpl,dsgn,apps]=await Promise.all([
      supabase('/rest/v1/qr_codes?order=created_at.desc'),
      supabase('/rest/v1/destinations?order=type.asc,label.asc'),
      supabase('/rest/v1/distribution_groups?order=name.asc'),
      supabase('/rest/v1/staff?order=name.asc'),
      supabase('/rest/v1/distributions?order=created_at.desc&limit=100'),
      supabase('/rest/v1/screen_zones?order=name.asc'),
      supabase('/rest/v1/screen_assignments?order=display_order.asc'),
      supabase('/rest/v1/scan_events?order=scanned_at.desc&limit=500'),
      supabase('/rest/v1/poster_templates?order=name.asc'),
      supabase('/rest/v1/poster_designs?order=name.asc'),
      supabase('/rest/v1/applications?order=submitted_at.desc&limit=200'),
    ]);
    setCodes(Array.isArray(c)?c:[]);
    setDestinations(Array.isArray(dest)?dest:[]);
    setGroups(Array.isArray(g)?g:[]);
    setStaffList(Array.isArray(s)?s:[]);
    setDistributions(Array.isArray(d)?d:[]);
    setZones(Array.isArray(z)?z:[]);
    setAssignments(Array.isArray(a)?a:[]);
    setScanEvents(Array.isArray(se)?se:[]);
    setTemplates(Array.isArray(tmpl)?tmpl:[]);
    setDesigns(Array.isArray(dsgn)?dsgn:[]);
    setApplications(Array.isArray(apps)?apps:[]);
    setLoading(false);
  }

  useEffect(()=>{loadAll();},[]);

  function addToPrintQueue(code){
    if(!printQueue.find(c=>c.id===code.id)) setPrintQueue(q=>[...q,code]);
    setTab('print');
  }

  function handleDistribute(code){
    setDistributeCode(code);
    setTab('distribute');
  }

  const totalScans=codes.reduce((s,c)=>s+c.scan_count,0);
  const activeCodes=codes.filter(c=>c.active).length;
  const warnings=codes.filter(hasDestinationWarning).length;
  const newApplications=applications.filter(a=>a.status==='new').length;

  const TABS=[
    ['library',`Library (${codes.length})`],
    ['create','New Code'],
    ['print',`Print Queue${printQueue.length?` (${printQueue.length})`:''}`],
    ['distribute','Distribute'],
    ['screens','Screens'],
    ['groups','Groups'],
    ['destinations','Destinations'],
    ['templates',`Templates (${templates.length+designs.length})`],
    ['history','History'],
    ['reports','Reports'],
    ['applications', newApplications ? 'Applications (' + newApplications + ' new)' : 'Applications'],
  ];

  return (
    <div className="app">
      <header>
        <h1>QR Engine — The Artyst</h1>
        <span>CA-022</span>
      </header>
      <div className="stats-grid no-print">
        <div className="stat"><div className="number">{codes.length}</div><div className="label">Total Codes</div></div>
        <div className="stat"><div className="number">{activeCodes}</div><div className="label">Active</div></div>
        <div className="stat"><div className="number">{totalScans}</div><div className="label">Total Scans</div></div>
        <div className="stat" style={warnings?{borderColor:'#5a3a1a'}:{}}>
          <div className="number" style={warnings?{color:'#ffaa5a'}:{}}>{warnings}</div>
          <div className="label">Destination Warnings</div>
        </div>
      </div>
      <div className="tabs no-print">
        {TABS.map(([id,label])=>(
          <button key={id} className={`tab ${tab===id?'active':''}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>
      {loading&&<div className="empty">Loading...</div>}
      {!loading&&<>
        {tab==='library'&&<Library codes={codes} destinations={destinations} onRefresh={loadAll} onAddToPrintQueue={addToPrintQueue} onDistribute={handleDistribute}/>}
        {tab==='create'&&<CreateForm destinations={destinations} onCreate={()=>{loadAll();setTab('library');}}/>}
        {tab==='print'&&<PrintQueue queue={printQueue} templates={templates} designs={designs} onRemove={id=>setPrintQueue(q=>q.filter(c=>c.id!==id))} onClear={()=>setPrintQueue([])} onSaved={loadAll}/>}
        {tab==='distribute'&&<Distribute codes={codes} groups={groups} staffList={staffList} onStaffCreated={loadAll} onDistributed={loadAll} initialCode={distributeCode}/>}
        {tab==='screens'&&<Screens codes={codes} zones={zones} assignments={assignments} onRefresh={loadAll}/>}
        {tab==='groups'&&<Groups groups={groups} onRefresh={loadAll}/>}
        {tab==='destinations'&&<Destinations destinations={destinations} onRefresh={loadAll}/>}
        {tab==='templates'&&<Templates templates={templates} designs={designs} codes={codes} onRefresh={loadAll}/>}
        {tab==='history'&&<History distributions={distributions} codes={codes} groups={groups} staff={staffList}/>}
        {tab==='reports'&&<Reports codes={codes} scanEvents={scanEvents}/>}
        {tab==='applications'&&<Applications applications={applications} onRefresh={loadAll}/>}
      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
