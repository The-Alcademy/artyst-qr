<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Engine — The Artyst</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#111;color:#eee;min-height:100vh}
    .app{max-width:1200px;margin:0 auto;padding:2rem}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;border-bottom:1px solid #333;padding-bottom:1rem}
    header h1{font-size:1.2rem;letter-spacing:.1em;text-transform:uppercase;color:#fff}
    header span{font-size:.75rem;color:#666}
    .tabs{display:flex;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap}
    .tab{padding:.5rem 1.2rem;border:1px solid #333;background:none;color:#888;cursor:pointer;font-size:.85rem;letter-spacing:.05em;text-transform:uppercase;border-radius:2px;transition:all .15s}
    .tab.active{background:#c0392b;border-color:#c0392b;color:#fff}
    .tab:hover:not(.active){border-color:#555;color:#ccc}
    .card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;padding:1.5rem;margin-bottom:1rem}
    .card h2{font-size:.9rem;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:1.2rem}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .form-group{display:flex;flex-direction:column;gap:.4rem}
    .form-group.full{grid-column:1/-1}
    label{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:#666}
    input,select,textarea{background:#111;border:1px solid #333;color:#eee;padding:.6rem .8rem;font-size:.9rem;border-radius:2px;width:100%;outline:none;transition:border-color .15s}
    input:focus,select:focus,textarea:focus{border-color:#c0392b}
    input[type=range]{padding:0;height:24px}
    input[type=file]{padding:.4rem;font-size:.8rem}
    select option{background:#1a1a1a}
    .btn{padding:.6rem 1.4rem;border:none;cursor:pointer;font-size:.85rem;letter-spacing:.05em;text-transform:uppercase;border-radius:2px;transition:all .15s}
    .btn-primary{background:#c0392b;color:#fff}
    .btn-primary:hover{background:#e74c3c}
    .btn-secondary{background:#2a2a2a;color:#aaa;border:1px solid #333}
    .btn-secondary:hover{background:#333;color:#eee}
    .btn-green{background:#1a5c1a;color:#5aff7a;border:1px solid #2a7a2a}
    .btn-green:hover{background:#2a7a2a}
    .btn-small{padding:.35rem .8rem;font-size:.75rem}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    th{text-align:left;padding:.6rem .8rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#555;border-bottom:1px solid #2a2a2a}
    td{padding:.7rem .8rem;border-bottom:1px solid #1e1e1e;vertical-align:middle}
    tr:hover td{background:#1e1e1e}
    .badge{display:inline-block;padding:.2rem .6rem;border-radius:2px;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em}
    .badge-event{background:#1a3a5c;color:#5aafff}
    .badge-opportunity{background:#1a3a1a;color:#5aff7a}
    .badge-enrolment{background:#3a1a5c;color:#c07aff}
    .badge-bene{background:#3a2a1a;color:#ffaa5a}
    .badge-menu{background:#2a2a1a;color:#ffee5a}
    .badge-generic{background:#2a2a2a;color:#aaa}
    .badge-active{background:#1a3a1a;color:#5aff7a}
    .badge-inactive{background:#3a1a1a;color:#ff5a5a}
    .badge-sent{background:#1a3a5c;color:#5aafff}
    .badge-failed{background:#3a1a1a;color:#ff5a5a}
    .scan-count{font-size:1.1rem;font-weight:bold;color:#fff}
    .slug-display{font-family:monospace;color:#888;font-size:.8rem}
    .actions{display:flex;gap:.4rem;flex-wrap:wrap}
    .empty{text-align:center;padding:3rem;color:#444;font-size:.85rem;text-transform:uppercase;letter-spacing:.1em}
    .success{background:#1a3a1a;border:1px solid #2a5a2a;color:#5aff7a;padding:.8rem 1rem;border-radius:2px;font-size:.85rem;margin-bottom:1rem}
    .error{background:#3a1a1a;border:1px solid #5a2a2a;color:#ff7a7a;padding:.8rem 1rem;border-radius:2px;font-size:.85rem;margin-bottom:1rem}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
    .stat{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;padding:1.2rem;text-align:center}
    .stat .number{font-size:2rem;font-weight:bold;color:#fff}
    .stat .label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:#555;margin-top:.3rem}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
    .channel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1rem}
    .channel-btn{padding:.6rem;border:1px solid #333;background:#111;color:#888;cursor:pointer;font-size:.75rem;letter-spacing:.05em;text-transform:uppercase;border-radius:2px;text-align:center;transition:all .15s;user-select:none}
    .channel-btn.selected{border-color:#c0392b;background:#2a1a1a;color:#ff7a7a}
    .channel-btn:hover:not(.selected){border-color:#555;color:#ccc}
    .channel-section{margin-bottom:1.5rem}
    .channel-section h3{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:#555;margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid #222}
    .confirm-panel{background:#1a1a1a;border:1px solid #c0392b;border-radius:4px;padding:1.5rem;margin-top:1rem}
    .confirm-panel h3{color:#c0392b;font-size:.9rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
    .confirm-list{list-style:none;margin-bottom:1rem}
    .confirm-list li{padding:.3rem 0;font-size:.85rem;color:#aaa;border-bottom:1px solid #222}
    .confirm-list li:last-child{border:none}
    .history-row{font-size:.82rem}
    .note-text{color:#888;font-style:italic;font-size:.8rem}
    .group-tag{display:inline-block;background:#2a2a2a;border:1px solid #333;color:#aaa;padding:.1rem .5rem;border-radius:2px;font-size:.7rem;margin:.1rem}
    .zone-card{background:#111;border:1px solid #2a2a2a;border-radius:4px;padding:1rem;margin-bottom:1rem}
    .zone-card h3{font-size:.85rem;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:.8rem;display:flex;justify-content:space-between;align-items:center}
    .zone-card .zone-url{font-family:monospace;font-size:.75rem;color:#555;margin-bottom:.8rem}
    .assigned-code{display:flex;justify-content:space-between;align-items:center;padding:.5rem;background:#1a1a1a;border:1px solid #222;border-radius:2px;margin-bottom:.3rem;font-size:.82rem}
    .report-bar{height:8px;border-radius:2px;background:#c0392b;transition:width .5s}
    .report-row{margin-bottom:.8rem}
    .report-label{font-size:.8rem;color:#888;margin-bottom:.3rem;display:flex;justify-content:space-between}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100}
    .modal{background:#1a1a1a;border:1px solid #333;border-radius:4px;padding:2rem;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
    .modal h2{font-size:1rem;text-transform:uppercase;letter-spacing:.08em;color:#fff;margin-bottom:1.5rem}
    .checkbox-row{display:flex;align-items:center;gap:.6rem;padding:.4rem 0;cursor:pointer;font-size:.85rem}
    .checkbox-row input{width:auto}
    .poster-preview{width:148mm;min-height:210mm;background:#fff;color:#111;padding:10mm;display:flex;flex-direction:column;align-items:center;justify-content:space-between;border:1px solid #ddd;margin:1rem auto;font-family:Georgia,serif;position:relative;overflow:hidden}
    .poster-preview .bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
    .poster-preview .overlay{position:absolute;inset:0;z-index:1}
    .poster-preview .content{position:relative;z-index:2;width:100%;display:flex;flex-direction:column;align-items:center;gap:4mm}
    .poster-venue{font-size:8pt;letter-spacing:.2em;text-transform:uppercase}
    .poster-accent{width:100%;height:3px;background:#c0392b}
    .poster-title{font-size:20pt;font-weight:bold;text-align:center;line-height:1.2}
    .poster-desc{font-size:9pt;text-align:center;line-height:1.5}
    .poster-meta{font-size:9pt;text-align:center}
    .poster-price{font-size:12pt;font-weight:bold;text-align:center}
    .poster-cta{font-size:7pt;letter-spacing:.15em;text-transform:uppercase;text-align:center}
    .poster-slug{font-size:6pt;text-align:center;margin-top:2mm;font-family:monospace}
    @media print{
      body{background:#fff}
      .no-print{display:none!important}
      .poster-preview{page-break-after:always;border:none}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const BASE_URL = window.location.origin;
const PLACEMENTS = ['window-left','window-right','bar','table','door','ambulance','tour-flyer','other'];
const TYPES = ['event','opportunity','enrolment','bene','menu','generic'];
const FORMATS = [
  {id:'a5-portrait',label:'A5 Portrait',w:'148mm',h:'210mm',px:[560,794]},
  {id:'a4-portrait',label:'A4 Portrait',w:'210mm',h:'297mm',px:[794,1123]},
  {id:'a3-portrait',label:'A3 Portrait',w:'297mm',h:'420mm',px:[1123,1587]},
  {id:'third-a4',label:'1/3 A4',w:'99mm',h:'210mm',px:[374,794]},
  {id:'business-card',label:'Business Card',w:'85mm',h:'55mm',px:[321,208]},
  {id:'playing-card',label:'Playing Card',w:'63mm',h:'88mm',px:[238,333]},
  {id:'tarot-card',label:'Tarot Card',w:'70mm',h:'121mm',px:[264,457]},
  {id:'beer-mat',label:'Beer Mat',w:'95mm',h:'95mm',px:[359,359]},
  {id:'instagram-feed',label:'Instagram Feed',w:'1080px',h:'1080px',px:[1080,1080],screen:true},
  {id:'instagram-story',label:'Instagram Story / TikTok',w:'1080px',h:'1920px',px:[1080,1920],screen:true},
  {id:'facebook-post',label:'Facebook Post',w:'1080px',h:'1080px',px:[1080,1080],screen:true},
  {id:'facebook-link',label:'Facebook Link',w:'1200px',h:'630px',px:[1200,630],screen:true},
  {id:'x-twitter',label:'X / Twitter',w:'1600px',h:'900px',px:[1600,900],screen:true},
  {id:'tablet-portrait',label:'Tablet Portrait',w:'768px',h:'1024px',px:[768,1024],screen:true},
  {id:'tablet-landscape',label:'Tablet Landscape',w:'1024px',h:'768px',px:[1024,768],screen:true},
  {id:'tv-landscape',label:'TV / Monitor',w:'1920px',h:'1080px',px:[1920,1080],screen:true},
];
const CHANNELS = {
  print: { label:'Print', section:'Physical' },
  'screen-window': { label:'Screen — Window', section:'Screens' },
  'screen-pos': { label:'Screen — POS', section:'Screens' },
  'screen-wall': { label:'Screen — Wall', section:'Screens' },
  whatsapp: { label:'WhatsApp', section:'Messaging' },
  email: { label:'Email', section:'Messaging' },
  'social-instagram-feed': { label:'Instagram Feed', section:'Social' },
  'social-instagram-story': { label:'Instagram Story', section:'Social' },
  'social-facebook-post': { label:'Facebook Post', section:'Social' },
  'social-facebook-link': { label:'Facebook Link', section:'Social' },
  'social-x': { label:'X / Twitter', section:'Social' },
  'social-tiktok': { label:'TikTok', section:'Social' },
};
const CHANNEL_SECTIONS = ['Physical','Screens','Messaging','Social'];

async function supabase(path, method='GET', body=null, prefer=null) {
  const res = await fetch('/api/supabase', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({path,method,body,prefer})
  });
  return res.json();
}

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').substring(0,40);
}

function TypeBadge({type}) {
  return <span className={`badge badge-${type}`}>{type}</span>;
}

function QRWidget({url, size=120}) {
  const ref = useRef(null);
  useEffect(()=>{
    if(!ref.current||!url) return;
    ref.current.innerHTML='';
    new QRCode(ref.current,{text:url,width:size,height:size,colorDark:'#111',colorLight:'#fff'});
  },[url,size]);
  return <div ref={ref}/>;
}

// ── LIBRARY ──────────────────────────────────────────────
function Library({codes, onRefresh, onAddToPrintQueue, onDistribute}) {
  async function toggleActive(code) {
    await supabase(`/rest/v1/qr_codes?id=eq.${code.id}`,'PATCH',{active:!code.active});
    onRefresh();
  }
  if(!codes.length) return <div className="empty">No QR codes yet</div>;
  return (
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      <table>
        <thead><tr>
          <th>Label</th><th>Type</th><th>Slug</th>
          <th>Scans</th><th>Placement</th><th>Status</th><th>Actions</th>
        </tr></thead>
        <tbody>
          {codes.map(c=>(
            <tr key={c.id}>
              <td><strong>{c.label}</strong></td>
              <td><TypeBadge type={c.type}/></td>
              <td><span className="slug-display">/e/{c.slug}</span></td>
              <td><span className="scan-count">{c.scan_count}</span></td>
              <td><span style={{color:'#666',fontSize:'.8rem'}}>{c.placement||'—'}</span></td>
              <td><span className={`badge badge-${c.active?'active':'inactive'}`}>{c.active?'active':'inactive'}</span></td>
              <td>
                <div className="actions">
                  <button className="btn btn-secondary btn-small" onClick={()=>onAddToPrintQueue(c)}>Poster</button>
                  <button className="btn btn-green btn-small" onClick={()=>onDistribute(c)}>Distribute</button>
                  <button className="btn btn-secondary btn-small" onClick={()=>toggleActive(c)}>{c.active?'Deactivate':'Activate'}</button>
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── CREATE FORM ───────────────────────────────────────────
function CreateForm({onCreate}) {
  const [form,setForm] = useState({label:'',type:'generic',destination_url:'',placement:'',slug:''});
  const [status,setStatus] = useState(null);
  const [loading,setLoading] = useState(false);

  function set(k,v) {
    setForm(f=>{
      const n={...f,[k]:v};
      if(k==='label'&&!f._slugEdited) n.slug=slugify(v);
      return n;
    });
  }

  async function submit() {
    if(!form.label||!form.destination_url||!form.slug){
      setStatus({type:'error',msg:'Label, slug and destination URL are required.'});
      return;
    }
    setLoading(true); setStatus(null);
    const res = await supabase('/rest/v1/qr_codes','POST',
      {slug:form.slug,type:form.type,label:form.label,destination_url:form.destination_url,placement:form.placement||null},
      'return=representation'
    );
    setLoading(false);
    if(res.error||(Array.isArray(res)&&res[0]?.code)){
      setStatus({type:'error',msg:res.message||res[0]?.message||'Error creating code.'});
    } else {
      setStatus({type:'success',msg:`Code created: ${BASE_URL}/e/${form.slug}`});
      setForm({label:'',type:'generic',destination_url:'',placement:'',slug:''});
      onCreate();
    }
  }

  return (
    <div className="card">
      <h2>New QR Code</h2>
      {status&&<div className={status.type==='error'?'error':'success'}>{status.msg}</div>}
      <div className="form-grid">
        <div className="form-group"><label>Label</label>
          <input value={form.label} onChange={e=>set('label',e.target.value)} placeholder="e.g. Wine Tasting April"/>
        </div>
        <div className="form-group"><label>Type</label>
          <select value={form.type} onChange={e=>set('type',e.target.value)}>
            {TYPES.map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
        <div className="form-group full"><label>Destination URL</label>
          <input value={form.destination_url} onChange={e=>set('destination_url',e.target.value)} placeholder="https://..."/>
        </div>
        <div className="form-group"><label>Slug (auto-generated)</label>
          <input value={form.slug} onChange={e=>setForm(f=>({...f,slug:e.target.value,_slugEdited:true}))} placeholder="e.g. wine-tasting-april"/>
        </div>
        <div className="form-group"><label>Placement (optional)</label>
          <select value={form.placement} onChange={e=>set('placement',e.target.value)}>
            <option value="">— select —</option>
            {PLACEMENTS.map(p=><option key={p}>{p}</option>)}
          </select>
        </div>
        {form.slug&&(
          <div className="form-group full" style={{flexDirection:'row',alignItems:'center',gap:'1rem'}}>
            <QRWidget url={`${BASE_URL}/e/${form.slug}`} size={72}/>
            <span className="slug-display">{BASE_URL}/e/{form.slug}</span>
          </div>
        )}
        <div className="form-group full" style={{flexDirection:'row',justifyContent:'flex-end'}}>
          <button className="btn btn-primary" onClick={submit} disabled={loading}>{loading?'Creating...':'Create Code'}</button>
        </div>
      </div>
    </div>
  );
}

// ── POSTER EDITOR ─────────────────────────────────────────
function PosterEditor({code, onClose}) {
  const [poster,setPoster] = useState({
    title: code?.label||'',
    subtitle: '',
    dateText: '',
    price: '',
    cta: 'Scan to find out more',
    format: 'a5-portrait',
    fgImage: null,
    bgImage: null,
    overlayOpacity: 0.5,
    overlayColor: '#000000',
    textColor: '#111111',
  });

  const fmt = FORMATS.find(f=>f.id===poster.format)||FORMATS[0];
  const isSmall = ['business-card','playing-card','tarot-card','beer-mat'].includes(poster.format);

  function loadImage(file, key) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => setPoster(p=>({...p,[key]:e.target.result}));
    reader.readAsDataURL(file);
  }

  function printPoster() { window.print(); }

  const posterStyle = {
    width: fmt.w, minHeight: fmt.h,
    background: poster.bgImage ? 'transparent' : '#fff',
    color: poster.textColor,
    padding: isSmall ? '4mm' : '10mm',
    display:'flex', flexDirection:'column',
    alignItems:'center', justifyContent:'space-between',
    fontFamily:'Georgia,serif', position:'relative', overflow:'hidden',
    border:'1px solid #ddd', margin:'1rem auto',
  };

  return (
    <div>
      <div className="no-print card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.2rem'}}>
          <h2>Poster Editor — {code?.label}</h2>
          {onClose&&<button className="btn btn-secondary btn-small" onClick={onClose}>← Back</button>}
        </div>
        <div className="form-grid">
          <div className="form-group"><label>Title</label>
            <input value={poster.title} onChange={e=>setPoster(p=>({...p,title:e.target.value}))}/>
          </div>
          <div className="form-group"><label>Subtitle / Description</label>
            <input value={poster.subtitle} onChange={e=>setPoster(p=>({...p,subtitle:e.target.value}))} placeholder="One line description"/>
          </div>
          <div className="form-group"><label>Date & Time</label>
            <input value={poster.dateText} onChange={e=>setPoster(p=>({...p,dateText:e.target.value}))} placeholder="Friday 25 April · 7pm"/>
          </div>
          <div className="form-group"><label>Price</label>
            <input value={poster.price} onChange={e=>setPoster(p=>({...p,price:e.target.value}))} placeholder="£18 per person"/>
          </div>
          <div className="form-group"><label>Call to Action</label>
            <input value={poster.cta} onChange={e=>setPoster(p=>({...p,cta:e.target.value}))}/>
          </div>
          <div className="form-group"><label>Format</label>
            <select value={poster.format} onChange={e=>setPoster(p=>({...p,format:e.target.value}))}>
              {FORMATS.map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
            </select>
          </div>
          <div className="form-group"><label>Foreground Image (optional)</label>
            <input type="file" accept="image/*" onChange={e=>loadImage(e.target.files[0],'fgImage')}/>
          </div>
          <div className="form-group"><label>Background Image (optional)</label>
            <input type="file" accept="image/*" onChange={e=>loadImage(e.target.files[0],'bgImage')}/>
          </div>
          {poster.bgImage&&<>
            <div className="form-group"><label>Overlay Opacity — {Math.round(poster.overlayOpacity*100)}%</label>
              <input type="range" min="0" max="1" step="0.05" value={poster.overlayOpacity}
                onChange={e=>setPoster(p=>({...p,overlayOpacity:parseFloat(e.target.value)}))}/>
            </div>
            <div className="form-group"><label>Overlay Colour</label>
              <input type="color" value={poster.overlayColor} onChange={e=>setPoster(p=>({...p,overlayColor:e.target.value}))}/>
            </div>
          </>}
          <div className="form-group"><label>Text Colour</label>
            <input type="color" value={poster.textColor} onChange={e=>setPoster(p=>({...p,textColor:e.target.value}))}/>
          </div>
          <div className="form-group full" style={{flexDirection:'row',justifyContent:'flex-end',gap:'.5rem'}}>
            <button className="btn btn-primary" onClick={printPoster}>Print Poster</button>
          </div>
        </div>
      </div>

      {/* Poster output */}
      <div style={posterStyle}>
        {poster.bgImage&&<div style={{position:'absolute',inset:0,backgroundImage:`url(${poster.bgImage})`,backgroundSize:'cover',backgroundPosition:'center',zIndex:0}}/>}
        {poster.bgImage&&<div style={{position:'absolute',inset:0,background:poster.overlayColor,opacity:poster.overlayOpacity,zIndex:1}}/>}
        <div style={{position:'relative',zIndex:2,width:'100%',display:'flex',flexDirection:'column',alignItems:'center',gap:isSmall?'2mm':'4mm'}}>
          {!isSmall&&<div style={{fontSize:'8pt',letterSpacing:'.2em',textTransform:'uppercase',opacity:.6,width:'100%'}}>The Artyst · Cambridge</div>}
          <div style={{width:'100%',height:'3px',background:'#c0392b'}}/>
          {poster.fgImage&&<img src={poster.fgImage} style={{maxWidth:'100%',maxHeight:isSmall?'20mm':'60mm',objectFit:'contain'}}/>}
          <div style={{fontSize:isSmall?'10pt':'20pt',fontWeight:'bold',textAlign:'center',lineHeight:1.2}}>{poster.title}</div>
          {poster.subtitle&&<div style={{fontSize:isSmall?'7pt':'9pt',textAlign:'center',opacity:.8,lineHeight:1.5}}>{poster.subtitle}</div>}
          {poster.dateText&&<div style={{fontSize:isSmall?'7pt':'9pt',textAlign:'center'}}>{poster.dateText}</div>}
          {poster.price&&<div style={{fontSize:isSmall?'9pt':'12pt',fontWeight:'bold',textAlign:'center'}}>{poster.price}</div>}
        </div>
        {code&&(
          <div style={{position:'relative',zIndex:2,display:'flex',flexDirection:'column',alignItems:'center',gap:'2mm',marginTop:isSmall?'2mm':'4mm'}}>
            <QRWidget url={`${BASE_URL}/e/${code.slug}`} size={isSmall?60:140}/>
            <div style={{fontSize:isSmall?'6pt':'7pt',letterSpacing:'.15em',textTransform:'uppercase',opacity:.6,textAlign:'center'}}>{poster.cta}</div>
            <div style={{fontSize:'6pt',fontFamily:'monospace',opacity:.4,textAlign:'center'}}>{BASE_URL}/e/{code?.slug}</div>
          </div>
        )}

    </div>
  );
}

// ── DISTRIBUTE ────────────────────────────────────────────
function Distribute({codes, groups, staffList, onStaffCreated, onDistributed}) {
  const [selectedCode,setSelectedCode] = useState('');
  const [selectedChannels,setSelectedChannels] = useState([]);
  const [selectedGroups,setSelectedGroups] = useState([]);
  const [confirming,setConfirming] = useState(false);
  const [staffName,setStaffName] = useState('');
  const [staffSuggestions,setStaffSuggestions] = useState([]);
  const [note,setNote] = useState('');
  const [status,setStatus] = useState(null);
  const [loading,setLoading] = useState(false);

  function toggleChannel(ch) {
    setSelectedChannels(s=>s.includes(ch)?s.filter(c=>c!==ch):[...s,ch]);
  }
  function toggleGroup(id) {
    setSelectedGroups(s=>s.includes(id)?s.filter(g=>g!==id):[...s,id]);
  }

  function handleStaffInput(val) {
    setStaffName(val);
    if(val.length<2){setStaffSuggestions([]);return;}
    const matches = staffList.filter(s=>s.name.toLowerCase().includes(val.toLowerCase()));
    setStaffSuggestions(matches);
  }

  async function confirmDistribute() {
    if(!staffName){setStatus({type:'error',msg:'Please enter your name.'});return;}
    setLoading(true);
    // Find or create staff
    let staffId;
    const existing = staffList.find(s=>s.name.toLowerCase()===staffName.toLowerCase());
    if(existing){
      staffId=existing.id;
    } else {
      const res = await supabase('/rest/v1/staff','POST',{name:staffName},'return=representation');
      staffId = Array.isArray(res)?res[0]?.id:res?.id;
      if(staffId) onStaffCreated();
    }
    // Log distribution
    await supabase('/rest/v1/distributions','POST',{
      qr_code_id: selectedCode,
      staff_id: staffId,
      note: note||null,
      channels: selectedChannels,
      groups: selectedGroups,
      status: 'sent',
    });
    setLoading(false);
    setStatus({type:'success',msg:'Distribution logged successfully.'});
    setConfirming(false);
    setSelectedCode(''); setSelectedChannels([]); setSelectedGroups([]); setNote(''); setStaffName('');
    onDistributed();
  }

  const code = codes.find(c=>c.id===selectedCode);
  const messagingChannels = selectedChannels.filter(c=>['whatsapp','email'].includes(c));
  const needsGroups = messagingChannels.length>0;

  return (
    <div className="card">
      <h2>Distribute</h2>
      {status&&<div className={status.type==='error'?'error':'success'}>{status.msg}</div>}

      <div className="form-group" style={{marginBottom:'1.5rem'}}>
        <label>Select Code</label>
        <select value={selectedCode} onChange={e=>setSelectedCode(e.target.value)}>
          <option value="">— select a code —</option>
          {codes.map(c=><option key={c.id} value={c.id}>{c.label} · /e/{c.slug}</option>)}
        </select>
      </div>

      {CHANNEL_SECTIONS.map(section=>(
        <div className="channel-section" key={section}>
          <h3>{section}</h3>
          <div className="channel-grid">
            {Object.entries(CHANNELS).filter(([,v])=>v.section===section).map(([id,{label}])=>(
              <div key={id} className={`channel-btn${selectedChannels.includes(id)?' selected':''}`}
                onClick={()=>toggleChannel(id)}>{label}</div>
            ))}
          </div>
        </div>
      ))}

      {needsGroups&&(
        <div className="channel-section">
          <h3>Target Groups</h3>
          {!groups.length&&<div style={{fontSize:'.82rem',color:'#555'}}>No groups yet — create them in the Groups tab</div>}
          <div className="channel-grid">
            {groups.map(g=>(
              <div key={g.id} className={`channel-btn${selectedGroups.includes(g.id)?' selected':''}`}
                onClick={()=>toggleGroup(g.id)}>{g.name}</div>
            ))}
          </div>
        </div>
      )}

      {selectedCode&&selectedChannels.length>0&&(
        <div style={{display:'flex',justifyContent:'flex-end',marginTop:'1rem'}}>
          <button className="btn btn-primary" onClick={()=>setConfirming(true)}>Review & Send</button>
        </div>
      )}

      {confirming&&(
        <div className="confirm-panel">
          <h3>Confirm Distribution</h3>
          <ul className="confirm-list">
            <li><strong>Code:</strong> {code?.label}</li>
            <li><strong>Channels:</strong> {selectedChannels.map(c=>CHANNELS[c]?.label).join(', ')}</li>
            {selectedGroups.length>0&&<li><strong>Groups:</strong> {selectedGroups.map(id=>groups.find(g=>g.id===id)?.name).join(', ')}</li>}
          </ul>
          <div className="form-grid">
            <div className="form-group">
              <label>Your Name</label>
              <input value={staffName} onChange={e=>handleStaffInput(e.target.value)} placeholder="Start typing your name..."/>
              {staffSuggestions.length>0&&(
                <div style={{background:'#222',border:'1px solid #333',borderRadius:'2px',marginTop:'2px'}}>
                  {staffSuggestions.map(s=>(
                    <div key={s.id} style={{padding:'.5rem .8rem',cursor:'pointer',fontSize:'.85rem'}}
                      onClick={()=>{setStaffName(s.name);setStaffSuggestions([]);}}>
                      {s.name}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="form-group">
              <label>Note (optional)</label>
              <input value={note} onChange={e=>setNote(e.target.value)} placeholder="e.g. Pre-event push"/>
            </div>
          </div>
          <div style={{display:'flex',gap:'.5rem',justifyContent:'flex-end',marginTop:'1rem'}}>
            <button className="btn btn-secondary" onClick={()=>setConfirming(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={confirmDistribute} disabled={loading}>
              {loading?'Sending...':'Confirm & Send'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SCREENS ───────────────────────────────────────────────
function Screens({codes, zones, assignments, onRefresh}) {
  async function assignCode(zoneId, codeId) {
    if(!codeId) return;
    await supabase('/rest/v1/screen_assignments','POST',{zone_id:zoneId,qr_code_id:codeId,active:true});
    onRefresh();
  }
  async function removeAssignment(id) {
    await supabase(`/rest/v1/screen_assignments?id=eq.${id}`,'DELETE');
    onRefresh();
  }
  return (
    <div>
      {zones.map(zone=>{
        const zoneAssignments = assignments.filter(a=>a.zone_id===zone.id);
        return (
          <div className="zone-card" key={zone.id}>
            <h3>
              <span>{zone.name}</span>
              <a href={`${BASE_URL}/display/${zone.slug}`} target="_blank"
                style={{fontSize:'.7rem',color:'#c0392b',textDecoration:'none',letterSpacing:'.05em'}}>
                OPEN DISPLAY ↗
              </a>
            </h3>
            <div className="zone-url">{BASE_URL}/display/{zone.slug}</div>
            {zoneAssignments.length===0&&<div style={{color:'#444',fontSize:'.82rem'}}>Nothing assigned</div>}
            {zoneAssignments.map(a=>{
              const code = codes.find(c=>c.id===a.qr_code_id);
              return (
                <div className="assigned-code" key={a.id}>
                  <span>{code?.label||'Unknown'} <span className="slug-display">/e/{code?.slug}</span></span>
                  <button className="btn btn-secondary btn-small" onClick={()=>removeAssignment(a.id)}>Remove</button>
                </div>
              );
            })}
            <div style={{display:'flex',gap:'.5rem',marginTop:'.8rem'}}>
              <select defaultValue="" style={{flex:1}} onChange={e=>assignCode(zone.id,e.target.value)}>
                <option value="">Add a code to this zone...</option>
                {codes.filter(c=>c.active).map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
            </div>
          </div>
        );
      })}
    </div>
  );
}

  async function createGroup() {

    await supabase('/rest/v1/distribution_groups','POST',{name:form.name,type:form.type,description:form.description||null});

    setStatus({type:'success',msg:`Group "${form.name}" created.`});
    onRefresh();

  return (
    <div>
      <div className="card">
        <h2>New Group</h2>

        <div className="form-grid">
          <div className="form-group"><label>Group Name</label>
            <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. All Subscribers"/>
          </div>
          <div className="form-group"><label>Type</label>
            <select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
              <option value="both">Email + WhatsApp</option>
              <option value="email">Email only</option>
              <option value="whatsapp">WhatsApp only</option>
            </select>
          </div>
          <div className="form-group full"><label>Description (optional)</label>

          </div>
          <div className="form-group full" style={{flexDirection:'row',justifyContent:'flex-end'}}>
            <button className="btn btn-primary" onClick={createGroup}>Create Group</button>
          </div>
        </div>
      </div>
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <table>
          <thead><tr><th>Name</th><th>Type</th><th>Description</th></tr></thead>
          <tbody>
            {!groups.length&&<tr><td colSpan={3}><div className="empty">No groups yet</div></td></tr>}
            {groups.map(g=>(
              <tr key={g.id}>
                <td><strong>{g.name}</strong></td>

        </table>

  );
}

// ── HISTORY ───────────────────────────────────────────────
function History({distributions, codes, groups, staff}) {

  return (
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      <table>
        <thead><tr>
          <th>Code</th><th>Channels</th><th>Groups</th>
          <th>Sent By</th><th>Note</th><th>When</th><th>Status</th>
        </tr></thead>
        <tbody>
          {distributions.map(d=>{
            const code = codes.find(c=>c.id===d.qr_code_id);
            const member = staff.find(s=>s.id===d.staff_id);
            const dGroups = (d.groups||[]).map(id=>groups.find(g=>g.id===id)?.name).filter(Boolean);
            return (
              <tr key={d.id} className="history-row">
                <td><strong>{code?.label||'—'}</strong><br/><span className="slug-display">/e/{code?.slug}</span></td>

                <td>{dGroups.length?dGroups.map(g=><span key={g} className="group-tag">{g}</span>):'—'}</td>

              </tr>
            );
          })}
        </tbody>
      </table>

}

// ── REPORTS ───────────────────────────────────────────────
function Reports({codes, scanEvents}) {
  const topCodes = [...codes].sort((a,b)=>b.scan_count-a.scan_count).slice(0,8);
  const maxScans = topCodes[0]?.scan_count||1;

  const byDevice = scanEvents.reduce((acc,e)=>{acc[e.device_type]=(acc[e.device_type]||0)+1;return acc;},{});
  const totalScans = scanEvents.length||1;

  const byDay = scanEvents.reduce((acc,e)=>{
    const d = new Date(e.scanned_at).toLocaleDateString('en-GB',{weekday:'short'});
    acc[d]=(acc[d]||0)+1; return acc;
  },{});

  const byHour = scanEvents.reduce((acc,e)=>{
    const h = new Date(e.scanned_at).getHours();
    const label = `${h}:00`; acc[label]=(acc[label]||0)+1; return acc;
  },{});
  const topHours = Object.entries(byHour).sort((a,b)=>b[1]-a[1]).slice(0,6);

  const byPlacement = codes.reduce((acc,c)=>{
    if(c.placement) acc[c.placement]=(acc[c.placement]||0)+c.scan_count;
    return acc;
  },{});
  const maxPlacement = Math.max(...Object.values(byPlacement),1);

  return (
    <div>
      <div className="two-col">
        <div className="card">
          <h2>Top Codes by Scans</h2>
          {topCodes.map(c=>(
            <div className="report-row" key={c.id}>
              <div className="report-label"><span>{c.label}</span><span>{c.scan_count}</span></div>
              <div style={{background:'#222',borderRadius:'2px',height:'8px'}}>
                <div className="report-bar" style={{width:`${(c.scan_count/maxScans)*100}%`}}/>
              </div>
            </div>
          ))}
          {!topCodes.length&&<div className="empty" style={{padding:'1rem'}}>No scan data yet</div>}
        </div>
        <div className="card">
          <h2>Scans by Device</h2>
          {Object.entries(byDevice).map(([type,count])=>(
            <div className="report-row" key={type}>
              <div className="report-label"><span style={{textTransform:'capitalize'}}>{type}</span><span>{Math.round((count/totalScans)*100)}%</span></div>
              <div style={{background:'#222',borderRadius:'2px',height:'8px'}}>
                <div className="report-bar" style={{width:`${(count/totalScans)*100}%`}}/>
              </div>
            </div>
          ))}
          {!Object.keys(byDevice).length&&<div className="empty" style={{padding:'1rem'}}>No scan data yet</div>}
        </div>
      </div>
      <div className="two-col">
        <div className="card">
          <h2>Scans by Placement</h2>
          {Object.entries(byPlacement).sort((a,b)=>b[1]-a[1]).map(([p,count])=>(
            <div className="report-row" key={p}>
              <div className="report-label"><span>{p}</span><span>{count}</span></div>
              <div style={{background:'#222',borderRadius:'2px',height:'8px'}}>
                <div className="report-bar" style={{width:`${(count/maxPlacement)*100}%`}}/>
              </div>
            </div>
          ))}
          {!Object.keys(byPlacement).length&&<div className="empty" style={{padding:'1rem'}}>No placement data yet</div>}
        </div>
        <div className="card">
          <h2>Peak Scan Hours</h2>
          {topHours.map(([h,count])=>(
            <div className="report-row" key={h}>
              <div className="report-label"><span>{h}</span><span>{count}</span></div>
              <div style={{background:'#222',borderRadius:'2px',height:'8px'}}>
                <div className="report-bar" style={{width:`${(count/(topHours[0]?.[1]||1))*100}%`}}/>
              </div>
            </div>
          ))}
          {!topHours.length&&<div className="empty" style={{padding:'1rem'}}>No scan data yet</div>}
        </div>
      </div>
      <div className="card">
        <h2>Scans by Day of Week</h2>
        <div style={{display:'flex',gap:'1rem',alignItems:'flex-end',height:'80px'}}>
          {['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>{
            const count = byDay[d]||0;
            const max = Math.max(...Object.values(byDay),1);
            return (
              <div key={d} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}}>
                <div style={{width:'100%',background:'#c0392b',height:`${(count/max)*60}px`,borderRadius:'2px',minHeight:count?'4px':'0'}}/>
                <span style={{fontSize:'.7rem',color:'#555'}}>{d}</span>
              </div>
            );
          })}
        </div>
        {!Object.keys(byDay).length&&<div className="empty" style={{padding:'1rem'}}>No scan data yet</div>}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────
function App() {
  const [tab,setTab] = useState('library');
  const [codes,setCodes] = useState([]);
  const [groups,setGroups] = useState([]);
  const [staffList,setStaffList] = useState([]);
  const [distributions,setDistributions] = useState([]);
  const [zones,setZones] = useState([]);
  const [assignments,setAssignments] = useState([]);
  const [scanEvents,setScanEvents] = useState([]);
  const [printQueue,setPrintQueue] = useState([]);
  const [distributeCode,setDistributeCode] = useState(null);
  const [loading,setLoading] = useState(true);

  async function loadAll() {
    setLoading(true);
    const [c,g,s,d,z,a,se] = await Promise.all([
      supabase('/rest/v1/qr_codes?order=created_at.desc'),
      supabase('/rest/v1/distribution_groups?order=name.asc'),
      supabase('/rest/v1/staff?order=name.asc'),
      supabase('/rest/v1/distributions?order=created_at.desc&limit=100'),
      supabase('/rest/v1/screen_zones?order=name.asc'),
      supabase('/rest/v1/screen_assignments?order=display_order.asc'),
      supabase('/rest/v1/scan_events?order=scanned_at.desc&limit=500'),
    ]);
    setCodes(Array.isArray(c)?c:[]);
    setGroups(Array.isArray(g)?g:[]);
    setStaffList(Array.isArray(s)?s:[]);
    setDistributions(Array.isArray(d)?d:[]);
    setZones(Array.isArray(z)?z:[]);
    setAssignments(Array.isArray(a)?a:[]);
    setScanEvents(Array.isArray(se)?se:[]);
    setLoading(false);
  }

  useEffect(()=>{loadAll();},[]);

  function addToPrintQueue(code) {
    if(!printQueue.find(c=>c.id===code.id)) setPrintQueue(q=>[...q,code]);
    setTab('print');
  }

  function handleDistribute(code) {
    setDistributeCode(code);
    setTab('distribute');
  }

  const totalScans = codes.reduce((s,c)=>s+c.scan_count,0);
  const activeCodes = codes.filter(c=>c.active).length;

  const TABS = [
    ['library',`Library (${codes.length})`],
    ['create','New Code'],
    ['print',`Print Queue${printQueue.length?` (${printQueue.length})`:''}` ],
    ['distribute','Distribute'],
    ['screens','Screens'],
    ['groups','Groups'],
    ['history','History'],
    ['reports','Reports'],
  ];

  return (
    <div className="app">
      <header>
        <h1>QR Engine — The Artyst</h1>
        <span>CA-022</span>
      </header>

      <div className="stats-grid no-print">
        <div className="stat"><div className="number">{codes.length}</div><div className="label">Total Codes</div></div>
        <div className="stat"><div className="number">{activeCodes}</div><div className="label">Active</div></div>
        <div className="stat"><div className="number">{totalScans}</div><div className="label">Total Scans</div></div>
        <div className="stat"><div className="number">{printQueue.length}</div><div className="label">In Print Queue</div></div>
      </div>

      <div className="tabs no-print">
        {TABS.map(([id,label])=>(
          <button key={id} className={`tab ${tab===id?'active':''}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {loading&&tab==='library'&&<div className="empty">Loading...</div>}
      {tab==='library'&&!loading&&<Library codes={codes} onRefresh={loadAll} onAddToPrintQueue={addToPrintQueue} onDistribute={handleDistribute}/>}
      {tab==='create'&&<CreateForm onCreate={()=>{loadAll();setTab('library');}}/>}
      {tab==='print'&&<PrintQueue queue={printQueue} onRemove={id=>setPrintQueue(q=>q.filter(c=>c.id!==id))} onClear={()=>setPrintQueue([])}/>}
      {tab==='distribute'&&<Distribute codes={codes} groups={groups} staffList={staffList} onStaffCreated={loadAll} onDistributed={loadAll} initialCode={distributeCode}/>}
      {tab==='screens'&&<Screens codes={codes} zones={zones} assignments={assignments} onRefresh={loadAll}/>}
      {tab==='groups'&&<Groups groups={groups} onRefresh={loadAll}/>}
      {tab==='history'&&<History distributions={distributions} codes={codes} groups={groups} staff={staffList}/>}
      {tab==='reports'&&<Reports codes={codes} scanEvents={scanEvents}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
