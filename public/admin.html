function filenamify(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}

async function supabase(path,method='GET',body=null,prefer=null){
  const res=await fetch('/api/supabase',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path,method,body,prefer})});
  return res.json();
}

async function authFetch(url,options={}){
  const token=sessionStorage.getItem('ca022_token');
  return fetch(url,{...options,headers:{'Content-Type':'application/json','Authorization':token?`Bearer ${token}`:'',...(options.headers||{})}});
}

async function uploadImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=async(e)=>{
      try{
        const base64=e.target.result.split(',')[1];
        const res=await fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({base64,filename:file.name,contentType:file.type})});
        const data=await res.json();
        if(data.url) resolve(data.url);
        else reject(new Error(data.error||'Upload failed'));
      }catch(err){reject(err);}
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function slugify(s){return s.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').substring(0,40);}
function catSlugify(s){return s.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').substring(0,40);}
function TypeBadge({type}){return <span className={`badge badge-${type}`}>{type}</span>;}

const QRWidget=React.memo(function QRWidget({url,size=120}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!url)return;
    ref.current.innerHTML='';
    new QRCode(ref.current,{text:url,width:size,height:size,colorDark:'#111',colorLight:'#fff'});
  },[url,size]);
  return <div ref={ref}/>;
});

function hasDestinationWarning(code){
  if(!code.destination_history||!code.destination_history.length) return false;
  const lastChange=new Date(code.destination_history[code.destination_history.length-1].changed_at);
  const lastAction=code.last_printed_at||code.last_distributed_at;
  if(!lastAction) return false;
  return lastChange>new Date(lastAction);
}

function CropMarks({posterW,posterH}){
  const pw=parseFloat(posterW);
  const ph=parseFloat(posterH);
  const hGap=(210-pw)/2;
  const vGap=(297-ph)/2;
  return(
    <div style={{
      position:'absolute',
      top:`${vGap}mm`,
      left:`${hGap}mm`,
      width:`${pw}mm`,
      height:`${ph}mm`,
      outline:'0.5pt solid #bbb',
      outlineOffset:'0',
      pointerEvents:'none',
      WebkitPrintColorAdjust:'exact',
      printColorAdjust:'exact',
    }}/>
  );
}

// ── LOGIN SCREEN ──────────────────────────────────────────
function LoginScreen({onLogin}){
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');

  const login=async()=>{
    if(!username||!password){setError('Please enter username and password.');return;}
    setLoading(true);setError('');
    try{
      const res=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
      const data=await res.json();
      if(!res.ok){setError(data.error||'Login failed.');setLoading(false);return;}
      sessionStorage.setItem('ca022_token',data.token);
      sessionStorage.setItem('ca022_user',JSON.stringify(data.user));
      onLogin(data.user);
    }catch(e){setError('Network error.');setLoading(false);}
  }

  return (
    <div className="login-wrap">
      <div className="login-card">
        <h1>QR Engine</h1>
        <p>CA-022 · The Artyst</p>
        <div className="form-group" style={{marginBottom:'1rem'}}>
          <label>Username</label>
          <input value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} autoFocus/>
        </div>
        <div className="form-group" style={{marginBottom:'1rem'}}>
          <label>Password</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()}/>
        </div>
        {error&&<div className="login-err">{error}</div>}
        <button className="btn btn-primary" style={{width:'100%',marginTop:'.5rem'}} onClick={login} disabled={loading}>{loading?'Signing in...':'Sign In'}</button>
      </div>
    </div>
  );
}

// ── USERS TAB ─────────────────────────────────────────────
function UsersTab(){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [form,setForm]=useState({username:'',password:'',name:'',role:'viewer'});
  const [status,setStatus]=useState(null);
  const [resetId,setResetId]=useState(null);
  const [resetPw,setResetPw]=useState('');

  const loadUsers=async()=>{
    setLoading(true);
    const res=await authFetch('/api/users');
    if(res.ok) setUsers(await res.json());
    setLoading(false);
  }
  useEffect(()=>{loadUsers();},[]);

  const createUser=async()=>{
    if(!form.username||!form.password||!form.name){setStatus({type:'error',msg:'All fields required.'});return;}
    const res=await authFetch('/api/users',{method:'POST',body:JSON.stringify(form)});
    if(res.ok){setStatus({type:'success',msg:`User "${form.name}" created.`});setForm({username:'',password:'',name:'',role:'viewer'});loadUsers();}
    else{const d=await res.json();setStatus({type:'error',msg:d.error||'Failed.'});}
  }
  const toggleActive=async(u)=>{await authFetch('/api/users',{method:'PATCH',body:JSON.stringify({id:u.id,active:!u.active})});loadUsers();}
  const changeRole=async(u,role)=>{await authFetch('/api/users',{method:'PATCH',body:JSON.stringify({id:u.id,role})});loadUsers();}
  const resetPassword=async()=>{if(!resetPw)return;await authFetch('/api/users',{method:'PATCH',body:JSON.stringify({id:resetId,password:resetPw})});setResetId(null);setResetPw('');setStatus({type:'success',msg:'Password updated.'});}

  return (
    <div>
      <div className="card">
        <h2>Add User</h2>
        {status&&<div className={status.type==='error'?'error':'success'}>{status.msg}</div>}
        <div className="form-grid">
          <div className="form-group"><label>Name</label><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Display name"/></div>
          <div className="form-group"><label>Username</label><input value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))} placeholder="Login username"/></div>
          <div className="form-group"><label>Password</label><input type="password" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/></div>
          <div className="form-group"><label>Role</label><select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}><option value="viewer">Viewer — read only</option><option value="admin">Admin — full access</option></select></div>
          <div className="form-group full" style={{flexDirection:'row',justifyContent:'flex-end'}}><button className="btn btn-primary" onClick={createUser}>Add User</button></div>
        </div>
      </div>
      <div className="card">
        <h2>All Users</h2>
        {loading&&<div className="empty" style={{padding:'1rem'}}>Loading...</div>}
        {!loading&&users.map(u=>(
          <div className="user-row" key={u.id} style={{opacity:u.active?1:0.5}}>
            <div className="user-info"><div className="user-name">{u.name}</div><div className="user-meta">@{u.username}</div></div>
            <div className="actions" style={{alignItems:'center',flexWrap:'wrap'}}>
              <span className={`badge badge-${u.role}`}>{u.role}</span>
              <select value={u.role} onChange={e=>changeRole(u,e.target.value)} style={{width:'auto',fontSize:'.75rem',padding:'.3rem .5rem'}}><option value="admin">Admin</option><option value="viewer">Viewer</option></select>
              {resetId===u.id?(
                <div style={{display:'flex',gap:'.3rem',alignItems:'center'}}>
                  <input type="password" value={resetPw} onChange={e=>setResetPw(e.target.value)} placeholder="New password" style={{width:'130px',fontSize:'.8rem',padding:'.3rem .5rem'}}/>
                  <button className="btn btn-green btn-small" onClick={resetPassword}>Save</button>
                  <button className="btn btn-secondary btn-small" onClick={()=>setResetId(null)}>Cancel</button>
                </div>
              ):<button className="btn btn-secondary btn-small" onClick={()=>setResetId(u.id)}>Reset PW</button>}
              <button className="btn btn-secondary btn-small" onClick={()=>toggleActive(u)}>{u.active?'Deactivate':'Activate'}</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

        <rect x="20" y="80" width="40" height="13" rx="2" fill="#c0392b" opacity=".8"/>
        <rect x="25" y="85" width="30" height="3" rx="2" fill="#fff" opacity=".9"/>
      </svg>
    )},
  ];
  return(
    <div style={{display:'flex',gap:'.6rem',flexWrap:'wrap',marginTop:'.4rem'}}>
      {MODES.map(m=>(
        <div key={m.id} onClick={()=>onChange(m.id)}
          className={'img-mode-card'+(mode===m.id?' selected':'')}>
          {m.id==='eventcard'&&<div style={{fontSize:'.6rem',background:'#c0392b',color:'#fff',padding:'.1rem .35rem',borderRadius:'2px',letterSpacing:'.05em',textTransform:'uppercase',alignSelf:'stretch',textAlign:'center',marginBottom:'-.1rem'}}>Auto</div>}
          {m.svg}
          <div className="img-mode-label">{m.label}</div>
          <div className="img-mode-desc">{m.desc}</div>
        </div>
      ))}
    </div>
  );
}

function GenImageOptions({code,selectedStyle,setSelectedStyle,selectedKeywords,setSelectedKeywords,customPrompt,setCustomPrompt,generatingImage,generateImage}){
  const eventPurpose=code?._eventMeta?.event_purpose||'default';
  const suggestions=EVENT_KEYWORDS[eventPurpose]||EVENT_KEYWORDS.default;
  const allKeywords=[...new Set([...suggestions,...ARTYST_KEYWORDS])];
  return(
    <div style={{border:'1px solid #2a5a7c',borderRadius:'3px',padding:'.8rem',marginBottom:'.5rem'}}>
      <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.08em',color:'#5aafff',marginBottom:'.6rem'}}>Style</div>
      <div style={{display:'flex',gap:'.3rem',flexWrap:'wrap',marginBottom:'1rem'}}>
        {IMAGE_STYLES.map(s=>(
          <div key={s.id} onClick={()=>setSelectedStyle(s.id)}
            style={{padding:'.3rem .7rem',borderRadius:'2px',cursor:'pointer',fontSize:'.78rem',userSelect:'none',
              background:selectedStyle===s.id?'#c0392b':'inherit',
              color:selectedStyle===s.id?'#fff':'inherit',
              border:'1px solid '+(selectedStyle===s.id?'#c0392b':'#333')}}>
            {s.label}
          </div>
        ))}
      </div>
      <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.08em',color:'#5aafff',marginBottom:'.4rem'}}>Keywords</div>
      <div style={{display:'flex',gap:'.3rem',flexWrap:'wrap',marginBottom:'.5rem'}}>
        {allKeywords.map(k=>{
          const on=selectedKeywords.includes(k);
          return(
            <div key={k} onClick={()=>setSelectedKeywords(prev=>on?prev.filter(x=>x!==k):[...prev,k])}
              style={{padding:'.2rem .5rem',borderRadius:'2px',cursor:'pointer',fontSize:'.75rem',userSelect:'none',
                background:on?'#1a3a5c':'inherit',
                color:on?'#5aafff':'inherit',
                border:'1px solid '+(on?'#2a5a7c':'#333')}}>
              {k}
            </div>
          );
        })}
      </div>
      {selectedKeywords.length>0&&(
        <div style={{fontSize:'.72rem',marginBottom:'.5rem',opacity:.6}}>
          Selected: {selectedKeywords.join(', ')}
          <span onClick={()=>setSelectedKeywords([])} style={{marginLeft:'.5rem',cursor:'pointer',color:'#ff7a7a'}}>clear</span>
        </div>
      )}
      <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.08em',color:'#5aafff',marginBottom:'.4rem'}}>Additional description</div>
      <input value={customPrompt} onChange={e=>setCustomPrompt(e.target.value)}
        placeholder="e.g. outdoor summer evening, blue sky..."
        style={{width:'100%',marginBottom:'.5rem'}}/>
      <button className="btn btn-primary btn-small" onClick={()=>generateImage('bg')} disabled={!!generatingImage} type="button">
        {generatingImage==='bg'?'Generating...':'Generate background image'}
      </button>
    </div>
  );
}

function PosterEditor({code,templates,designs,onClose,onSaved}){
  const [poster,setPoster]=useState({...BLANK_POSTER,
    title:code?.label||'',
    subtitle:code?._eventMeta?.subtitle||'',
    dateText:code?._eventMeta?.dateText||'',
    price:code?._eventMeta?.price||''
  });
  const [uploading,setUploading]=useState({fg:false,bg:false});
  const [saveMode,setSaveMode]=useState(null);
  const [saveName,setSaveName]=useState('');
  const [saveStatus,setSaveStatus]=useState(null);
  const [loadTemplateId,setLoadTemplateId]=useState('');
  const [loadDesignId,setLoadDesignId]=useState('');
  const [downloading,setDownloading]=useState(false);
  const [generatingImage,setGeneratingImage]=useState('');
  const [genError,setGenError]=useState('');
  const [showGenOptions,setShowGenOptions]=useState(false);
  const [imageMode,setImageMode]=useState('eventcard');
  const [selectedKeywords,setSelectedKeywords]=useState([]);
  const [selectedStyle,setSelectedStyle]=useState('photographic');
  const [customPrompt,setCustomPrompt]=useState('');
  const [duplex,setDuplex]=useState('none');
  const [backPoster,setBackPoster]=useState({...BLANK_POSTER});
  const [backUploading,setBackUploading]=useState({fg:false,bg:false});

  // Pre-fill poster fields from linked CA-017 event (works for both new and existing codes)
  useEffect(()=>{
    if(!code?.linked_ca017_event_id) return;
    supabase(`/rest/v1/events?id=eq.${code.linked_ca017_event_id}&select=*&limit=1`).then(data=>{
      if(!Array.isArray(data)||!data.length) return;
      const ev=data[0];
      let dateText='';
      if(ev.starts_at){
        const d=new Date(ev.starts_at);
        dateText=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
        dateText+=' · '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
        if(ev.ends_at){
          const e2=new Date(ev.ends_at);
          dateText+='–'+e2.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
        }
      }
      const price=ev.price_pence?`£${(ev.price_pence/100).toFixed(2)} per person`:(ev.price_pence===0?'Free':'');
      setPoster(p=>({...p,
        title: ev.title||p.title||'',
        subtitle: p.subtitle||ev.description||ev.short_description||'',
        dateText: p.dateText||dateText,
        price: p.price||price,
        fgImage: p.fgImage||ev.image_url||null,
        fgImageUrl: p.fgImageUrl||ev.image_url||null,
      }));
      setImageMode(m=>m==='none'?'eventcard':m);
    });
  },[code?.linked_ca017_event_id]);

  const posterRef=useRef(null);
  const backPosterRef=useRef(null);
  const posterBottomRef=useRef(null);
  const fmt=FORMATS.find(f=>f.id===poster.format)||FORMATS[0];
  const codeDesigns=(designs||[]).filter(d=>d.qr_code_id===code?.id);
  const isScreen=isScreenFormat(poster.format);
  const needsCropMarks=SMALL_PHYSICAL.includes(poster.format);

  function applyDesign(d){
    setPoster(p=>({...p,title:d.title_override||p.title,subtitle:d.subtitle||'',dateText:d.date_text||'',price:d.price||'',cta:d.cta||'Scan to find out more',format:d.format||'a5-portrait',overlayOpacity:d.overlay_opacity??0.5,overlayColor:d.overlay_color||'#000000',textColor:d.text_color||'#111111',fgImageUrl:d.fg_image_url||null,bgImageUrl:d.bg_image_url||null,fgImage:d.fg_image_url||null,bgImage:d.bg_image_url||null}));
    if(d.duplex) setDuplex(d.duplex);
    if(d.back_design) setBackPoster({title:d.back_design.title||'',subtitle:d.back_design.subtitle||'',dateText:d.back_design.date_text||'',price:d.back_design.price||'',cta:d.back_design.cta||'Scan to find out more',format:d.format||'a5-portrait',overlayOpacity:d.back_design.overlay_opacity??0.5,overlayColor:d.back_design.overlay_color||'#000000',textColor:d.back_design.text_color||'#111111',fgImageUrl:d.back_design.fg_image_url||null,bgImageUrl:d.back_design.bg_image_url||null,fgImage:d.back_design.fg_image_url||null,bgImage:d.back_design.bg_image_url||null});
  }

  function handleLoadTemplate(id){setLoadTemplateId(id);const t=templates.find(t=>t.id===id);if(t) applyDesign(t);}
  function handleLoadDesign(id){setLoadDesignId(id);const d=codeDesigns.find(d=>d.id===id);if(d) applyDesign(d);}

  const handleImageUpload=async(file,key)=>{
    if(!file)return;
    setUploading(u=>({...u,[key]:true}));
    try{const url=await uploadImage(file);setPoster(p=>({...p,[key+'Image']:url,[key+'ImageUrl']:url}));}
    catch(err){setSaveStatus({type:'error',msg:'Image upload failed: '+err.message});}
    setUploading(u=>({...u,[key]:false}));
  }

  const generateImage=async(field='bg')=>{
    setGeneratingImage(field);setGenError('');
    try{
      const res=await fetch('/api/generate-image',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          title:poster.title,
          event_purpose:code?._eventMeta?.event_purpose||'',
          description:poster.subtitle||'',
          keywords:selectedKeywords,
          style:selectedStyle,
          custom:customPrompt
        })
      });
      const data=await res.json();
      if(!res.ok){setGenError(data.error||'Generation failed.');return;}
      if(field==='fg'){setPoster(p=>({...p,fgImage:data.url,fgImageUrl:data.url}));}else{setPoster(p=>({...p,bgImage:data.url,bgImageUrl:data.url,overlayOpacity:0.35,overlayColor:'#000000'}));}
    }catch(e){setGenError('Connection error.');}
    finally{setGeneratingImage('');}
  }

  const downloadImage=async()=>{
    if(!posterRef.current)return;
    setDownloading(true);
    try{
      const canvas=await html2canvas(posterRef.current,{useCORS:true,allowTaint:true,scale:2,backgroundColor:poster.bgImage?null:'#ffffff'});
      const link=document.createElement('a');
      const title=filenamify(poster.title||code?.label||'poster');
      link.download=`${title}-${poster.format}.png`;
      link.href=canvas.toDataURL('image/png');
      link.click();
    }catch(err){setSaveStatus({type:'error',msg:'Download failed: '+err.message});}
    setDownloading(false);
  }

  const saveDesign=async()=>{
    if(!saveName){setSaveStatus({type:'error',msg:'Please enter a name.'});return;}
    const backDesignPayload=duplex==='different'?{title:backPoster.title||null,subtitle:backPoster.subtitle||null,date_text:backPoster.dateText||null,price:backPoster.price||null,cta:backPoster.cta||null,text_color:backPoster.textColor,overlay_color:backPoster.overlayColor,overlay_opacity:backPoster.overlayOpacity,fg_image_url:backPoster.fgImageUrl||null,bg_image_url:backPoster.bgImageUrl||null}:null;
    const payload={name:saveName,format:poster.format,title_override:poster.title||null,subtitle:poster.subtitle||null,date_text:poster.dateText||null,price:poster.price||null,cta:poster.cta||null,text_color:poster.textColor,overlay_color:poster.overlayColor,overlay_opacity:poster.overlayOpacity,fg_image_url:poster.fgImageUrl||null,bg_image_url:poster.bgImageUrl||null,duplex:duplex,back_design:backDesignPayload};
    const table=saveMode==='template'?'poster_templates':'poster_designs';
    if(saveMode==='design') payload.qr_code_id=code?.id;
    const res=await supabase('/rest/v1/'+table,'POST',payload,'return=representation');
    if(res.error||(Array.isArray(res)&&res[0]?.code)){setSaveStatus({type:'error',msg:res.message||res[0]?.message||'Save failed.'});}
    else{setSaveStatus({type:'success',msg:saveMode==='template'?'Template saved.':'Design saved.'});setSaveMode(null);setSaveName('');if(onSaved) onSaved();}
  }

  const posterStyle={width:fmt.w,height:fmt.h,background:poster.bgImage?'transparent':'#fff',color:poster.textColor,padding:fmt.small?'4mm':'10mm',display:'flex',flexDirection:'column',alignItems:'center',fontFamily:'Georgia,serif',position:'relative',overflow:'hidden',border:needsCropMarks?'none':'1px solid #ddd',margin:needsCropMarks?'0':'1rem auto'};
  const eventCardStyle={width:fmt.w,height:fmt.h,background:'#fff',color:'#1a1a18',fontFamily:'Georgia,serif',position:'relative',overflow:'hidden',border:needsCropMarks?'none':'1px solid #ddd',margin:needsCropMarks?'0':'1rem auto',display:'flex',flexDirection:'column'};
  const PosterContent=imageMode==='eventcard'?(
    <div ref={posterRef} style={eventCardStyle}>
      {poster.fgImage?(
        <div style={{flex:'0 0 38%',backgroundImage:`url(${poster.fgImage})`,backgroundSize:'cover',backgroundPosition:'center'}}/>
      ):(
        <div style={{flex:'0 0 20%',background:'#e8e8e8',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:'7pt',color:'#bbb',letterSpacing:'.1em',textTransform:'uppercase'}}>No image</span>
        </div>
      )}
      <div style={{flex:'0 0 auto',padding:fmt.small?'2mm 3mm':'4mm 6mm',display:'flex',flexDirection:'column',gap:fmt.small?'1mm':'1.5mm'}}>
        <div style={{fontSize:fmt.small?'5.5pt':'7pt',letterSpacing:'.15em',textTransform:'uppercase',color:'#c0392b'}}>The Artyst · Cambridge</div>
        <div style={{fontSize:fmt.small?'10pt':'18pt',fontWeight:'bold',lineHeight:1.2,color:'#1a1a18'}}>{poster.title||'Event Title'}</div>
        {poster.subtitle&&<div style={{fontSize:fmt.small?'6pt':'8pt',color:'#666',lineHeight:1.4}}>{poster.subtitle}</div>}
        <div style={{height:'1px',background:'#eee',margin:fmt.small?'.5mm 0':'1mm 0'}}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:fmt.small?'1mm':'2mm'}}>
          {poster.dateText&&(
            <div>
              <div style={{fontSize:fmt.small?'4pt':'5.5pt',letterSpacing:'.1em',textTransform:'uppercase',color:'#aaa',marginBottom:'.4mm'}}>When</div>
              <div style={{fontSize:fmt.small?'6pt':'9pt',fontWeight:700,color:'#1a1a18',lineHeight:1.3}}>{poster.dateText}</div>
            </div>
          )}
          {poster.price&&(
            <div>
              <div style={{fontSize:fmt.small?'4pt':'5.5pt',letterSpacing:'.1em',textTransform:'uppercase',color:'#aaa',marginBottom:'.4mm'}}>Tickets</div>
              <div style={{fontSize:fmt.small?'7pt':'12pt',fontWeight:'bold',color:'#c0392b'}}>{poster.price}</div>
            </div>
          )}
        </div>
      </div>
      {code&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-start',gap:'1.5mm',padding:fmt.small?'3mm 2mm 2mm':'5mm 4mm 3mm',borderTop:'1px solid #eee'}}>
          <div style={{fontSize:fmt.small?'5pt':'7pt',letterSpacing:'.12em',textTransform:'uppercase',color:'#c0392b',marginBottom:'.5mm'}}>{poster.price&&poster.price!=='Free'?'Book a place':'Find out more'}</div>
          <QRWidget url={`${BASE_URL}/e/${code.slug}`} size={fmt.small?55:110}/>
          <div style={{fontSize:fmt.small?'4pt':'5.5pt',fontFamily:'monospace',color:'#aaa',marginTop:'.5mm',letterSpacing:'.02em'}}>{BASE_URL}/e/{code.slug}</div>
        </div>
      )}
      <div style={{flex:'0 0 auto',height:fmt.small?'3mm':'5mm',background:'#c0392b'}}/>
    </div>
  ):(
    <div ref={posterRef} style={posterStyle}>
      {poster.bgImage&&<div style={{position:'absolute',inset:0,backgroundImage:`url(${poster.bgImage})`,backgroundSize:'cover',backgroundPosition:'center',zIndex:0}}/>}
      {poster.bgImage&&<div style={{position:'absolute',inset:0,background:poster.overlayColor,opacity:poster.overlayOpacity,zIndex:1}}/>}
      <div style={{position:'relative',zIndex:2,width:'100%',display:'flex',flexDirection:'column',alignItems:'center',gap:fmt.small?'2mm':'3mm',flex:1,minHeight:0}}>
        {!fmt.small&&<div style={{fontSize:'9pt',letterSpacing:'.2em',textTransform:'uppercase',opacity:.6,width:'100%'}}>The Artyst · Cambridge</div>}
        <div style={{width:'100%',height:'3px',background:'#c0392b'}}/>
        {poster.fgImage&&<img src={poster.fgImage} style={{width:'100%',flex:1,minHeight:0,objectFit:'contain',objectPosition:'center'}}/>}
        <div style={{
          fontSize:fmt.small?'12pt':(
            imageMode==='none'
              ? (poster.title.length<15?'52pt':poster.title.length<25?'40pt':poster.title.length<40?'30pt':'22pt')
              : '26pt'
          ),
          fontWeight:'bold',textAlign:'center',lineHeight:1.15,
          flex:imageMode==='none'?'1':'none',
          display:'flex',alignItems:'center',justifyContent:'center'
        }}>{poster.title}</div>
        {poster.subtitle&&<div style={{fontSize:fmt.small?'9pt':(imageMode==='none'?'16pt':'12pt'),textAlign:'center',opacity:.8,lineHeight:1.5,marginTop:imageMode==='none'?'4mm':'0'}}>{poster.subtitle}</div>}
        {poster.dateText&&<div style={{fontSize:fmt.small?'9pt':'12pt',textAlign:'center'}}>{poster.dateText}</div>}
        {poster.price&&<div style={{fontSize:fmt.small?'10pt':'15pt',fontWeight:'bold',textAlign:'center'}}>{poster.price}</div>}
        {code&&(<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2mm',marginTop:'auto',paddingTop:'3mm'}}><QRWidget url={`${BASE_URL}/e/${code.slug}`} size={fmt.small?60:140}/><div style={{fontSize:fmt.small?'6pt':'7pt',letterSpacing:'.15em',textTransform:'uppercase',opacity:.6,textAlign:'center'}}>{poster.cta}</div><div style={{fontSize:'6pt',fontFamily:'monospace',opacity:.4,textAlign:'center'}}>{BASE_URL}/e/{code.slug}</div></div>)}
      </div>
    </div>
  );

  return (
    <div>
      <div className="no-print card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.2rem'}}>
          <h2>Poster Editor{code?` — ${code.label}`:''}</h2>
          {onClose&&<button className="btn btn-secondary btn-small" onClick={onClose}>← Back</button>}
        </div>
        <div className="form-grid" style={{marginBottom:'1rem',paddingBottom:'1rem',borderBottom:'1px solid #222'}}>
          {templates.length>0&&<div className="form-group"><label>Load Template</label><select value={loadTemplateId} onChange={e=>handleLoadTemplate(e.target.value)}><option value="">— select a template —</option>{templates.map(t=><option key={t.id} value={t.id}>{t.name} ({t.format})</option>)}</select></div>}
          {codeDesigns.length>0&&<div className="form-group"><label>Load Saved Design</label><select value={loadDesignId} onChange={e=>handleLoadDesign(e.target.value)}><option value="">— select a design —</option>{codeDesigns.map(d=><option key={d.id} value={d.id}>{d.name} ({d.format})</option>)}</select></div>}
        </div>
        {saveStatus&&<div className={saveStatus.type==='error'?'error':'success'}>{saveStatus.msg}</div>}
        <div className="form-grid">
          <div className="form-group"><label>Title</label><input value={poster.title} onChange={e=>setPoster(p=>({...p,title:e.target.value}))}/></div>
          <div className="form-group"><label>Subtitle</label><input value={poster.subtitle} onChange={e=>setPoster(p=>({...p,subtitle:e.target.value}))} placeholder="One line description"/></div>
          <div className="form-group"><label>Date & Time</label><input value={poster.dateText} onChange={e=>setPoster(p=>({...p,dateText:e.target.value}))} placeholder="Friday 25 April · 7pm"/></div>
          <div className="form-group"><label>Price</label><input value={poster.price} onChange={e=>setPoster(p=>({...p,price:e.target.value}))} placeholder="£18 per person"/></div>
          <div className="form-group"><label>Call to Action</label><input value={poster.cta} onChange={e=>setPoster(p=>({...p,cta:e.target.value}))}/></div>
          <div className="form-group"><label>Format</label><select value={poster.format} onChange={e=>setPoster(p=>({...p,format:e.target.value}))}><optgroup label="Print">{FORMATS.filter(f=>!f.screen).map(f=><option key={f.id} value={f.id}>{f.label}</option>)}</optgroup><optgroup label="Screen / Social">{FORMATS.filter(f=>f.screen).map(f=><option key={f.id} value={f.id}>{f.label}</option>)}</optgroup></select></div>
          <div className="form-group full">
            <label>Image layout</label>
            <ImageModePicker mode={imageMode} onChange={m=>{
              setImageMode(m);
              if(m==='none') setPoster(p=>({...p,fgImage:null,fgImageUrl:null,bgImage:null,bgImageUrl:null}));
            }}/>
            {imageMode!=='none'&&<div style={{fontSize:'.72rem',color:'#888',marginTop:'.5rem'}}>
              <span style={{cursor:'pointer',color:'#5aafff'}} onClick={()=>setImageMode('none')}>← Reset to text only</span>
            </div>}
          </div>
          {(imageMode==='fg'||imageMode==='both')&&(
            <div className="form-group full">
              <label>Foreground Image</label>
              <div style={{display:'flex',gap:'.4rem',alignItems:'center',marginBottom:'.4rem'}}>
                <button className="btn btn-blue btn-small" onClick={()=>generateImage('fg')} disabled={generatingImage==='fg'} type="button">
                  {generatingImage==='fg'?'Generating...':'✦ Generate with AI'}
                </button>
                <label className="btn btn-secondary btn-small" style={{cursor:'pointer',margin:0}}>
                  Upload <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleImageUpload(e.target.files[0],'fg')}/>
                </label>
              </div>
              {uploading.fg&&<span className="uploading">Uploading...</span>}
              {poster.fgImageUrl&&<span style={{fontSize:'.72rem',color:'#5aff7a'}}>✓ Uploaded</span>}
            </div>
          )}
          {(imageMode==='bg'||imageMode==='both')&&(
            <div className="form-group full">
              <label>Background Image</label>
              <div style={{display:'flex',gap:'.4rem',alignItems:'center',marginBottom:'.4rem',flexWrap:'wrap'}}>
                <button className="btn btn-blue btn-small" onClick={()=>setShowGenOptions(o=>!o)} type="button">
                  ✦ AI options {showGenOptions?'▲':'▼'}
                </button>
                <button className="btn btn-blue btn-small" onClick={()=>generateImage('bg')} disabled={!!generatingImage} type="button">
                  {generatingImage==='bg'?'Generating...':'Generate'}
                </button>
                <label className="btn btn-secondary btn-small" style={{cursor:'pointer',margin:0}}>
                  Upload <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleImageUpload(e.target.files[0],'bg')}/>
                </label>
                {genError&&<span style={{fontSize:'.75rem',color:'#ff7a7a'}}>{genError}</span>}
              </div>
              {showGenOptions&&<GenImageOptions
                code={code}
                selectedStyle={selectedStyle} setSelectedStyle={setSelectedStyle}
                selectedKeywords={selectedKeywords} setSelectedKeywords={setSelectedKeywords}
                customPrompt={customPrompt} setCustomPrompt={setCustomPrompt}
                generatingImage={generatingImage} generateImage={generateImage}
              />}
              {uploading.bg&&<span className="uploading">Uploading...</span>}
              {poster.bgImageUrl&&<span style={{fontSize:'.72rem',color:'#5aff7a'}}>✓ Uploaded</span>}
            </div>
          )}

          {!isScreen&&<div className="form-group full"><label>Duplex Printing</label><div style={{display:'flex',gap:'.5rem',marginTop:'.3rem'}}>{[['none','Single sided'],['same','Same on both sides'],['different','Different design on back']].map(([val,lbl])=><div key={val} className={`channel-btn${duplex===val?' selected':''}`} style={{flex:1}} onClick={()=>setDuplex(val)}>{lbl}</div>)}</div></div>}

        {needsCropMarks?<div className="crop-wrap"><CropMarks posterW={fmt.w} posterH={fmt.h}/>{PosterContent}</div>:PosterContent}
        {duplex!=='none'&&<>
          <div className="no-print" style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.1em',color:'#555',textAlign:'center',margin:'2rem 0 .5rem'}}>Side 2</div>

          {duplex==='different'&&<DuplexBack poster={poster} backPoster={backPoster} backPosterRef={backPosterRef} setBackPoster={setBackPoster} setSaveStatus={setSaveStatus} backUploading={backUploading} setBackUploading={setBackUploading}/>}
        </>}
      </div>
      {/* ── Controls below poster ─────────────────────── */}
      <div ref={posterBottomRef} className="no-print card" style={{marginTop:'1rem'}}>
        <h2>Adjust poster</h2>
        <div className="form-grid">
          <div className="form-group"><label>Text Colour</label><input type="color" value={poster.textColor} onChange={e=>setPoster(p=>({...p,textColor:e.target.value}))}/></div>
          {poster.bgImage&&<>
            <div className="form-group"><label>Overlay Opacity — {Math.round(poster.overlayOpacity*100)}%</label><input type="range" min="0" max="1" step="0.05" value={poster.overlayOpacity} onChange={e=>setPoster(p=>({...p,overlayOpacity:parseFloat(e.target.value)}))}/></div>
            <div className="form-group"><label>Overlay Colour</label><input type="color" value={poster.overlayColor} onChange={e=>setPoster(p=>({...p,overlayColor:e.target.value}))}/></div>
          </>}
          <div className="form-group full" style={{flexDirection:'row',justifyContent:'flex-end',gap:'.5rem'}}>
            {isScreen
              ? <button className="btn btn-primary" onClick={downloadImage} disabled={downloading}>{downloading?'Downloading...':'Download Image'}</button>
              : <button className="btn btn-primary" onClick={()=>window.print()}>Print</button>

    </div>
  );
}

function PrintQueue({queue,templates,designs,onRemove,onClear,onSaved}){

}

function Library({codes,destinations,onRefresh,onAddToPrintQueue,onDistribute,isAdmin,sortField,setSortField,sortDir,setSortDir,newCodeId,activeTask}){
  const toggleActive=async(code)=>{await supabase(`/rest/v1/qr_codes?id=eq.${code.id}`,'PATCH',{active:!code.active});onRefresh();}

  function handleSort(field){
    if(sortField===field){setSortDir(d=>d==='asc'?'desc':'asc');}
    else{setSortField(field);setSortDir('asc');}
  }

  // Map task step names to library actions
  const STEP_ACTION={'Poster':'poster','Distribute':'distribute'};

  // When a task is active, pin the most recently created code (not just the 8-second newCodeId window)
  const taskCodeId = activeTask
    ? (newCodeId || (codes.length>0 ? [...codes].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0]?.id : null))
    : newCodeId;

  const nextTaskStep=activeTask&&taskCodeId
    ? (activeTask.steps.map(s=>STEP_ACTION[s]).find(Boolean)||null)
    : null;

  const sorted=[...codes].sort((a,b)=>{
    // Always pin the active task code to the top
    if(a.id===taskCodeId) return -1;
    if(b.id===taskCodeId) return 1;
    let av=a[sortField],bv=b[sortField];
    if(sortField==='scan_count'){av=av||0;bv=bv||0;return sortDir==='asc'?av-bv:bv-av;}
    if(sortField==='label'){av=(av||'').toLowerCase();bv=(bv||'').toLowerCase();}
    else{av=av||'';bv=bv||'';}
    if(av<bv) return sortDir==='asc'?-1:1;
    if(av>bv) return sortDir==='asc'?1:-1;
    return 0;
  });

  function SortTh({field,label}){
    const active=sortField===field;
    return(
      <th onClick={()=>handleSort(field)}
        style={{cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}}
        title={"Sort by "+label}>
        {label}{active?' '+(sortDir==='asc'?'↑':'↓'):''}
      </th>
    );
  }

  if(!codes.length) return <div className="empty">No QR codes yet</div>;
  return(
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      <table>
        <thead>
          <tr>
            <SortTh field="label" label="Label"/>
            <SortTh field="type" label="Type"/>
            <th>Source</th>
            <SortTh field="scan_count" label="Scans"/>
            <SortTh field="placement" label="Placement"/>
            <SortTh field="active" label="Status"/>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map(c=>{
            const warn=hasDestinationWarning(c);
            const dest=destinations.find(d=>d.id===c.destination_id);
            const isNew=c.id===taskCodeId;
            return(
              <React.Fragment key={c.id}>
                {isNew&&nextTaskStep&&(
                  <tr style={{background:'#2a1f00'}}>
                    <td colSpan={7} style={{padding:'.5rem .8rem',borderBottom:'none'}}>
                      <span style={{fontSize:'.72rem',letterSpacing:'.1em',textTransform:'uppercase',color:'#ffaa5a',fontWeight:600}}>↑ Active task: {activeTask.label}</span>
                      <span style={{fontSize:'.72rem',color:'#cc8840',marginLeft:'1rem'}}>Next step →</span>
                      <span style={{fontSize:'.72rem',background:'#ffaa5a',color:'#1a0f00',padding:'.1rem .5rem',borderRadius:'2px',marginLeft:'.4rem',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>{nextTaskStep==='poster'?'Make a Poster':'Distribute'}</span>
                    </td>
                  </tr>
                )}
                <tr style={isNew?{background:'#1a2a1a',outline:'2px solid #2a7a2a',outlineOffset:'-2px'}:{}}>
                  <td>
                    {isNew&&<span style={{fontSize:'.65rem',background:'#2a7a2a',color:'#5aff7a',padding:'.1rem .4rem',borderRadius:'2px',marginRight:'.4rem',textTransform:'uppercase',letterSpacing:'.06em'}}>New</span>}
                    <strong>{c.label}</strong>
                    {c.linked_ca017_event_id&&<div><span className="badge badge-event" style={{marginTop:'.2rem'}}>CA-017</span></div>}
                    {c.linked_ca025_opportunity_id&&<div><span className="badge badge-opportunity" style={{marginTop:'.2rem'}}>CA-025</span></div>}
                    <br/><span className="slug-display">/e/{c.slug}</span>
                  </td>
                  <td><TypeBadge type={c.type}/></td>
                  <td>
                    <div style={{fontSize:'.8rem'}}>
                      {dest?<span>{dest.label}</span>:<span className="slug-display">{c.destination_url?.substring(0,40)}...</span>}
                      {warn&&<div><span className="badge badge-warning" style={{marginTop:'.2rem'}}>⚠ Destination changed</span></div>}
                    </div>
                  </td>
                  <td><span className="scan-count">{c.scan_count}</span></td>
                  <td><span style={{fontSize:'.8rem'}}>{c.placement||'—'}</span></td>
                  <td><span className={`badge badge-${c.active?'active':'inactive'}`}>{c.active?'active':'inactive'}</span></td>
                  <td>
                    <div className="actions">
                      <button
                        className="btn btn-small"
                        style={isNew&&nextTaskStep==='poster'
                          ?{background:'#7a5a00',color:'#ffcc44',border:'1px solid #aa8800',fontWeight:700}
                          :{background:'none',border:'1px solid #444',color:'#aaa'}}
                        onClick={()=>onAddToPrintQueue(c)}>
                        {isNew&&nextTaskStep==='poster'?'Make Poster →':'Poster'}
                      </button>
                      {isAdmin&&<button
                        className="btn btn-small"
                        style={isNew&&nextTaskStep==='distribute'
                          ?{background:'#7a5a00',color:'#ffcc44',border:'1px solid #aa8800',fontWeight:700}
                          :{background:'#1a5c1a',color:'#5aff7a',border:'1px solid #2a7a2a'}}
                        onClick={()=>onDistribute(c)}>
                        {isNew&&nextTaskStep==='distribute'?'Distribute →':'Distribute'}
                      </button>}
                      {isAdmin&&<button className="btn btn-secondary btn-small" onClick={()=>toggleActive(c)}>{c.active?'Deactivate':'Activate'}</button>}
                    </div>
                  </td>
                </tr>
              </React.Fragment>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function CreateForm({destinations,onCreate}){
  const [form,setForm]=useState({label:'',type:'event',destination_id:'',custom_url:'',placement:'',slug:''});
  const [useCustom,setUseCustom]=useState(false);
  const [status,setStatus]=useState(null);
  const [loading,setLoading]=useState(false);
  const [events,setEvents]=useState([]);
  const [loadingEvents,setLoadingEvents]=useState(false);
  const [selectedEventId,setSelectedEventId]=useState('');
  const [eventMeta,setEventMeta]=useState(null);

  useEffect(()=>{
    if(form.type==='event'){
      setLoadingEvents(true);
      setEvents([]);
      // Fetch all events then filter client-side — avoids PostgREST date encoding issues
      supabase('/rest/v1/events?select=*&order=starts_at.asc&limit=100')
        .then(data=>{
          if(Array.isArray(data)){
            const now=new Date();
            // Show upcoming events first, but include recent past too (last 7 days)
            const cutoff=new Date(now.getTime()-7*24*60*60*1000);
            const filtered=data.filter(e=>!e.starts_at||new Date(e.starts_at)>cutoff);
            setEvents(filtered.length>0?filtered:data);
          }
        })
        .catch(()=>{})
        .finally(()=>setLoadingEvents(false));
    }
  },[form.type]);

  function selectEvent(eventId){
    setSelectedEventId(eventId);
    const ev=events.find(e=>e.id===eventId);
    if(!ev){setEventMeta(null);return;}
    const label=ev.title;
    const url='https://invysible-college-events-engine.vercel.app/book/'+ev.id;
    // Format date/time
    let dateText='';
    if(ev.starts_at){
      const d=new Date(ev.starts_at);
      dateText=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
      dateText+=' · '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      if(ev.ends_at){
        const e2=new Date(ev.ends_at);
        dateText+='–'+e2.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      }
    }
    // Price
    const rawPrice=ev.ticket_price!=null?ev.ticket_price:(ev.price!=null?ev.price:(ev.price_per_ticket!=null?ev.price_per_ticket:(ev.cost!=null?ev.cost:null)));
const price=rawPrice!=null?(Number(rawPrice)===0?'Free':'£'+Number(rawPrice).toFixed(2)):'Admission Free';
    const meta={subtitle:ev.description||ev.short_description||ev.subtitle||'',dateText,price:price||'',url};
    setEventMeta(meta);
    setForm(f=>({...f,label,slug:slugify(label),destination_id:'',custom_url:url,_slugEdited:false,_linkedEventId:eventId,_eventMeta:meta}));
    setUseCustom(true);
  }
  function set(k,v){setForm(f=>{const n={...f,[k]:v};if(k==='label'&&!f._slugEdited) n.slug=slugify(v);if(k==='type'){n.destination_id='';n.custom_url='';}return n;});}
  const filteredDests=destinations.filter(d=>d.type===form.type||d.type==='generic');
  const selectedDest=destinations.find(d=>d.id===form.destination_id);
  const finalUrl=useCustom?form.custom_url:(selectedDest?.url||'');
  const submit=async()=>{
    if(!form.label||!form.slug){setStatus({type:'error',msg:'Label and slug are required.'});return;}
    if(!finalUrl){setStatus({type:'error',msg:'Please select a destination or enter a custom URL.'});return;}
    setLoading(true);setStatus(null);
    const res=await supabase('/rest/v1/qr_codes','POST',{slug:form.slug,type:form.type,label:form.label,destination_url:finalUrl,destination_id:(!useCustom&&form.destination_id)||null,placement:form.placement||null,linked_ca017_event_id:form._linkedEventId||null},'return=representation');
    setLoading(false);
    if(res.error||(Array.isArray(res)&&res[0]?.code)){setStatus({type:'error',msg:res.message||res[0]?.message||'Error creating code.'});}
    else{setStatus({type:'success',msg:`Code created: ${BASE_URL}/e/${form.slug}`});const _meta=form._eventMeta||null;setForm({label:'',type:'event',destination_id:'',custom_url:'',placement:'',slug:''});setUseCustom(false);setSelectedEventId('');setEventMeta(null);onCreate(Array.isArray(res)?res[0]?.id:res?.id,_meta);}
  }
  return(<div className="card"><h2>New QR Code</h2>{status&&<div className={status.type==='error'?'error':'success'}>{status.msg}</div>}<div className="form-grid"><div className="form-group"><label>Label</label><input value={form.label} onChange={e=>set('label',e.target.value)} placeholder="e.g. Wine Tasting April"/></div><div className="form-group"><label>Type</label><select value={form.type} onChange={e=>{set('type',e.target.value);setSelectedEventId('');setEventMeta(null);}}>{TYPES.map(t=><option key={t}>{t}</option>)}</select></div>{form.type==='event'&&<div className="form-group full"><label>Pick event from CA-017</label>{loadingEvents?<div style={{fontSize:'.82rem',opacity:.6}}>Loading events...</div>:<select value={selectedEventId} onChange={e=>selectEvent(e.target.value)}><option value="">— select an event to auto-populate —</option>{events.map(e=><option key={e.id} value={e.id}>{e.title}{e.starts_at?' · '+new Date(e.starts_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):''}</option>)}</select>}{events.length===0&&!loadingEvents&&<div style={{fontSize:'.78rem',opacity:.6,marginTop:'.3rem'}}>No upcoming events found — check CA-017 has published events</div>}</div>}
      {eventMeta&&selectedEventId&&(
        <div className="form-group full">
          <div className="event-meta-preview">
            <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.08em',color:'#5aafff',marginBottom:'.5rem'}}>Event details — will auto-populate poster</div>
            {eventMeta.dateText&&<div style={{fontSize:'.85rem',marginBottom:'.2rem'}}>{eventMeta.dateText}</div>}
            {eventMeta.subtitle&&<div style={{fontSize:'.82rem',opacity:.7,marginBottom:'.2rem'}}>{eventMeta.subtitle}</div>}
            {eventMeta.price&&<div style={{fontSize:'.85rem',fontWeight:600}}>{eventMeta.price}</div>}
          </div>
        </div>
      )}{!useCustom?<div className="form-group full"><label>Communication Source</label><select value={form.destination_id} onChange={e=>set('destination_id',e.target.value)}><option value="">— select a communication source —</option>{filteredDests.map(d=><option key={d.id} value={d.id}>{d.label} — {d.url}</option>)}</select><div style={{marginTop:'.4rem'}}><button className="btn btn-secondary btn-small" onClick={()=>setUseCustom(true)}>Use custom URL instead</button></div></div>:<div className="form-group full"><label>Custom URL</label><input value={form.custom_url} onChange={e=>set('custom_url',e.target.value)} placeholder="https://..."/><div style={{marginTop:'.4rem'}}><button className="btn btn-secondary btn-small" onClick={()=>setUseCustom(false)}>Use source library instead</button></div></div>}<div className="form-group"><label>Slug (auto-generated)</label><input value={form.slug} onChange={e=>setForm(f=>({...f,slug:e.target.value,_slugEdited:true}))} placeholder="e.g. wine-tasting-april"/></div><div className="form-group"><label>Placement (optional)</label><select value={form.placement} onChange={e=>set('placement',e.target.value)}><option value="">— select —</option>{PLACEMENTS.map(p=><option key={p}>{p}</option>)}</select></div>{form.slug&&finalUrl&&<div className="form-group full" style={{flexDirection:'row',alignItems:'center',gap:'1rem'}}><QRWidget url={`${BASE_URL}/e/${form.slug}`} size={72}/><div><div className="slug-display">{BASE_URL}/e/{form.slug}</div><div style={{fontSize:'.75rem',color:'#555',marginTop:'.3rem'}}>→ {finalUrl}</div></div></div>}<div className="form-group full" style={{flexDirection:'row',justifyContent:'flex-end'}}><button className="btn btn-primary" onClick={submit} disabled={loading}>{loading?'Creating...':'Create Code'}</button></div></div></div>);
}

function ShareDestModal({dest,scanUrl,onClose}){
  const [email,setEmail]=useState('');
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(false);
  const [err,setErr]=useState('');
  async function send(){
    if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){setErr('Please enter a valid email.');return;}
    setSending(true);setErr('');
    try{
      const res=await fetch('/api/send-destination',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({to:email,label:dest.label,url:dest.url,scan_url:scanUrl,slug:dest.slug})});
      if(res.ok){setSent(true);}else{const d=await res.json().catch(()=>({}));setErr(d.error||'Send failed.');}
    }catch(e){setErr('Network error.');}
    setSending(false);
  }
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'6px',padding:'1.5rem',width:'100%',maxWidth:'420px',boxShadow:'0 8px 32px rgba(0,0,0,0.2)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem'}}>
          <h3 style={{margin:0,fontSize:'1rem'}}>Share by email</h3>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:'1.2rem',color:'var(--text-2)',lineHeight:1}}>&times;</button>
        </div>
        <div style={{marginBottom:'1rem',padding:'.7rem',background:'var(--bg-raised)',borderRadius:'3px',border:'1px solid var(--border)'}}>
          <div style={{fontSize:'.88rem',fontWeight:600,color:'var(--text-1)',marginBottom:'.2rem'}}>{dest.label}</div>
          <div style={{fontSize:'.75rem',fontFamily:'monospace',color:'var(--text-2)',wordBreak:'break-all'}}>{scanUrl||dest.url}</div>
        </div>
        {!sent?(
          <>
            <div className="form-group" style={{marginBottom:'1rem'}}>
              <label>Recipient email</label>
              <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="e.g. speaker@example.com"
                onKeyDown={e=>{if(e.key==='Enter')send();}} autoFocus/>
            </div>
            {err&&<div className="error" style={{marginBottom:'.8rem'}}>{err}</div>}
            <div style={{display:'flex',gap:'.5rem',justifyContent:'flex-end'}}>
              <button className="btn btn-secondary btn-small" onClick={onClose}>Cancel</button>
              <button className="btn btn-primary btn-small" onClick={send} disabled={sending}>{sending?'Sending...':'Send QR code'}</button>
            </div>
          </>
        ):(
          <div style={{textAlign:'center',padding:'1rem 0'}}>
            <div style={{fontSize:'2rem',marginBottom:'.5rem'}}>✓</div>
            <div style={{fontWeight:600,color:'var(--text-1)',marginBottom:'.25rem'}}>Sent to {email}</div>
            <div style={{fontSize:'.82rem',color:'var(--text-2)',marginBottom:'1rem'}}>QR code and destination details delivered.</div>
            <button className="btn btn-secondary btn-small" onClick={onClose}>Close</button>
          </div>
        )}

}

function DestQR({url,scanUrl}){
  const ref=useRef(null);
  const [expanded,setExpanded]=useState(false);
  useEffect(()=>{
    if(!ref.current||!url) return;
    ref.current.innerHTML='';
    new QRCode(ref.current,{text:scanUrl||url,width:expanded?160:52,height:expanded?160:52,colorDark:'#111',colorLight:'#fff'});
  },[url,scanUrl,expanded]);
  if(!url) return null;
  return(
    <div style={{position:'relative',flexShrink:0,cursor:'pointer'}} onClick={e=>{e.stopPropagation();setExpanded(x=>!x);}}>
      <div ref={ref} style={{borderRadius:'2px',overflow:'hidden',border:'1px solid var(--border)'}}/>
      {expanded&&<div style={{position:'absolute',right:0,top:'60px',zIndex:50,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'4px',padding:'8px',boxShadow:'0 4px 16px rgba(0,0,0,0.2)'}}>
        <div style={{fontSize:'10px',color:'var(--text-3)',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:'6px'}}>Scan URL</div>
        <div style={{fontSize:'11px',fontFamily:'monospace',color:'var(--text-2)',wordBreak:'break-all',maxWidth:'200px',marginBottom:'8px'}}>{scanUrl||url}</div>
        <button style={{fontSize:'11px',padding:'4px 8px',background:'none',border:'1px solid var(--border)',borderRadius:'2px',color:'var(--text-2)',cursor:'pointer'}} onClick={e=>{e.stopPropagation();navigator.clipboard.writeText(scanUrl||url);}}>Copy URL</button>
      </div>}
    </div>
  );
}

function Destinations({destinations,codes,onRefresh,isAdmin}){
  const [form,setForm]=useState({label:'',url:'',type:'generic',pinned:false});
  const [editing,setEditing]=useState(null);
  const [status,setStatus]=useState(null);
  const [collapsed,setCollapsed]=useState({});
  const [sharing,setSharing]=useState(null);
  const [sortBy,setSortBy]=useState('az');
  function toggleCollapse(type){setCollapsed(c=>({...c,[type]:!c[type]}));}
  function sortItems(items,type){
    if(type!=='event') return items;
    var arr=items.slice();
    if(sortBy==='az') arr.sort(function(a,b){return a.label.localeCompare(b.label);});
    else if(sortBy==='za') arr.sort(function(a,b){return b.label.localeCompare(a.label);});
    else if(sortBy==='pinned') arr.sort(function(a,b){return (b.pinned?1:0)-(a.pinned?1:0);});
    return arr;
  }
  const save=async()=>{
    if(!form.label||!form.url){setStatus({type:'error',msg:'Label and URL are required.'});return;}
    if(editing){await supabase(`/rest/v1/destinations?id=eq.${editing}`,'PATCH',{label:form.label,url:form.url,type:form.type,pinned:form.pinned});setStatus({type:'success',msg:'Destination updated.'});setEditing(null);}
    else{await supabase('/rest/v1/destinations','POST',{label:form.label,url:form.url,type:form.type,pinned:form.pinned});setStatus({type:'success',msg:'Destination created.'});}
    setForm({label:'',url:'',type:'generic',pinned:false});onRefresh();
  }
  const remove=async(id)=>{await supabase(`/rest/v1/destinations?id=eq.${id}`,'DELETE');onRefresh();}
  function startEdit(d){setEditing(d.id);setForm({label:d.label,url:d.url,type:d.type,pinned:d.pinned});setTimeout(function(){var el=document.getElementById('dest-editor-top');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},50);}
  const byType=TYPES.reduce((acc,t)=>{acc[t]=destinations.filter(d=>d.type===t);return acc;},{});
  const codesByDest=(codes||[]).reduce(function(acc,c){if(c.destination_id){acc[c.destination_id]=c;}return acc;},{});
  return(<div>{isAdmin&&<div id="dest-editor-top" className="card"><h2>{editing?'Edit Destination':'New Destination'}</h2>{status&&<div className={status.type==='error'?'error':'success'}>{status.msg}</div>}<div className="form-grid"><div className="form-group"><label>Label</label><input value={form.label} onChange={e=>setForm(f=>({...f,label:e.target.value}))} placeholder="e.g. Wine Tasting April — Tickets"/></div><div className="form-group"><label>Type</label><select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>{TYPES.map(t=><option key={t}>{t}</option>)}</select></div><div className="form-group full"><label>URL</label><input value={form.url} onChange={e=>setForm(f=>({...f,url:e.target.value}))} placeholder="https://..."/></div><div className="form-group full"><label style={{flexDirection:'row',display:'flex',alignItems:'center',gap:'.5rem',cursor:'pointer'}}><input type="checkbox" checked={form.pinned} onChange={e=>setForm(f=>({...f,pinned:e.target.checked}))}/>Pin — never auto-update QR codes pointing here</label></div><div className="form-group full" style={{flexDirection:'row',justifyContent:'flex-end',gap:'.5rem'}}>{editing&&<button className="btn btn-secondary" onClick={()=>{setEditing(null);setForm({label:'',url:'',type:'generic',pinned:false});}}>Cancel</button>}<button className="btn btn-primary" onClick={save}>{editing?'Save Changes':'Add Destination'}</button></div></div></div>}{TYPES.map(type=>{const items=byType[type]||[];if(!items.length) return null;const isCollapsed=collapsed[type];return(<div key={type} className="card"><h2 style={{cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',userSelect:'none'}} onClick={()=>toggleCollapse(type)}><span style={{display:'flex',alignItems:'center',gap:'.5rem',flexWrap:'wrap'}}><TypeBadge type={type}/><span style={{marginLeft:'.5rem'}}>{type.charAt(0).toUpperCase()+type.slice(1)} Destinations</span><span style={{fontSize:'.78rem',color:'#888',fontWeight:400}}>({items.length})</span></span>{type==='event'&&!isCollapsed&&<select value={sortBy} onChange={e=>{e.stopPropagation();setSortBy(e.target.value);}} onClick={e=>e.stopPropagation()} style={{fontSize:'.72rem',padding:'.15rem .4rem',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'2px',color:'var(--text-2)',cursor:'pointer',marginRight:'1rem'}}><option value='az'>A → Z</option><option value='za'>Z → A</option><option value='pinned'>Pinned first</option></select>}<span style={{fontSize:'1rem',color:'#888',transition:'transform 0.2s',display:'inline-block',transform:isCollapsed?'rotate(-90deg)':'rotate(0deg)'}}>&#x25BE;</span></h2>{!isCollapsed&&<div>{sortItems(items,type).map(d=>(<div className="dest-item" key={d.id} style={{alignItems:"flex-start",gap:"10px"}}><DestQR url={codesByDest[d.id]?`https://go.theartyst.co.uk/e/${codesByDest[d.id].slug}`:d.url} scanUrl={codesByDest[d.id]?`https://go.theartyst.co.uk/e/${codesByDest[d.id].slug}`:null}/><div className="dest-info"><div className="dest-label">{d.label}{d.pinned&&<span className="pin-badge">PINNED</span>}</div><div className="dest-url">{d.url}</div></div>{isAdmin&&<div className="actions"><button className="btn btn-secondary btn-small" onClick={()=>startEdit(d)}>Edit</button><button className="btn btn-secondary btn-small" onClick={()=>{navigator.clipboard.writeText(d.url);setStatus({type:'success',msg:'URL copied.'});}}>Copy URL</button><button className="btn btn-blue btn-small" onClick={()=>setSharing({dest:d,scanUrl:codesByDest[d.id]?`https://go.theartyst.co.uk/e/${codesByDest[d.id].slug}`:null})}>Share</button><button className="btn btn-secondary btn-small" onClick={()=>remove(d.id)}>Delete</button></div>}</div>))}</div>}</div>);})}{!destinations.length&&<div className="empty">No destinations yet</div>}{sharing&&<ShareDestModal dest={sharing.dest} scanUrl={sharing.scanUrl} onClose={()=>setSharing(null)}/>}</div>);

function Distribute({codes,groups,staffList,onStaffCreated,onDistributed,initialCode}){
  const [selectedCode,setSelectedCode]=useState(initialCode?.id||'');
  const [selectedChannels,setSelectedChannels]=useState([]);
  const [selectedGroups,setSelectedGroups]=useState([]);
  const [confirming,setConfirming]=useState(false);
  const [staffName,setStaffName]=useState('');
  const [staffSuggestions,setStaffSuggestions]=useState([]);
  const [note,setNote]=useState('');
  const [replyTo,setReplyTo]=useState('jobs@theartyst.co.uk');
  const [status,setStatus]=useState(null);
  const [loading,setLoading]=useState(false);
  useEffect(()=>{if(initialCode) setSelectedCode(initialCode.id);},[initialCode]);
  function toggleChannel(ch){setSelectedChannels(s=>s.includes(ch)?s.filter(c=>c!==ch):[...s,ch]);}
  function toggleGroup(id){setSelectedGroups(s=>s.includes(id)?s.filter(g=>g!==id):[...s,id]);}
  function handleStaffInput(val){setStaffName(val);if(val.length<2){setStaffSuggestions([]);return;}setStaffSuggestions(staffList.filter(s=>s.name.toLowerCase().includes(val.toLowerCase())));}
  const confirmDistribute=async()=>{
    if(!staffName){setStatus({type:'error',msg:'Please enter your name.'});return;}
    setLoading(true);
    const code=codes.find(c=>c.id===selectedCode);
    const errors=[];
    if(selectedChannels.includes('email')){try{const res=await fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({qr_code_id:selectedCode,slug:code?.slug,label:code?.label,type:code?.type,redirect_url:`${BASE_URL}/e/${code?.slug}`,destination_url:code?.destination_url,group_ids:selectedGroups,staff_name:staffName,note:note||null,reply_to:replyTo})});const data=await res.json();if(!res.ok) errors.push('Email: '+(data.error||'failed'));}catch(e){errors.push('Email: network error');}}
    const waChannelMap={'whatsapp-artyst':'artyst','whatsapp-ic':'ic','whatsapp-tours':'tours','whatsapp-community':'artyst_community'};
    for(const [btnId,channelKey] of Object.entries(waChannelMap)){
      if(selectedChannels.includes(btnId)){
        try{const res=await fetch('/api/send-whatsapp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({qr_code_id:selectedCode,slug:code?.slug,label:code?.label,type:code?.type,redirect_url:`${BASE_URL}/e/${code?.slug}`,channel:channelKey,staff_name:staffName,note:note||null})});const data=await res.json();if(!res.ok) errors.push(CHANNELS[btnId]?.label+': '+(data.error||'failed'));}catch(e){errors.push(CHANNELS[btnId]?.label+': network error');}
      }
    }
    const otherChannels=selectedChannels.filter(c=>!c.startsWith('whatsapp'));
    if(otherChannels.length>0){let staffId;const existing=staffList.find(s=>s.name.toLowerCase()===staffName.toLowerCase());if(existing){staffId=existing.id;}else{const res=await supabase('/rest/v1/staff','POST',{name:staffName},'return=representation');staffId=Array.isArray(res)?res[0]?.id:res?.id;if(staffId) onStaffCreated();}await supabase('/rest/v1/distributions','POST',{qr_code_id:selectedCode,staff_id:staffId,note:note||null,channels:otherChannels,groups:selectedGroups,status:'sent'});await supabase(`/rest/v1/qr_codes?id=eq.${selectedCode}`,'PATCH',{last_distributed_at:new Date().toISOString()});}
    setLoading(false);
    if(errors.length>0){setStatus({type:'error',msg:errors.join(' · ')});}
    else{setStatus({type:'success',msg:'Sent successfully.'});setConfirming(false);setSelectedCode('');setSelectedChannels([]);setSelectedGroups([]);setNote('');setStaffName('');setReplyTo('jobs@theartyst.co.uk');onDistributed();}
  }
  const code=codes.find(c=>c.id===selectedCode);
  const needsGroups=selectedChannels.includes('email');
  return(<div className="card"><h2>Distribute</h2>{status&&<div className={status.type==='error'?'error':'success'}>{status.msg}</div>}<div className="form-group" style={{marginBottom:'1.5rem'}}><label>Select Code</label><select value={selectedCode} onChange={e=>setSelectedCode(e.target.value)}><option value="">— select a code —</option>{codes.map(c=><option key={c.id} value={c.id}>{c.label} · /e/{c.slug}</option>)}</select></div>{CHANNEL_SECTIONS.map(section=>(<div className="channel-section" key={section}><h3>{section}</h3><div className="channel-grid">{Object.entries(CHANNELS).filter(([,v])=>v.section===section).map(([id,{label}])=>(<div key={id} className={`channel-btn${selectedChannels.includes(id)?' selected':''}`} onClick={()=>toggleChannel(id)}>{label}</div>))}</div></div>))}{needsGroups&&<div className="channel-section"><h3>Target Groups</h3>{!groups.length&&<div style={{fontSize:'.82rem',color:'#555'}}>No groups yet — create them in the Groups tab</div>}<div className="channel-grid">{groups.map(g=>(<div key={g.id} className={`channel-btn${selectedGroups.includes(g.id)?' selected':''}`} onClick={()=>toggleGroup(g.id)}>{g.name}</div>))}</div></div>}{selectedCode&&selectedChannels.length>0&&<div style={{display:'flex',justifyContent:'flex-end',marginTop:'1rem'}}><button className="btn btn-primary" onClick={()=>setConfirming(true)}>Review & Send</button></div>}{confirming&&<div className="confirm-panel"><h3>Confirm Distribution</h3><ul className="confirm-list"><li><strong>Code:</strong> {code?.label}</li><li><strong>Channels:</strong> {selectedChannels.map(c=>CHANNELS[c]?.label).join(', ')}</li>{selectedGroups.length>0&&<li><strong>Groups:</strong> {selectedGroups.map(id=>groups.find(g=>g.id===id)?.name).join(', ')}</li>}</ul><div className="form-grid"><div className="form-group"><label>Your Name</label><input value={staffName} onChange={e=>handleStaffInput(e.target.value)} placeholder="Start typing..."/>{staffSuggestions.length>0&&<div style={{background:'#222',border:'1px solid #333',borderRadius:'2px',marginTop:'2px'}}>{staffSuggestions.map(s=><div key={s.id} style={{padding:'.5rem .8rem',cursor:'pointer',fontSize:'.85rem'}} onClick={()=>{setStaffName(s.name);setStaffSuggestions([]);}}>{s.name}</div>)}</div>}</div><div className="form-group"><label>Note (optional)</label><input value={note} onChange={e=>setNote(e.target.value)} placeholder="e.g. Pre-event push"/></div>{selectedChannels.includes('email')&&<div className="form-group full"><label>Reply-to address</label><select value={replyTo} onChange={e=>setReplyTo(e.target.value)}><option value="jobs@theartyst.co.uk">jobs@theartyst.co.uk</option><option value="hello@theartyst.co.uk">hello@theartyst.co.uk</option><option value="events@theartyst.co.uk">events@theartyst.co.uk</option><option value="matthew@othersyde.co.uk">matthew@othersyde.co.uk</option><option value="bookings@alcademy.co.uk">bookings@alcademy.co.uk</option></select></div>}</div><div style={{display:'flex',gap:'.5rem',justifyContent:'flex-end',marginTop:'1rem'}}><button className="btn btn-secondary" onClick={()=>setConfirming(false)}>Cancel</button><button className="btn btn-primary" onClick={confirmDistribute} disabled={loading}>{loading?'Sending...':'Confirm & Send'}</button></div></div>}</div>);
}

              </div>
              <div style={{display:'flex',gap:'.5rem',alignItems:'center'}}>
                <span style={{fontSize:'.78rem'}}>{member?.name||'Unknown'}</span>
                <span style={{fontSize:'.75rem',opacity:.6}}>

          </div>
        );
      })}
      {filtered.length===0&&<div className="empty">No distributions match this filter</div>}
    </div>
  );
}

function Reports({codes,scanEvents}){
  const topCodes=[...codes].sort((a,b)=>b.scan_count-a.scan_count).slice(0,8);
  const maxScans=topCodes[0]?.scan_count||1;
  const byDevice=scanEvents.reduce((acc,e)=>{acc[e.device_type]=(acc[e.device_type]||0)+1;return acc;},{});
  const totalScans=scanEvents.length||1;
  const byDay=scanEvents.reduce((acc,e)=>{const d=new Date(e.scanned_at).toLocaleDateString('en-GB',{weekday:'short'});acc[d]=(acc[d]||0)+1;return acc;},{});
  const byHour=scanEvents.reduce((acc,e)=>{const h=`${new Date(e.scanned_at).getHours()}:00`;acc[h]=(acc[h]||0)+1;return acc;},{});
  const topHours=Object.entries(byHour).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const byPlacement=codes.reduce((acc,c)=>{if(c.placement) acc[c.placement]=(acc[c.placement]||0)+c.scan_count;return acc;},{});
  const maxPlacement=Math.max(...Object.values(byPlacement),1);
  function Bar({value,max}){return <div style={{background:'#222',borderRadius:'2px',height:'8px'}}><div className="report-bar" style={{width:`${(value/max)*100}%`}}/></div>;}
  return(<div><div className="two-col"><div className="card"><h2>Top Codes by Scans</h2>{topCodes.map(c=>(<div className="report-row" key={c.id}><div className="report-label"><span>{c.label}</span><span>{c.scan_count}</span></div><Bar value={c.scan_count} max={maxScans}/></div>))}{!topCodes.length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}</div><div className="card"><h2>Scans by Device</h2>{Object.entries(byDevice).map(([type,count])=>(<div className="report-row" key={type}><div className="report-label"><span style={{textTransform:'capitalize'}}>{type}</span><span>{Math.round((count/totalScans)*100)}%</span></div><Bar value={count} max={totalScans}/></div>))}{!Object.keys(byDevice).length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}</div></div><div className="two-col"><div className="card"><h2>Scans by Placement</h2>{Object.entries(byPlacement).sort((a,b)=>b[1]-a[1]).map(([p,count])=>(<div className="report-row" key={p}><div className="report-label"><span>{p}</span><span>{count}</span></div><Bar value={count} max={maxPlacement}/></div>))}{!Object.keys(byPlacement).length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}</div><div className="card"><h2>Peak Scan Hours</h2>{topHours.map(([h,count])=>(<div className="report-row" key={h}><div className="report-label"><span>{h}</span><span>{count}</span></div><Bar value={count} max={topHours[0]?.[1]||1}/></div>))}{!topHours.length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}</div></div><div className="card"><h2>Scans by Day of Week</h2><div style={{display:'flex',gap:'1rem',alignItems:'flex-end',height:'80px',marginTop:'.5rem'}}>{['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>{const count=byDay[d]||0;const max=Math.max(...Object.values(byDay),1);return(<div key={d} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}}><div style={{width:'100%',background:'#c0392b',height:`${(count/max)*60}px`,borderRadius:'2px',minHeight:count?'4px':'0'}}/><span style={{fontSize:'.7rem',color:'#555'}}>{d}</span></div>);})}</div>{!Object.keys(byDay).length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}</div></div>);
}

function Applications({applications,onRefresh}){
  const [filterStatus,setFilterStatus]=useState('all');
  const [filterSlug,setFilterSlug]=useState('all');
  const [updating,setUpdating]=useState(null);
  const [expanded,setExpanded]=useState(null);
  const STATUSES=['new','reviewed','shortlisted','rejected'];
  const STATUS_BG={new:'#1a3a5c',reviewed:'#2a2a1a',shortlisted:'#1a3a1a',rejected:'#3a1a1a'};
  const STATUS_FG={new:'#5aafff',reviewed:'#ffee5a',shortlisted:'#5aff7a',rejected:'#ff5a5a'};
  const updateStatus=async(id,status)=>{setUpdating(id);await supabase('/rest/v1/applications?id=eq.'+id,'PATCH',{status});await onRefresh();setUpdating(null);}
  const slugs=[...new Set(applications.map(a=>a.opportunity_slug))];
  const filtered=applications.filter(a=>{if(filterStatus!=='all'&&a.status!==filterStatus) return false;if(filterSlug!=='all'&&a.opportunity_slug!==filterSlug) return false;return true;});
  const newCount=applications.filter(a=>a.status==='new').length;
  const bySlug=slugs.reduce((acc,s)=>{acc[s]=applications.filter(a=>a.opportunity_slug===s).length;return acc;},{});
  return(
    <div>
      <div className="stats-grid" style={{marginBottom:'1.5rem'}}>
        <div className="stat"><div className="number">{applications.length}</div><div className="label">Total Applications</div></div>
        <div className="stat" style={newCount?{borderColor:'#2a5a7c'}:{}}><div className="number" style={newCount?{color:'#5aafff'}:{}}>{newCount}</div><div className="label">Unreviewed</div></div>
        <div className="stat"><div className="number">{applications.filter(a=>a.status==='shortlisted').length}</div><div className="label">Shortlisted</div></div>
        <div className="stat"><div className="number">{slugs.length}</div><div className="label">Open Roles</div></div>
      </div>
      <div className="card">
        <div style={{display:'flex',gap:'1rem',marginBottom:'1.2rem',flexWrap:'wrap'}}>
          <div className="form-group" style={{flex:1,minWidth:'160px'}}>
            <label>Filter by Role</label>
            <select value={filterSlug} onChange={e=>setFilterSlug(e.target.value)}>
              <option value="all">All roles ({applications.length})</option>
              {slugs.map(s=><option key={s} value={s}>{s} ({bySlug[s]})</option>)}
            </select>
          </div>
          <div className="form-group" style={{flex:1,minWidth:'160px'}}>
            <label>Filter by Status</label>
            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
              <option value="all">All statuses</option>
              {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        </div>
        {!filtered.length&&<div className="empty" style={{padding:'2rem'}}>No applications match these filters</div>}
        {filtered.map(a=>(
          <div key={a.id} style={{background:'inherit',border:'1px solid #2a2a2a',borderRadius:'2px',marginBottom:'.6rem',overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'.8rem 1rem',cursor:'pointer'}} onClick={()=>setExpanded(expanded===a.id?null:a.id)}>
              <div style={{display:'flex',gap:'1rem',alignItems:'center',flex:1,minWidth:0}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:'bold',fontSize:'.92rem'}}>{a.name}</div>
                  <div style={{fontSize:'.78rem',opacity:.6,marginTop:'.1rem'}}>{a.opportunity_slug} &middot; {new Date(a.submitted_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
                </div>
                <span className="badge" style={{background:STATUS_BG[a.status],color:STATUS_FG[a.status],flexShrink:0}}>{a.status}</span>
              </div>
              <span style={{fontSize:'.8rem',marginLeft:'1rem',opacity:.5}}>{expanded===a.id?'▲':'▼'}</span>
            </div>
            {expanded===a.id&&(
              <div style={{borderTop:'1px solid #1e1e1e',padding:'1rem'}}>
                <div className="form-grid" style={{marginBottom:'1rem'}}>
                  <div>
                    <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',opacity:.5,marginBottom:'.3rem'}}>Email</div>
                    <a href={'mailto:'+a.email} style={{color:'#5aafff',fontSize:'.88rem'}}>{a.email}</a>
                  </div>
                  {a.phone&&<div>
                    <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',opacity:.5,marginBottom:'.3rem'}}>Phone</div>
                    <div style={{fontSize:'.88rem'}}>{a.phone}</div>
                  </div>}
                  {a.cv_url&&<div>
                    <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',opacity:.5,marginBottom:'.3rem'}}>CV</div>
                    <a href={a.cv_url} target="_blank" style={{color:'#5aff7a',fontSize:'.88rem'}}>Download CV ↗</a>
                  </div>}
                </div>
                {a.message&&(
                  <div style={{marginBottom:'1rem'}}>
                    <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',opacity:.5,marginBottom:'.5rem'}}>Message</div>
                    <div style={{border:'1px solid #2a2a2a',borderRadius:'2px',padding:'.8rem 1rem',fontSize:'.88rem',opacity:.8,lineHeight:1.6,fontStyle:'italic',whiteSpace:'pre-wrap'}}>{a.message}</div>
                  </div>
                )}
                <div>
                  <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',opacity:.5,marginBottom:'.5rem'}}>Update Status</div>
                  <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap'}}>
                    {STATUSES.map(s=>(
                      <button key={s} className="btn btn-small"
                        style={{background:a.status===s?STATUS_BG[s]:'inherit',color:a.status===s?STATUS_FG[s]:'inherit',border:'1px solid '+(a.status===s?STATUS_BG[s]:'#2a2a2a'),opacity:updating===a.id?0.5:1}}
                        disabled={updating===a.id||a.status===s}
                        onClick={()=>updateStatus(a.id,s)}>{s}</button>
                    ))}
                  </div>
                </div>
                <AppAutoReply application={a}/>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

  useEffect(()=>{loadDays();},[]);

  const saveCat=async()=>{
    if(!newCat.name||!newCat.slug){flash('Name and slug are required.','error');return;}
    const res=await supabase('/rest/v1/menu_categories','POST',{
      name:newCat.name,
      slug:newCat.slug,
      side:newCat.side,
      sort_order:parseInt(newCat.sort_order)||100,
      active:true
    },'return=representation');
    if(res.error||(Array.isArray(res)&&res[0]?.code)){flash('Failed to add category.','error');return;}

  function startEdit(day){setEditing({day_of_week:day.day_of_week,day_label:day.day_label,opens_at:day.opens_at?day.opens_at.substring(0,5):'',closes_at:day.closes_at?day.closes_at.substring(0,5):'',notes:day.notes||''});} function applyPrivateHire(){setEditing(e=>({...e,opens_at:'',closes_at:'',notes:'Closed — available for private hire'}));}
