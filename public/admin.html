const SMALL_PHYSICAL = ['business-card','playing-card','tarot-card','beer-mat','third-a4','a5-portrait'];
const BLANK_POSTER = {title:'',subtitle:'',dateText:'',price:'',cta:'Scan to find out more',format:'a5-portrait',fgImage:null,fgImageUrl:null,bgImage:null,bgImageUrl:null,overlayOpacity:0.5,overlayColor:'#000000',textColor:'#111111'};

function isScreenFormat(id){return SCREEN_FORMATS.includes(id);}
function filenamify(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}

async function supabase(path,method='GET',body=null,prefer=null){
  const res=await fetch('/api/supabase',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path,method,body,prefer})});
  return res.json();
}

async function authFetch(url,options={}){
  const token=sessionStorage.getItem('ca022_token');
  return fetch(url,{...options,headers:{'Content-Type':'application/json','Authorization':token?`Bearer ${token}`:'',...(options.headers||{})}});
}

async function uploadImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=async(e)=>{
      try{
        const base64=e.target.result.split(',')[1];
        const res=await fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({base64,filename:file.name,contentType:file.type})});
        const data=await res.json();
        if(data.url) resolve(data.url);
        else reject(new Error(data.error||'Upload failed'));
      }catch(err){reject(err);}
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function slugify(s){return s.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').substring(0,40);}
function TypeBadge({type}){return <span className={`badge badge-${type}`}>{type}</span>;}

function QRWidget({url,size=120}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!url)return;
    ref.current.innerHTML='';
    new QRCode(ref.current,{text:url,width:size,height:size,colorDark:'#111',colorLight:'#fff'});
  },[url,size]);
  return <div ref={ref}/>;
}

function hasDestinationWarning(code){
  if(!code.destination_history||!code.destination_history.length) return false;
  const lastChange=new Date(code.destination_history[code.destination_history.length-1].changed_at);
  const lastAction=code.last_printed_at||code.last_distributed_at;
  if(!lastAction) return false;
  return lastChange>new Date(lastAction);
}

function CropMarks({posterW,posterH}){
  const pw=parseFloat(posterW);
  const ph=parseFloat(posterH);
  const hGap=(210-pw)/2;
  const vGap=(297-ph)/2;
  const gap=3;
  const marks=[
    {cls:'h',style:{top:`${vGap-gap}mm`,left:0,width:`${hGap-gap}mm`}},
    {cls:'v',style:{left:`${hGap-gap}mm`,top:0,height:`${vGap-gap}mm`}},
    {cls:'h',style:{top:`${vGap-gap}mm`,right:0,width:`${hGap-gap}mm`}},
    {cls:'v',style:{right:`${hGap-gap}mm`,top:0,height:`${vGap-gap}mm`}},
    {cls:'h',style:{bottom:`${vGap-gap}mm`,left:0,width:`${hGap-gap}mm`}},
    {cls:'v',style:{left:`${hGap-gap}mm`,bottom:0,height:`${vGap-gap}mm`}},
    {cls:'h',style:{bottom:`${vGap-gap}mm`,right:0,width:`${hGap-gap}mm`}},
    {cls:'v',style:{right:`${hGap-gap}mm`,bottom:0,height:`${vGap-gap}mm`}},
  ];
  return <>{marks.map((m,i)=><div key={i} className={`crop-mark ${m.cls}`} style={m.style}/>)}</>;
}

function LoginScreen({onLogin}){
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');

  async function login(){
    if(!username||!password){setError('Please enter username and password.');return;}
    setLoading(true);setError('');
    try{
      const res=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
      const data=await res.json();
      if(!res.ok){setError(data.error||'Login failed.');setLoading(false);return;}
      sessionStorage.setItem('ca022_token',data.token);
      sessionStorage.setItem('ca022_user',JSON.stringify(data.user));
      onLogin(data.user);
    }catch(e){setError('Network error.');setLoading(false);}
  }

  return (
    <div className="login-wrap">
      <div className="login-card">
        <h1>QR Engine</h1>
        <p>CA-022 · The Artyst</p>
        <div className="form-group" style={{marginBottom:'1rem'}}>
          <label>Username</label>
          <input value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} autoFocus/>
        </div>
        <div className="form-group" style={{marginBottom:'1rem'}}>
          <label>Password</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()}/>
        </div>
        {error&&<div className="login-err">{error}</div>}
        <button className="btn btn-primary" style={{width:'100%',marginTop:'.5rem'}} onClick={login} disabled={loading}>{loading?'Signing in...':'Sign In'}</button>
      </div>
    </div>
  );
}

function UsersTab(){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [form,setForm]=useState({username:'',password:'',name:'',role:'viewer'});
  const [status,setStatus]=useState(null);
  const [resetId,setResetId]=useState(null);
  const [resetPw,setResetPw]=useState('');

  async function loadUsers(){
    setLoading(true);
    const res=await authFetch('/api/users');
    if(res.ok) setUsers(await res.json());
    setLoading(false);
  }
  useEffect(()=>{loadUsers();},[]);

  async function createUser(){
    if(!form.username||!form.password||!form.name){setStatus({type:'error',msg:'All fields required.'});return;}
    const res=await authFetch('/api/users',{method:'POST',body:JSON.stringify(form)});
    if(res.ok){setStatus({type:'success',msg:`User "${form.name}" created.`});setForm({username:'',password:'',name:'',role:'viewer'});loadUsers();}
    else{const d=await res.json();setStatus({type:'error',msg:d.error||'Failed.'});}
  }
  async function toggleActive(u){await authFetch('/api/users',{method:'PATCH',body:JSON.stringify({id:u.id,active:!u.active})});loadUsers();}
  async function changeRole(u,role){await authFetch('/api/users',{method:'PATCH',body:JSON.stringify({id:u.id,role})});loadUsers();}
  async function resetPassword(){if(!resetPw)return;await authFetch('/api/users',{method:'PATCH',body:JSON.stringify({id:resetId,password:resetPw})});setResetId(null);setResetPw('');setStatus({type:'success',msg:'Password updated.'});}

  return (
    <div>
      <div className="card">
        <h2>Add User</h2>
        {status&&<div className={status.type==='error'?'error':'success'}>{status.msg}</div>}
        <div className="form-grid">
          <div className="form-group"><label>Name</label><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Display name"/></div>
          <div className="form-group"><label>Username</label><input value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))} placeholder="Login username"/></div>
          <div className="form-group"><label>Password</label><input type="password" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/></div>
          <div className="form-group"><label>Role</label><select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}><option value="viewer">Viewer — read only</option><option value="admin">Admin — full access</option></select></div>
          <div className="form-group full" style={{flexDirection:'row',justifyContent:'flex-end'}}><button className="btn btn-primary" onClick={createUser}>Add User</button></div>
        </div>
      </div>
      <div className="card">
        <h2>All Users</h2>
        {loading&&<div className="empty" style={{padding:'1rem'}}>Loading...</div>}
        {!loading&&users.map(u=>(
          <div className="user-row" key={u.id} style={{opacity:u.active?1:0.5}}>
            <div className="user-info"><div className="user-name">{u.name}</div><div className="user-meta">@{u.username}</div></div>
            <div className="actions" style={{alignItems:'center',flexWrap:'wrap'}}>
              <span className={`badge badge-${u.role}`}>{u.role}</span>
              <select value={u.role} onChange={e=>changeRole(u,e.target.value)} style={{width:'auto',fontSize:'.75rem',padding:'.3rem .5rem'}}><option value="admin">Admin</option><option value="viewer">Viewer</option></select>
              {resetId===u.id?(
                <div style={{display:'flex',gap:'.3rem',alignItems:'center'}}>
                  <input type="password" value={resetPw} onChange={e=>setResetPw(e.target.value)} placeholder="New password" style={{width:'130px',fontSize:'.8rem',padding:'.3rem .5rem'}}/>
                  <button className="btn btn-green btn-small" onClick={resetPassword}>Save</button>
                  <button className="btn btn-secondary btn-small" onClick={()=>setResetId(null)}>Cancel</button>
                </div>
              ):<button className="btn btn-secondary btn-small" onClick={()=>setResetId(u.id)}>Reset PW</button>}
              <button className="btn btn-secondary btn-small" onClick={()=>toggleActive(u)}>{u.active?'Deactivate':'Activate'}</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function PosterEditor({code,templates,designs,onClose,onSaved}){
  const [poster,setPoster]=useState({...BLANK_POSTER,title:code?.label||''});
  const [uploading,setUploading]=useState({fg:false,bg:false});
  const [saveMode,setSaveMode]=useState(null);
  const [saveName,setSaveName]=useState('');
  const [saveStatus,setSaveStatus]=useState(null);
  const [loadTemplateId,setLoadTemplateId]=useState('');
  const [loadDesignId,setLoadDesignId]=useState('');
  const [downloading,setDownloading]=useState(false);
  const [duplex,setDuplex]=useState('none');
  const [backPoster,setBackPoster]=useState({...BLANK_POSTER});
  const [backUploading,setBackUploading]=useState({fg:false,bg:false});
  const posterRef=useRef(null);
  const backPosterRef=useRef(null);
  const fmt=FORMATS.find(f=>f.id===poster.format)||FORMATS[0];
  const codeDesigns=(designs||[]).filter(d=>d.qr_code_id===code?.id);
  const isScreen=isScreenFormat(poster.format);
  const needsCropMarks=SMALL_PHYSICAL.includes(poster.format);

  function applyDesign(d){
    setPoster(p=>({...p,title:d.title_override||p.title,subtitle:d.subtitle||'',dateText:d.date_text||'',price:d.price||'',cta:d.cta||'Scan to find out more',format:d.format||'a5-portrait',overlayOpacity:d.overlay_opacity??0.5,overlayColor:d.overlay_color||'#000000',textColor:d.text_color||'#111111',fgImageUrl:d.fg_image_url||null,bgImageUrl:d.bg_image_url||null,fgImage:d.fg_image_url||null,bgImage:d.bg_image_url||null}));
    if(d.duplex) setDuplex(d.duplex);
    if(d.back_design) setBackPoster({title:d.back_design.title||'',subtitle:d.back_design.subtitle||'',dateText:d.back_design.date_text||'',price:d.back_design.price||'',cta:d.back_design.cta||'Scan to find out more',format:d.format||'a5-portrait',overlayOpacity:d.back_design.overlay_opacity??0.5,overlayColor:d.back_design.overlay_color||'#000000',textColor:d.back_design.text_color||'#111111',fgImageUrl:d.back_design.fg_image_url||null,bgImageUrl:d.back_design.bg_image_url||null,fgImage:d.back_design.fg_image_url||null,bgImage:d.back_design.bg_image_url||null});
  }

  function handleLoadTemplate(id){setLoadTemplateId(id);const t=templates.find(t=>t.id===id);if(t) applyDesign(t);}
  function handleLoadDesign(id){setLoadDesignId(id);const d=codeDesigns.find(d=>d.id===id);if(d) applyDesign(d);}

  async function handleImageUpload(file,key){
    if(!file)return;
    setUploading(u=>({...u,[key]:true}));
    try{const url=await uploadImage(file);setPoster(p=>({...p,[key+'Image']:url,[key+'ImageUrl']:url}));}
    catch(err){setSaveStatus({type:'error',msg:'Image upload failed: '+err.message});}
    setUploading(u=>({...u,[key]:false}));
  }

  async function downloadImage(){
    if(!posterRef.current)return;
    setDownloading(true);
    try{
      const canvas=await html2canvas(posterRef.current,{useCORS:true,allowTaint:true,scale:2,backgroundColor:poster.bgImage?null:'#ffffff'});
      const link=document.createElement('a');
      const title=filenamify(poster.title||code?.label||'poster');
      link.download=`${title}-${poster.format}.png`;
      link.href=canvas.toDataURL('image/png');
      link.click();
    }catch(err){setSaveStatus({type:'error',msg:'Download failed: '+err.message});}
    setDownloading(false);
  }

  async function saveDesign(){
    if(!saveName){setSaveStatus({type:'error',msg:'Please enter a name.'});return;}
    const backDesignPayload=duplex==='different'?{title:backPoster.title||null,subtitle:backPoster.subtitle||null,date_text:backPoster.dateText||null,price:backPoster.price||null,cta:backPoster.cta||null,text_color:backPoster.textColor,overlay_color:backPoster.overlayColor,overlay_opacity:backPoster.overlayOpacity,fg_image_url:backPoster.fgImageUrl||null,bg_image_url:backPoster.bgImageUrl||null}:null;
    const payload={name:saveName,format:poster.format,title_override:poster.title||null,subtitle:poster.subtitle||null,date_text:poster.dateText||null,price:poster.price||null,cta:poster.cta||null,text_color:poster.textColor,overlay_color:poster.overlayColor,overlay_opacity:poster.overlayOpacity,fg_image_url:poster.fgImageUrl||null,bg_image_url:poster.bgImageUrl||null,duplex:duplex,back_design:backDesignPayload};
    const table=saveMode==='template'?'poster_templates':'poster_designs';
    if(saveMode==='design') payload.qr_code_id=code?.id;
    const res=await supabase('/rest/v1/'+table,'POST',payload,'return=representation');
    if(res.error||(Array.isArray(res)&&res[0]?.code)){setSaveStatus({type:'error',msg:res.message||res[0]?.message||'Save failed.'});}
    else{setSaveStatus({type:'success',msg:saveMode==='template'?'Template saved.':'Design saved.'});setSaveMode(null);setSaveName('');if(onSaved) onSaved();}
  }

  const posterStyle={width:fmt.w,height:fmt.h,background:poster.bgImage?'transparent':'#fff',color:poster.textColor,padding:fmt.small?'4mm':'10mm',display:'flex',flexDirection:'column',alignItems:'center',fontFamily:'Georgia,serif',position:'relative',overflow:'hidden',border:needsCropMarks?'none':'1px solid #ddd',margin:needsCropMarks?'0':'1rem auto'};
  const PosterContent=(
    <div ref={posterRef} style={posterStyle}>
      {poster.bgImage&&<div style={{position:'absolute',inset:0,backgroundImage:`url(${poster.bgImage})`,backgroundSize:'cover',backgroundPosition:'center',zIndex:0}}/>}
      {poster.bgImage&&<div style={{position:'absolute',inset:0,background:poster.overlayColor,opacity:poster.overlayOpacity,zIndex:1}}/>}
      <div style={{position:'relative',zIndex:2,width:'100%',display:'flex',flexDirection:'column',alignItems:'center',gap:fmt.small?'2mm':'3mm',flex:1,minHeight:0}}>

        {poster.subtitle&&<div style={{fontSize:fmt.small?'9pt':'12pt',textAlign:'center',opacity:.8,lineHeight:1.5}}>{poster.subtitle}</div>}
        {poster.dateText&&<div style={{fontSize:fmt.small?'9pt':'12pt',textAlign:'center'}}>{poster.dateText}</div>}
        {poster.price&&<div style={{fontSize:fmt.small?'10pt':'15pt',fontWeight:'bold',textAlign:'center'}}>{poster.price}</div>}
        {code&&(<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2mm',marginTop:'auto',paddingTop:'3mm'}}><QRWidget url={`${BASE_URL}/e/${code.slug}`} size={fmt.small?60:140}/><div style={{fontSize:fmt.small?'6pt':'7pt',letterSpacing:'.15em',textTransform:'uppercase',opacity:.6,textAlign:'center'}}>{poster.cta}</div><div style={{fontSize:'6pt',fontFamily:'monospace',opacity:.4,textAlign:'center'}}>{BASE_URL}/e/{code.slug}</div></div>)}
      </div>
    </div>
  );

  return (
    <div>
      <div className="no-print card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.2rem'}}>
          <h2>Poster Editor{code?` — ${code.label}`:''}</h2>

        </div>
        {saveStatus&&<div className={saveStatus.type==='error'?'error':'success'}>{saveStatus.msg}</div>}
        <div className="form-grid">
          <div className="form-group"><label>Title</label><input value={poster.title} onChange={e=>setPoster(p=>({...p,title:e.target.value}))}/></div>
          <div className="form-group"><label>Subtitle</label><input value={poster.subtitle} onChange={e=>setPoster(p=>({...p,subtitle:e.target.value}))} placeholder="One line description"/></div>

          <div className="form-group"><label>Call to Action</label><input value={poster.cta} onChange={e=>setPoster(p=>({...p,cta:e.target.value}))}/></div>
          <div className="form-group"><label>Format</label><select value={poster.format} onChange={e=>setPoster(p=>({...p,format:e.target.value}))}><optgroup label="Print">{FORMATS.filter(f=>!f.screen).map(f=><option key={f.id} value={f.id}>{f.label}</option>)}</optgroup><optgroup label="Screen / Social">{FORMATS.filter(f=>f.screen).map(f=><option key={f.id} value={f.id}>{f.label}</option>)}</optgroup></select></div>
          <div className="form-group"><label>Foreground Image</label><input type="file" accept="image/*" onChange={e=>handleImageUpload(e.target.files[0],'fg')}/>{uploading.fg&&<span className="uploading">Uploading...</span>}{poster.fgImageUrl&&<span style={{fontSize:'.72rem',color:'#5aff7a',marginTop:'.2rem'}}>✓ Uploaded</span>}</div>

);}}/>{backUploading.bg&&<span className="uploading">Uploading...</span>}{backPoster.bgImageUrl&&<span style={{fontSize:'.72rem',color:'#5aff7a',marginTop:'.2rem'}}>✓ Uploaded</span>}</div>{backPoster.bgImage&&<><div className="form-group"><label>Overlay Opacity — {Math.round(backPoster.overlayOpacity*100)}%</label><input type="range" min="0" max="1" step="0.05" value={backPoster.overlayOpacity} onChange={e=>setBackPoster(p=>({...p,overlayOpacity:parseFloat(e.target.value)}))}/></div><div className="form-group"><label>Overlay Colour</label><input type="color" value={backPoster.overlayColor} onChange={e=>setBackPoster(p=>({...p,overlayColor:e.target.value}))}/></div></>}<div className="form-group"><label>Text Colour</label><input type="color" value={backPoster.textColor} onChange={e=>setBackPoster(p=>({...p,textColor:e.target.value}))}/></div></div></div>}

function Library({codes,destinations,onRefresh,onAddToPrintQueue,onDistribute,isAdmin,sortField,setSortField,sortDir,setSortDir,newCodeId}){
  async function toggleActive(code){await supabase(`/rest/v1/qr_codes?id=eq.${code.id}`,'PATCH',{active:!code.active});onRefresh();}

  function handleSort(field){
    if(sortField===field){setSortDir(d=>d==='asc'?'desc':'asc');}
    else{setSortField(field);setSortDir('asc');}
  }

  const sorted=[...codes].sort((a,b)=>{
    let av=a[sortField],bv=b[sortField];
    if(sortField==='scan_count'){av=av||0;bv=bv||0;return sortDir==='asc'?av-bv:bv-av;}
    if(sortField==='label'){av=(av||'').toLowerCase();bv=(bv||'').toLowerCase();}
    else{av=av||'';bv=bv||'';}
    if(av<bv) return sortDir==='asc'?-1:1;
    if(av>bv) return sortDir==='asc'?1:-1;
    return 0;
  });

  function SortTh({field,label}){
    const active=sortField===field;
    return(
      <th onClick={()=>handleSort(field)}
        style={{cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'}}
        title={"Sort by "+label}>
        {label}{active?' '+(sortDir==='asc'?'↑':'↓'):''}
      </th>
    );
  }

  if(!codes.length) return <div className="empty">No QR codes yet</div>;
  return(
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      <table>
        <thead>
          <tr>
            <SortTh field="label" label="Label"/>
            <SortTh field="type" label="Type"/>
            <th>Destination</th>
            <SortTh field="scan_count" label="Scans"/>
            <SortTh field="placement" label="Placement"/>
            <SortTh field="active" label="Status"/>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map(c=>{
            const warn=hasDestinationWarning(c);
            const dest=destinations.find(d=>d.id===c.destination_id);
            const isNew=c.id===newCodeId;
            return(
              <tr key={c.id} style={isNew?{background:'#1a3a1a',outline:'2px solid #2a7a2a'}:{}}>
                <td>
                  {isNew&&<span style={{fontSize:'.65rem',background:'#2a7a2a',color:'#5aff7a',padding:'.1rem .4rem',borderRadius:'2px',marginRight:'.4rem',textTransform:'uppercase',letterSpacing:'.06em'}}>New</span>}
                  <strong>{c.label}</strong>
                  {c.linked_ca017_event_id&&<div><span className="badge badge-event" style={{marginTop:'.2rem'}}>CA-017</span></div>}
                  {c.linked_ca025_opportunity_id&&<div><span className="badge badge-opportunity" style={{marginTop:'.2rem'}}>CA-025</span></div>}
                  <br/><span className="slug-display">/e/{c.slug}</span>
                </td>
                <td><TypeBadge type={c.type}/></td>
                <td>
                  <div style={{fontSize:'.8rem'}}>
                    {dest?<span>{dest.label}</span>:<span className="slug-display">{c.destination_url?.substring(0,40)}...</span>}
                    {warn&&<div><span className="badge badge-warning" style={{marginTop:'.2rem'}}>⚠ Destination changed</span></div>}
                  </div>
                </td>
                <td><span className="scan-count">{c.scan_count}</span></td>
                <td><span style={{fontSize:'.8rem'}}>{c.placement||'—'}</span></td>
                <td><span className={`badge badge-${c.active?'active':'inactive'}`}>{c.active?'active':'inactive'}</span></td>
                <td>
                  <div className="actions">
                    <button className="btn btn-secondary btn-small" onClick={()=>onAddToPrintQueue(c)}>Poster</button>
                    {isAdmin&&<button className="btn btn-green btn-small" onClick={()=>onDistribute(c)}>Distribute</button>}
                    {isAdmin&&<button className="btn btn-secondary btn-small" onClick={()=>toggleActive(c)}>{c.active?'Deactivate':'Activate'}</button>}
                  </div>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function CreateForm({destinations,onCreate}){
  const [form,setForm]=useState({label:'',type:'generic',destination_id:'',custom_url:'',placement:'',slug:''});
  const [useCustom,setUseCustom]=useState(false);
  const [status,setStatus]=useState(null);
  const [loading,setLoading]=useState(false);
  function set(k,v){setForm(f=>{const n={...f,[k]:v};if(k==='label'&&!f._slugEdited) n.slug=slugify(v);if(k==='type'){n.destination_id='';n.custom_url='';}return n;});}
  const filteredDests=destinations.filter(d=>d.type===form.type||d.type==='generic');
  const selectedDest=destinations.find(d=>d.id===form.destination_id);
  const finalUrl=useCustom?form.custom_url:(selectedDest?.url||'');
  async function submit(){
    if(!form.label||!form.slug){setStatus({type:'error',msg:'Label and slug are required.'});return;}
    if(!finalUrl){setStatus({type:'error',msg:'Please select a destination or enter a custom URL.'});return;}
    setLoading(true);setStatus(null);
    const res=await supabase('/rest/v1/qr_codes','POST',{slug:form.slug,type:form.type,label:form.label,destination_url:finalUrl,destination_id:(!useCustom&&form.destination_id)||null,placement:form.placement||null},'return=representation');
    setLoading(false);
    if(res.error||(Array.isArray(res)&&res[0]?.code)){setStatus({type:'error',msg:res.message||res[0]?.message||'Error creating code.'});}
    else{setStatus({type:'success',msg:`Code created: ${BASE_URL}/e/${form.slug}`});setForm({label:'',type:'generic',destination_id:'',custom_url:'',placement:'',slug:''});setUseCustom(false);onCreate(Array.isArray(res)?res[0]?.id:res?.id);}
  }
  return(<div className="card"><h2>New QR Code</h2>{status&&<div className={status.type==='error'?'error':'success'}>{status.msg}</div>}<div className="form-grid"><div className="form-group"><label>Label</label><input value={form.label} onChange={e=>set('label',e.target.value)} placeholder="e.g. Wine Tasting April"/></div><div className="form-group"><label>Type</label><select value={form.type} onChange={e=>set('type',e.target.value)}>{TYPES.map(t=><option key={t}>{t}</option>)}</select></div>{!useCustom?<div className="form-group full"><label>Destination</label><select value={form.destination_id} onChange={e=>set('destination_id',e.target.value)}><option value="">— select a destination —</option>{filteredDests.map(d=><option key={d.id} value={d.id}>{d.label} — {d.url}</option>)}</select><div style={{marginTop:'.4rem'}}><button className="btn btn-secondary btn-small" onClick={()=>setUseCustom(true)}>Use custom URL instead</button></div></div>:<div className="form-group full"><label>Custom URL</label><input value={form.custom_url} onChange={e=>set('custom_url',e.target.value)} placeholder="https://..."/><div style={{marginTop:'.4rem'}}><button className="btn btn-secondary btn-small" onClick={()=>setUseCustom(false)}>Use destination library instead</button></div></div>}<div className="form-group"><label>Slug (auto-generated)</label><input value={form.slug} onChange={e=>setForm(f=>({...f,slug:e.target.value,_slugEdited:true}))} placeholder="e.g. wine-tasting-april"/></div><div className="form-group"><label>Placement (optional)</label><select value={form.placement} onChange={e=>set('placement',e.target.value)}><option value="">— select —</option>{PLACEMENTS.map(p=><option key={p}>{p}</option>)}</select></div>{form.slug&&finalUrl&&<div className="form-group full" style={{flexDirection:'row',alignItems:'center',gap:'1rem'}}><QRWidget url={`${BASE_URL}/e/${form.slug}`} size={72}/><div><div className="slug-display">{BASE_URL}/e/{form.slug}</div><div style={{fontSize:'.75rem',color:'#555',marginTop:'.3rem'}}>→ {finalUrl}</div></div></div>}<div className="form-group full" style={{flexDirection:'row',justifyContent:'flex-end'}}><button className="btn btn-primary" onClick={submit} disabled={loading}>{loading?'Creating...':'Create Code'}</button></div></div></div>);
}

tn-secondary btn-small" onClick={()=>{navigator.clipboard.writeText(d.url);setStatus({type:'success',msg:'URL copied.'});}}>Copy URL</button><button className="btn btn-secondary btn-small" onClick={()=>remove(d.id)}>Delete</button></div>}</div>))}</div>);})}{!destinations.length&&<div className="empty">No destinations yet</div>}</div>);

function Distribute({codes,groups,staffList,onStaffCreated,onDistributed,initialCode}){
  const [selectedCode,setSelectedCode]=useState(initialCode?.id||'');
  const [selectedChannels,setSelectedChannels]=useState([]);
  const [selectedGroups,setSelectedGroups]=useState([]);
  const [confirming,setConfirming]=useState(false);
  const [staffName,setStaffName]=useState('');
  const [staffSuggestions,setStaffSuggestions]=useState([]);
  const [note,setNote]=useState('');
  const [replyTo,setReplyTo]=useState('jobs@theartyst.co.uk');
  const [status,setStatus]=useState(null);
  const [loading,setLoading]=useState(false);
  useEffect(()=>{if(initialCode) setSelectedCode(initialCode.id);},[initialCode]);
  function toggleChannel(ch){setSelectedChannels(s=>s.includes(ch)?s.filter(c=>c!==ch):[...s,ch]);}
  function toggleGroup(id){setSelectedGroups(s=>s.includes(id)?s.filter(g=>g!==id):[...s,id]);}
  function handleStaffInput(val){setStaffName(val);if(val.length<2){setStaffSuggestions([]);return;}setStaffSuggestions(staffList.filter(s=>s.name.toLowerCase().includes(val.toLowerCase())));}
  async function confirmDistribute(){
    if(!staffName){setStatus({type:'error',msg:'Please enter your name.'});return;}
    setLoading(true);
    const code=codes.find(c=>c.id===selectedCode);
    const errors=[];
    if(selectedChannels.includes('email')){try{const res=await fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({qr_code_id:selectedCode,slug:code?.slug,label:code?.label,type:code?.type,redirect_url:`${BASE_URL}/e/${code?.slug}`,destination_url:code?.destination_url,group_ids:selectedGroups,staff_name:staffName,note:note||null,reply_to:replyTo})});const data=await res.json();if(!res.ok) errors.push('Email: '+(data.error||'failed'));}catch(e){errors.push('Email: network error');}}

2',border:'1px solid #333',borderRadius:'2px',marginTop:'2px'}}>{staffSuggestions.map(s=><div key={s.id} style={{padding:'.5rem .8rem',cursor:'pointer',fontSize:'.85rem'}} onClick={()=>{setStaffName(s.name);setStaffSuggestions([]);}}>{s.name}</div>)}</div>}</div><div className="form-group"><label>Note (optional)</label><input value={note} onChange={e=>setNote(e.target.value)} placeholder="e.g. Pre-event push"/></div>{selectedChannels.includes('email')&&<div className="form-group full"><label>Reply-to address</label><select value={replyTo} onChange={e=>setReplyTo(e.target.value)}><option value="jobs@theartyst.co.uk">jobs@theartyst.co.uk</option><option value="hello@theartyst.co.uk">hello@theartyst.co.uk</option><option value="events@theartyst.co.uk">events@theartyst.co.uk</option><option value="matthew@othersyde.co.uk">matthew@othersyde.co.uk</option><option value="bookings@alcademy.co.uk">bookings@alcademy.co.uk</option></select></div>}</div><div style={{display:'flex',gap:'.5rem',justifyContent:'flex-end',marginTop:'1rem'}}><button className="btn btn-secondary" onClick={()=>setConfirming(false)}>Cancel</button><button className="btn btn-primary" onClick={confirmDistribute} disabled={loading}>{loading?'Sending...':'Confirm & Send'}</button></div></div>}</div>);

function Reports({codes,scanEvents}){
  const topCodes=[...codes].sort((a,b)=>b.scan_count-a.scan_count).slice(0,8);
  const maxScans=topCodes[0]?.scan_count||1;
  const byDevice=scanEvents.reduce((acc,e)=>{acc[e.device_type]=(acc[e.device_type]||0)+1;return acc;},{});
  const totalScans=scanEvents.length||1;
  const byDay=scanEvents.reduce((acc,e)=>{const d=new Date(e.scanned_at).toLocaleDateString('en-GB',{weekday:'short'});acc[d]=(acc[d]||0)+1;return acc;},{});
  const byHour=scanEvents.reduce((acc,e)=>{const h=`${new Date(e.scanned_at).getHours()}:00`;acc[h]=(acc[h]||0)+1;return acc;},{});
  const topHours=Object.entries(byHour).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const byPlacement=codes.reduce((acc,c)=>{if(c.placement) acc[c.placement]=(acc[c.placement]||0)+c.scan_count;return acc;},{});
  const maxPlacement=Math.max(...Object.values(byPlacement),1);
  function Bar({value,max}){return <div style={{background:'#222',borderRadius:'2px',height:'8px'}}><div className="report-bar" style={{width:`${(value/max)*100}%`}}/></div>;}
  return(<div><div className="two-col"><div className="card"><h2>Top Codes by Scans</h2>{topCodes.map(c=>(<div className="report-row" key={c.id}><div className="report-label"><span>{c.label}</span><span>{c.scan_count}</span></div><Bar value={c.scan_count} max={maxScans}/></div>))}{!topCodes.length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}</div><div className="card"><h2>Scans by Device</h2>{Object.entries(byDevice).map(([type,count])=>(<div className="report-row" key={type}><div className="report-label"><span style={{textTransform:'capitalize'}}>{type}</span><span>{Math.round((count/totalScans)*100)}%</span></div><Bar value={count} max={totalScans}/></div>))}{!Object.keys(byDevice).length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}</div></div><div className="two-col"><div className="card"><h2>Scans by Placement</h2>{Object.entries(byPlacement).sort((a,b)=>b[1]-a[1]).map(([p,count])=>(<div className="report-row" key={p}><div className="report-label"><span>{p}</span><span>{count}</span></div><Bar value={count} max={maxPlacement}/></div>))}{!Object.keys(byPlacement).length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}</div><div className="card"><h2>Peak Scan Hours</h2>{topHours.map(([h,count])=>(<div className="report-row" key={h}><div className="report-label"><span>{h}</span><span>{count}</span></div><Bar value={count} max={topHours[0]?.[1]||1}/></div>))}{!topHours.length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}</div></div><div className="card"><h2>Scans by Day of Week</h2><div style={{display:'flex',gap:'1rem',alignItems:'flex-end',height:'80px',marginTop:'.5rem'}}>{['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>{const count=byDay[d]||0;const max=Math.max(...Object.values(byDay),1);return(<div key={d} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}}><div style={{width:'100%',background:'#c0392b',height:`${(count/max)*60}px`,borderRadius:'2px',minHeight:count?'4px':'0'}}/><span style={{fontSize:'.7rem',color:'#555'}}>{d}</span></div>);})}</div>{!Object.keys(byDay).length&&<div className="empty" style={{padding:'1rem'}}>No data yet</div>}</div></div>);
}

  const STATUS_FG={new:'#5aafff',reviewed:'#ffee5a',shortlisted:'#5aff7a',rejected:'#ff5a5a'};

555',marginTop:'.1rem'}}>{a.opportunity_slug} &middot; {new Date(a.submitted_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div></div><span className="badge" style={{background:STATUS_BG[a.status],color:STATUS_FG[a.status],flexShrink:0}}>{a.status}</span></div><span style={{color:'#444',fontSize:'.8rem',marginLeft:'1rem'}}>{expanded===a.id?'▲':'▼'}</span></div>{expanded===a.id&&<div style={{borderTop:'1px solid #1e1e1e',padding:'1rem'}}><div className="form-grid" style={{marginBottom:'1rem'}}><div><div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',color:'#555',marginBottom:'.3rem'}}>Email</div><a href={'mailto:'+a.email} style={{color:'#5aafff',fontSize:'.88rem'}}>{a.email}</a></div>{a.phone&&<div><div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',color:'#555',marginBottom:'.3rem'}}>Phone</div><div style={{fontSize:'.88rem'}}>{a.phone}</div></div>}{a.cv_url&&<div><div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',color:'#555',marginBottom:'.3rem'}}>CV</div><a href={a.cv_url} target="_blank" style={{color:'#5aff7a',fontSize:'.88rem'}}>Download CV ↗</a></div>}</div>{a.message&&<div style={{marginBottom:'1rem'}}><div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',color:'#555',marginBottom:'.5rem'}}>Message</div><div style={{background:'#1a1a1a',border:'1px solid #2a2a2a',borderRadius:'2px',padding:'.8rem 1rem',fontSize:'.88rem',color:'#aaa',lineHeight:1.6,fontStyle:'italic',whiteSpace:'pre-wrap'}}>{a.message}</div></div>}<div><div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',color:'#555',marginBottom:'.5rem'}}>Update Status</div><div style={{display:'flex',gap:'.4rem',flexWrap:'wrap'}}>{STATUSES.map(s=>(<button key={s} className="btn btn-small" style={{background:a.status===s?STATUS_BG[s]:'#1a1a1a',color:a.status===s?STATUS_FG[s]:'#555',border:'1px solid '+(a.status===s?STATUS_BG[s]:'#2a2a2a'),opacity:updating===a.id?0.5:1}} disabled={updating===a.id||a.status===s} onClick={()=>updateStatus(a.id,s)}>{s}</button>))}</div></div></div>}</div>))}</div></div>);
}

function PlayEditor(){

  const [editingCat,setEditingCat]=useState(null);

  const [itemForm,setItemForm]=useState(blankPlayItem());
  const [addingItemTo,setAddingItemTo]=useState(null);
  const [addingCat,setAddingCat]=useState(false);
  function blankPlayItem(){return{title:'',subtitle:'',description:'',when_text:'',href:'',cta_label:'',image_url:'',sort_order:100};}
  async function loadAll(){setLoading(true);const[cats,items]=await Promise.all([supabase('/rest/v1/play_categories?order=sort_order'),supabase('/rest/v1/play_items?order=category_id,sort_order')]);const grouped=(Array.isArray(cats)?cats:[]).map(c=>({...c,items:(Array.isArray(items)?items:[]).filter(i=>i.category_id===c.id)}));setCategories(grouped);setLoading(false);}
  useEffect(()=>{loadAll();},[]);
  function flash(msg,type='success'){setStatus({type,msg});setTimeout(()=>setStatus(null),2500);}
  async function toggleCatActive(cat){await supabase(`/rest/v1/play_categories?id=eq.${cat.id}`,'PATCH',{active:!cat.active});loadAll();}
  function pSlugify(s){return s.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').substring(0,40);}
  async function saveCat(){if(!catForm.name||!catForm.slug){flash('Name and slug required.','error');return;}const body={name:catForm.name,slug:catForm.slug,sort_order:parseInt(catForm.sort_order)||100};if(editingCat){await supabase(`/rest/v1/play_categories?id=eq.${editingCat}`,'PATCH',body);}else{await supabase('/rest/v1/play_categories','POST',body);}setEditingCat(null);setAddingCat(false);setCatForm({name:'',slug:'',sort_order:100});flash('Saved.');loadAll();}
  async function deleteCat(id){if(!confirm('Delete this category AND all its items?'))return;await supabase(`/rest/v1/play_categories?id=eq.${id}`,'DELETE');loadAll();}
  function startEditCat(cat){setEditingCat(cat.id);setAddingCat(false);setCatForm({name:cat.name,slug:cat.slug,sort_order:cat.sort_order});}
  async function toggleItemActive(item){await supabase(`/rest/v1/play_items?id=eq.${item.id}`,'PATCH',{active:!item.active});loadAll();}
  async function saveItem(categoryId){if(!itemForm.title){flash('Title required.','error');return;}const body={title:itemForm.title,subtitle:itemForm.subtitle||null,description:itemForm.description||null,when_text:itemForm.when_text||null,href:itemForm.href||null,cta_label:itemForm.cta_label||null,image_url:itemForm.image_url||null,sort_order:parseInt(itemForm.sort_order)||100};if(editingItem){await supabase(`/rest/v1/play_items?id=eq.${editingItem}`,'PATCH',body);}else{body.category_id=categoryId;await supabase('/rest/v1/play_items','POST',body);}setEditingItem(null);setAddingItemTo(null);setItemForm(blankPlayItem());flash('Saved.');loadAll();}
  async function deleteItem(id){if(!confirm('Delete this item?'))return;await supabase(`/rest/v1/play_items?id=eq.${id}`,'DELETE');loadAll();}

  function flash(msg,type='success'){setStatus({type,msg});setTimeout(()=>setStatus(null),2500);}
  function addGroup(){setGroups(g=>[...g,{name:'',required:false,default_index:-1,choices:[{label:'',price_mod:0}]}]);}
  function removeGroup(i){setGroups(g=>g.filter((_,idx)=>idx!==i));}
  function updateGroup(i,key,val){setGroups(g=>g.map((gp,idx)=>idx===i?{...gp,[key]:val}:gp));}
  function addChoice(gi){setGroups(g=>g.map((gp,idx)=>idx===gi?{...gp,choices:[...gp.choices,{label:'',price_mod:0}]}:gp));}
  function removeChoice(gi,ci){setGroups(g=>g.map((gp,idx)=>idx===gi?{...gp,choices:gp.choices.filter((_,cidx)=>cidx!==ci)}:gp));}
  function updateChoice(gi,ci,key,val){setGroups(g=>g.map((gp,idx)=>idx===gi?{...gp,choices:gp.choices.map((c,cidx)=>cidx===ci?{...c,[key]:key==='price_mod'?parseFloat(val)||0:val}:c)}:gp));}
  async function save(){const valid=groups.every(g=>g.name&&g.choices.length>0&&g.choices.every(c=>c.label));if(!valid){flash('Every group needs a name and every choice needs a label.','error');return;}await supabase(`/rest/v1/menu_items?id=eq.${item.id}`,'PATCH',{options:groups.length>0?groups:null});flash('Options saved.');if(onSaved) onSaved();}
  return(<div style={{marginTop:'1rem',paddingTop:'1rem',borderTop:'1px solid #222'}}><div style={{fontSize:'.72rem',textTransform:'uppercase',letterSpacing:'.08em',color:'#c8a96e',marginBottom:'.8rem'}}>Customisation options</div>{status&&<div className={status.type==='error'?'error':'success'} style={{marginBottom:'.6rem'}}>{status.msg}</div>}{groups.map((group,gi)=>(<div key={gi} className='options-group' style={{borderRadius:'3px',padding:'.8rem',marginBottom:'.6rem'}}><div style={{display:'flex',gap:'.5rem',alignItems:'flex-end',marginBottom:'.6rem',flexWrap:'wrap'}}><div className="form-group" style={{margin:0,flex:'1 1 140px'}}><label>Group name</label><input value={group.name} onChange={e=>updateGroup(gi,'name',e.target.value)} placeholder="e.g. Milk, Syrup, Mixer"/></div><div className="form-group" style={{margin:0,flex:'0 0 auto'}}><label>Default</label><select value={group.default_index} onChange={e=>updateGroup(gi,'default_index',parseInt(e.target.value))}><option value={-1}>None</option>{group.choices.map((c,i)=><option key={i} value={i}>{c.label||`Choice ${i+1}`}</option>)}</select></div><label style={{display:'flex',alignItems:'center',gap:'.3rem',fontSize:'.78rem',color:'#888',cursor:'pointer',flexShrink:0,paddingBottom:'4px'}}><input type="checkbox" checked={group.required} onChange={e=>updateGroup(gi,'required',e.target.checked)} style={{width:'auto'}}/>Required</label><button className="btn btn-secondary btn-small" style={{alignSelf:'flex-end'}} onClick={()=>removeGroup(gi)}>Remove group</button></div><div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',color:'#555',marginBottom:'.4rem'}}>Choices</div>{group.choices.map((choice,ci)=>(<div key={ci} style={{display:'flex',gap:'.4rem',alignItems:'center',marginBottom:'.3rem'}}><input value={choice.label} onChange={e=>updateChoice(gi,ci,'label',e.target.value)} placeholder="e.g. Oat milk" style={{flex:2,padding:'.3rem .5rem',fontSize:'.82rem',borderRadius:'2px'}}/><div style={{display:'flex',alignItems:'center',gap:'.2rem',flex:'0 0 auto'}}><span style={{fontSize:'.75rem'}}>+£</span><input type="number" value={choice.price_mod} min="0" step="0.50" onChange={e=>updateChoice(gi,ci,'price_mod',e.target.value)} style={{width:'64px',padding:'.3rem .4rem',fontSize:'.82rem',borderRadius:'2px'}}/></div>{group.choices.length>1&&<button className="btn btn-secondary btn-small" onClick={()=>removeChoice(gi,ci)} style={{padding:'.3rem .5rem',flexShrink:0}}>✕</button>}</div>))}<button className="btn btn-secondary btn-small" style={{marginTop:'.4rem'}} onClick={()=>addChoice(gi)}>+ Add choice</button></div>))}<div style={{display:'flex',gap:'.5rem',marginTop:'.6rem'}}><button className="btn btn-secondary btn-small" onClick={addGroup}>+ Add option group</button><button className="btn btn-primary btn-small" onClick={save}>Save options</button>{groups.length>0&&<button className="btn btn-secondary btn-small" onClick={()=>{if(confirm('Remove all options?')){setGroups([]);}}}>Clear all</button>}</div></div>);
}

function MenuEditor({anchor,onAnchorUsed}){
  const [categories,setCategories]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editingItem,setEditingItem]=useState(null);
  const [editVal,setEditVal]=useState('');
  const [editingDetails,setEditingDetails]=useState(null);
  const [detailVal,setDetailVal]=useState('');
  const [slotVal,setSlotVal]=useState([]);
  const [addingTo,setAddingTo]=useState(null);
  const [newItem,setNewItem]=useState({name:'',description:'',price_display:''});
  const [status,setStatus]=useState(null);
  const ALL_SLOTS=[{key:'brunch',label:'Brunch',hours:'8am–12pm'},{key:'lunch',label:'Lunch',hours:'12–2pm'},{key:'tea',label:'Tea',hours:'2–5pm'},{key:'evening',label:'Evening',hours:'5pm–close'}];
  async function loadMenu(){setLoading(true);const[cats,items]=await Promise.all([supabase('/rest/v1/menu_categories?order=side,sort_order'),supabase('/rest/v1/menu_items?order=category_id,sort_order')]);const grouped=(Array.isArray(cats)?cats:[]).map(cat=>({...cat,items:(Array.isArray(items)?items:[]).filter(i=>i.category_id===cat.id)}));setCategories(grouped);setLoading(false);}
  useEffect(()=>{loadMenu();},[]);
  useEffect(()=>{
    if(!anchor) return;
    const el=document.getElementById(anchor);
    if(el){el.scrollIntoView({behavior:'smooth',block:'start'});if(onAnchorUsed) onAnchorUsed();}
  },[anchor]);
  function flash(msg,type='success'){setStatus({type,msg});setTimeout(()=>setStatus(null),2500);}
  async function toggleAvailable(item){await supabase(`/rest/v1/menu_items?id=eq.${item.id}`,'PATCH',{available:!item.available});loadMenu();}
  async function toggleTakeaway(item){await supabase(`/rest/v1/menu_items?id=eq.${item.id}`,'PATCH',{takeaway:!item.takeaway});loadMenu();}
  async function toggleCategoryActive(cat){await supabase(`/rest/v1/menu_categories?id=eq.${cat.id}`,'PATCH',{active:!cat.active});loadMenu();}
  function startEdit(item,field){setEditingDetails(null);setEditingItem({id:item.id,field});setEditVal(item[field]||'');}
  async function saveEdit(itemId,field){await supabase(`/rest/v1/menu_items?id=eq.${itemId}`,'PATCH',{[field]:editVal||null});setEditingItem(null);flash('Saved.');loadMenu();}
  function startEditDetails(item){setEditingItem(null);if(editingDetails===item.id){setEditingDetails(null);}else{setEditingDetails(item.id);setDetailVal(item.details||'');setSlotVal(item.time_slots||['brunch','lunch','tea','evening']);}}
  function toggleSlot(key){setSlotVal(prev=>prev.includes(key)?prev.filter(s=>s!==key):[...prev,key]);}
  async function saveDetails(itemId){await supabase(`/rest/v1/menu_items?id=eq.${itemId}`,'PATCH',{details:detailVal||null,time_slots:slotVal.length>0?slotVal:['brunch','lunch','tea','evening']});setEditingDetails(null);flash('Details saved.');loadMenu();}
  async function deleteItem(id){if(!confirm('Delete this item?'))return;await supabase(`/rest/v1/menu_items?id=eq.${id}`,'DELETE');loadMenu();}
  async function addItem(categoryId){if(!newItem.name){flash('Name is required.','error');return;}await supabase('/rest/v1/menu_items','POST',{category_id:categoryId,name:newItem.name,description:newItem.description||null,price_display:newItem.price_display||null,available:true,takeaway:false,sort_order:999,time_slots:['brunch','lunch','tea','evening']});setNewItem({name:'',description:'',price_display:''});setAddingTo(null);flash('Item added.');loadMenu();}
  const cafe=categories.filter(c=>c.side==='cafe');
  const bar=categories.filter(c=>c.side==='bar');
  function slotSummary(slots){if(!slots||slots.length===4)return '';if(slots.length===0)return '⚠ hidden always';return slots.join(', ');}
  function Toggle({on,onToggle,color,offColor}){
    const bg=color||'#1a5c1a';
    const off=offColor||'#3a1a1a';
    return(
      <div onClick={onToggle} style={{width:'32px',height:'18px',borderRadius:'9px',cursor:'pointer',
        background:on?bg:off,display:'flex',alignItems:'center',padding:'2px',transition:'background .15s'}}>
        <div style={{width:'12px',height:'12px',borderRadius:'50%',
          background:on?'#5aff7a':'#ff5a5a',marginLeft:on?'12px':'0',transition:'margin .15s'}}/>
      </div>

                <button className="btn btn-green btn-small" onClick={()=>setAddingTo(addingTo===cat.id?null:cat.id)}>+ Add item</button>
              </div>
            </div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'.82rem'}}>
              <thead>

                      textTransform:'uppercase',letterSpacing:'.06em',color:'#555',borderBottom:'1px solid #2a2a2a'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {cat.items.map(item=>(
                  <React.Fragment key={item.id}>
                    <tr style={{opacity:item.available?1:0.45}}>
                      {['name','description','price_display'].map(field=>(
                        <td key={field} style={{padding:'.4rem .5rem',borderBottom:editingDetails===item.id?'none':'1px solid #1e1e1e',verticalAlign:'middle'}}>
                          {editingItem&&editingItem.id===item.id&&editingItem.field===field?(
                            <div style={{display:'flex',gap:'.3rem'}}>
                              <input value={editVal} onChange={e=>setEditVal(e.target.value)}
                                onKeyDown={e=>{if(e.key==='Enter')saveEdit(item.id,field);if(e.key==='Escape')setEditingItem(null);}}
                                autoFocus style={{flex:1,padding:'.3rem .4rem',fontSize:'.8rem',background:'#111',border:'1px solid #c0392b',color:'#eee',borderRadius:'2px'}}/>
                              <button className="btn btn-primary btn-small" onClick={()=>saveEdit(item.id,field)}>ok</button>
                              <button className="btn btn-secondary btn-small" onClick={()=>setEditingItem(null)}>x</button>
                            </div>
                          ):(
                            <span onClick={()=>startEdit(item,field)}
                              style={{cursor:'text',fontStyle:item[field]?'normal':'italic',display:'block',minWidth:'40px',minHeight:'20px'}}
                              title="Click to edit">{item[field]||'-'}</span>
                          )}
                        </td>
                      ))}
                      <td style={{padding:'.4rem .5rem',borderBottom:editingDetails===item.id?'none':'1px solid #1e1e1e',verticalAlign:'middle'}}>
                        <span style={{fontSize:'.72rem',color:(!item.time_slots||item.time_slots.length===4)?'#444':'#ffaa5a'}}>
                          {slotSummary(item.time_slots)||'all'}
                        </span>
                      </td>
                      <td style={{padding:'.4rem .5rem',textAlign:'center',borderBottom:editingDetails===item.id?'none':'1px solid #1e1e1e'}}>
                        <Toggle on={item.available} onToggle={()=>toggleAvailable(item)}/>
                      </td>
                      <td style={{padding:'.4rem .5rem',textAlign:'center',borderBottom:editingDetails===item.id?'none':'1px solid #1e1e1e'}}>
                        <Toggle on={!!item.takeaway} onToggle={()=>toggleTakeaway(item)} color="#1a3a5c" offColor="#1a1a2a"/>
                      </td>
                      <td style={{padding:'.4rem .5rem',borderBottom:editingDetails===item.id?'none':'1px solid #1e1e1e'}}>
                        <div style={{display:'flex',gap:'.3rem',flexWrap:'wrap'}}>
                          <button className={"btn btn-small "+(editingDetails===item.id?'btn-blue':'btn-secondary')} onClick={()=>startEditDetails(item)}>
                            {item.details||item.options?'Edit ok':'+ Details'}
                          </button>
                          <button className="btn btn-secondary btn-small" onClick={()=>deleteItem(item.id)}>Del</button>
                        </div>
                      </td>
                    </tr>
                    {editingDetails===item.id&&(
                      <tr>
                        <td colSpan={7} style={{padding:'.6rem .5rem',paddingTop:0,borderBottom:'1px solid #1e1e1e'}}>
                          <div style={{marginBottom:'.8rem'}}>
                            <div style={{fontSize:'.72rem',textTransform:'uppercase',letterSpacing:'.08em',color:'#555',marginBottom:'.5rem'}}>Show on</div>
                            <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap'}}>
                              {ALL_SLOTS.map(s=>(
                                <div key={s.key} onClick={()=>toggleSlot(s.key)}
                                  className={slotVal.includes(s.key)?'slot-btn-selected':'slot-btn-unselected'}
                                  style={{padding:'.3rem .7rem',borderRadius:'3px',cursor:'pointer',fontSize:'.78rem',
                                    background:slotVal.includes(s.key)?'#1a3a5c':'#1a1a1a',
                                    color:slotVal.includes(s.key)?'#5aafff':'#555',
                                    border:'1px solid '+(slotVal.includes(s.key)?'#2a5a7c':'#2a2a2a'),
                                    transition:'all .15s',userSelect:'none'}}>
                                  {s.label}
                                  <span style={{fontSize:'.68rem',opacity:.7,marginLeft:'4px'}}>{s.hours}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                          <div style={{fontSize:'.72rem',textTransform:'uppercase',letterSpacing:'.08em',color:'#555',marginBottom:'.4rem'}}>
                            Details (allergens, ABV)
                          </div>
                          <textarea value={detailVal} onChange={e=>setDetailVal(e.target.value)} rows={4}
                            placeholder="e.g. 4.6% ABV"
                            style={{width:'100%',borderRadius:'2px',
                              padding:'.5rem .6rem',fontSize:'.85rem',lineHeight:1.7,resize:'vertical',fontFamily:'monospace'}}/>
                          <div style={{display:'flex',gap:'.4rem',marginTop:'.4rem',justifyContent:'flex-end',marginBottom:'.6rem'}}>
                            <button className="btn btn-secondary btn-small" onClick={()=>setEditingDetails(null)}>Cancel</button>
                            <button className="btn btn-primary btn-small" onClick={()=>saveDetails(item.id)}>Save details</button>
                          </div>
                          <OptionsEditor item={item} onSaved={loadMenu}/>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
            {addingTo===cat.id&&(
              <div style={{marginTop:'.8rem',background:'#111',border:'1px solid #2a5a2a',borderRadius:'2px',padding:'.8rem'}}>
                <div style={{display:'grid',gridTemplateColumns:'2fr 2fr 1fr auto auto',gap:'.5rem',alignItems:'end'}}>
                  <div className="form-group" style={{margin:0}}><label>Name</label>
                    <input value={newItem.name} onChange={e=>setNewItem(n=>({...n,name:e.target.value}))} placeholder="Item name" autoFocus/>
                  </div>
                  <div className="form-group" style={{margin:0}}><label>Description</label>
                    <input value={newItem.description} onChange={e=>setNewItem(n=>({...n,description:e.target.value}))} placeholder="Optional"/>
                  </div>
                  <div className="form-group" style={{margin:0}}><label>Price</label>
                    <input value={newItem.price_display} onChange={e=>setNewItem(n=>({...n,price_display:e.target.value}))} placeholder="4.50"/>
                  </div>
                  <button className="btn btn-primary" style={{alignSelf:'flex-end'}} onClick={()=>addItem(cat.id)}>Add</button>
                  <button className="btn btn-secondary" style={{alignSelf:'flex-end'}} onClick={()=>setAddingTo(null)}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    );
  }
  return(
    <div>
      {status&&<div className={status.type==='error'?'error':'success'} style={{marginBottom:'1rem'}}>{status.msg}</div>}
      <div id="menu-hours"><HoursEditor/></div>
      <div id="menu-items"></div>
      <div className="warning-box" style={{marginBottom:'1rem'}}>
        Click any name, description or price to edit inline. <strong>On</strong> = available on the eat-in menu. <strong>T/A</strong> = available for takeaway. Changes are live immediately.
      </div>
      {loading&&<div className="empty">Loading menu...</div>}
      {!loading&&renderSection(cafe,'Cafe and food')}
      {!loading&&renderSection(bar,'Bar')}
      <div id="menu-play"><PlayEditor/></div>
      <div id="menu-news"><NewsEditor/></div>
      <div id="menu-promos"><PromoEditor/></div>
    </div>
  );
}

function BackToTop(){
  const [visible,setVisible]=useState(false);
  useEffect(()=>{
    function onScroll(){setVisible(window.scrollY>400);}
    window.addEventListener('scroll',onScroll,{passive:true});
    return()=>window.removeEventListener('scroll',onScroll);
  },[]);
  return(
    <button
      className={"back-to-top"+(visible?'':' hidden')}
      onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}
      title="Back to top"
      aria-label="Back to top">
      ↑
    </button>
  );
}

    setLoading(true);
    const[c,dest,g,s,d,z,a,se,tmpl,dsgn,apps]=await Promise.all([supabase('/rest/v1/qr_codes?order=created_at.desc'),supabase('/rest/v1/destinations?order=type.asc,label.asc'),supabase('/rest/v1/distribution_groups?order=name.asc'),supabase('/rest/v1/staff?order=name.asc'),supabase('/rest/v1/distributions?order=created_at.desc&limit=100'),supabase('/rest/v1/screen_zones?order=name.asc'),supabase('/rest/v1/screen_assignments?order=display_order.asc'),supabase('/rest/v1/scan_events?order=scanned_at.desc&limit=500'),supabase('/rest/v1/poster_templates?order=name.asc'),supabase('/rest/v1/poster_designs?order=name.asc'),supabase('/rest/v1/applications?order=submitted_at.desc&limit=200')]);
    setCodes(Array.isArray(c)?c:[]);setDestinations(Array.isArray(dest)?dest:[]);setGroups(Array.isArray(g)?g:[]);setStaffList(Array.isArray(s)?s:[]);setDistributions(Array.isArray(d)?d:[]);setZones(Array.isArray(z)?z:[]);setAssignments(Array.isArray(a)?a:[]);setScanEvents(Array.isArray(se)?se:[]);setTemplates(Array.isArray(tmpl)?tmpl:[]);setDesigns(Array.isArray(dsgn)?dsgn:[]);setApplications(Array.isArray(apps)?apps:[]);setLoading(false);
  }

  useEffect(()=>{if(user) loadAll();},[user]);
  useEffect(()=>{
    if(activeTask) setVisitedTabs(v=>[...new Set([...v,tab])]);
  },[tab]);

  function handleSelectTask(task){
    setTab(task.tab);
    if(task.anchor) setMenuAnchor(task.anchor);
    setActiveTask(task);
    setVisitedTabs([task.tab]);
  }

  function logout(){
    const token=sessionStorage.getItem('ca022_token');
    if(token) fetch('/api/auth',{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
    sessionStorage.removeItem('ca022_token');sessionStorage.removeItem('ca022_user');setUser(null);
  }

  function addToPrintQueue(code){if(!printQueue.find(c=>c.id===code.id)) setPrintQueue(q=>[...q,code]);setTab('print');}
  function handleDistribute(code){setDistributeCode(code);setTab('distribute');}

  const totalScans=codes.reduce((s,c)=>s+c.scan_count,0);
  const activeCodes=codes.filter(c=>c.active).length;
  const warnings=codes.filter(hasDestinationWarning).length;
  const newApplications=applications.filter(a=>a.status==='new').length;

  const TABS=[
    ['library',`Library (${codes.length})`],
    ...(isAdmin?[['create','New Code']]:[]),
    ['print',`Print Queue${printQueue.length?` (${printQueue.length})`:''}`],
    ...(isAdmin?[['distribute','Distribute']]:[]),
    ['screens','Screens'],
    ...(isAdmin?[['groups','Groups']]:[]),
    ['destinations','Destinations'],
    ...(isAdmin?[['templates',`Templates (${templates.length+designs.length})`]]:[]),
    ['history','History'],
    ['reports','Reports'],
    ['applications',newApplications?`Applications (${newApplications} new)`:'Applications'],
    ['menu','Menu Editor'],
    ...(isAdmin?[['users','Users']]:[]),
  ];

  if(!authChecked) return null;
  if(!user) return <LoginScreen onLogin={u=>setUser(u)}/>;

  return(
    <div className="app">
      <BackToTop/>
      <header>
        <h1>QR Engine — The Artyst</h1>
        <div className="header-user">
          {!isAdmin&&<span style={{fontSize:'.72rem',color:lightMode?'#1a5a8a':'#5aafff',background:lightMode?'#d4e8f8':'#1a2a3a',padding:'.2rem .6rem',borderRadius:'2px'}}>Viewer</span>}
          <span>{user.name}</span>
          <button className="theme-toggle" onClick={()=>setLightMode(m=>!m)} title="Toggle theme">{lightMode?'Dark':'Light'}</button>
          <button className="btn btn-secondary btn-small" onClick={logout}>Sign Out</button>
        </div>
      </header>
      <TaskGuide onSelectTask={handleSelectTask}/>
      {activeTask&&(()=>{
        const TAB_TO_STEP={'create':'New Code','print':'Print Queue','distribute':'Distribute',
          'screens':'Screens','menu':'Menu Editor','reports':'Reports','applications':'Applications',
          'destinations':'Destinations','groups':'Groups','library':'Library','history':'History'};
        const currentStepLabel=TAB_TO_STEP[tab]||'';
        const currentIdx=activeTask.steps.findIndex(s=>s===currentStepLabel||s.startsWith(currentStepLabel));
        const nextStep=activeTask.steps[currentIdx+1]||null;
        return(
          <div style={{borderRadius:'3px',padding:'.7rem 1rem',marginBottom:'1rem',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'.5rem',background:'#1a3a5c',border:'1px solid #2a5a7c'}} className="no-print">
            <div style={{display:'flex',alignItems:'center',gap:'1rem',flex:1,minWidth:0,flexWrap:'wrap'}}>
              <span style={{fontSize:'.72rem',textTransform:'uppercase',letterSpacing:'.08em',color:'#5aafff',flexShrink:0}}>Task</span>
              <span style={{fontSize:'.85rem',color:'#fff',fontWeight:600,flexShrink:0}}>{activeTask.label}</span>
              <div style={{display:'flex',gap:'.3rem',flexWrap:'wrap'}}>
                {activeTask.steps.map((s,i)=>{
                  const isCurrent=i===currentIdx||(currentIdx===-1&&i===0);
                  const isVisited=i<currentIdx||(currentIdx===-1?false:i<currentIdx);
                  const TAB_FOR_STEP={'New Code':'create','Print Queue':'print','Poster':'print','Distribute':'distribute','Screens':'screens','Menu Editor':'menu','Reports':'reports','Applications':'applications','Destinations':'destinations'};
                  const stepTab=TAB_FOR_STEP[s.split(' → ')[0]];
                  const isDone=stepTab&&visitedTabs.includes(stepTab)&&!isCurrent;
                  return <span key={s} style={{fontSize:'.7rem',padding:'.15rem .5rem',borderRadius:'2px',
                    background:isCurrent?'#c0392b':isDone?'#1a5c1a':'#2a4a6c',
                    color:isCurrent?'#fff':isDone?'#5aff7a':'#88aacc',
                    textDecoration:isDone?'line-through':'none'}}>{s}</span>;
                })}
              </div>
              {nextStep&&<span style={{fontSize:'.75rem',color:'#88aacc'}}>→ Next: <strong style={{color:'#fff'}}>{nextStep}</strong></span>}
            </div>
            <button className="btn btn-secondary btn-small" onClick={()=>setActiveTask(null)} style={{flexShrink:0}}>Dismiss</button>
          </div>
        );
      })()}
      <div className="stats-grid no-print">
        <div className="stat"><div className="number">{codes.length}</div><div className="label">Total Codes</div></div>
        <div className="stat"><div className="number">{activeCodes}</div><div className="label">Active</div></div>
        <div className="stat"><div className="number">{totalScans}</div><div className="label">Total Scans</div></div>
        <div className="stat" style={warnings?{borderColor:'#5a3a1a'}:{}}><div className="number" style={warnings?{color:'#ffaa5a'}:{}}>{warnings}</div><div className="label">Destination Warnings</div></div>
      </div>
      <div className="tabs no-print">
        <span className="tab-group-label">Publish</span>
        {[['create','New Code'],['print',`Print Queue${printQueue.length?` (${printQueue.length})`:''}`],['distribute','Distribute'],['screens','Screens']].filter(([id])=>TABS.find(t=>t[0]===id)).map(([id,label])=>(
          <button key={id} className={`tab ${tab===id?'active':''}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
        <span className="tab-group-label">Manage</span>
        {[['library',`Library (${codes.length})`],['destinations','Destinations'],['groups','Groups'],['templates',`Templates (${templates.length+designs.length})`]].filter(([id])=>TABS.find(t=>t[0]===id)).map(([id,label])=>(
          <button key={id} className={`tab ${tab===id?'active':''}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
        <span className="tab-group-label">Review</span>
        {[['history','History'],['reports','Reports'],['applications',newApplications?`Applications (${newApplications} new)`:'Applications']].map(([id,label])=>(
          <button key={id} className={`tab ${tab===id?'active':''}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
        <span className="tab-group-label">Configure</span>
        {[['menu','Menu Editor'],...(isAdmin?[['users','Users']]:[])]
          .map(([id,label])=>(
          <button key={id} className={`tab ${tab===id?'active':''}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>
      {loading&&<div className="empty">Loading...</div>}
      {!loading&&<>
        {tab==='library'&&<Library codes={codes} destinations={destinations} onRefresh={loadAll} onAddToPrintQueue={addToPrintQueue} onDistribute={handleDistribute} isAdmin={isAdmin} sortField={sortField} setSortField={setSortField} sortDir={sortDir} setSortDir={setSortDir} newCodeId={newCodeId}/>}
        {tab==='create'&&isAdmin&&<CreateForm destinations={destinations} onCreate={(id)=>{loadAll();setTab('library');if(id){setNewCodeId(id);setTimeout(()=>setNewCodeId(null),8000);}}}/>}
        {tab==='print'&&<PrintQueue queue={printQueue} templates={templates} designs={designs} onRemove={id=>setPrintQueue(q=>q.filter(c=>c.id!==id))} onClear={()=>setPrintQueue([])} onSaved={loadAll}/>}
        {tab==='distribute'&&isAdmin&&<Distribute codes={codes} groups={groups} staffList={staffList} onStaffCreated={loadAll} onDistributed={loadAll} initialCode={distributeCode}/>}
        {tab==='screens'&&<Screens codes={codes} zones={zones} assignments={assignments} onRefresh={loadAll} isAdmin={isAdmin}/>}
        {tab==='groups'&&isAdmin&&<Groups groups={groups} onRefresh={loadAll} isAdmin={isAdmin}/>}
        {tab==='destinations'&&<Destinations destinations={destinations} onRefresh={loadAll} isAdmin={isAdmin}/>}
        {tab==='templates'&&isAdmin&&<Templates templates={templates} designs={designs} codes={codes} onRefresh={loadAll} isAdmin={isAdmin}/>}
        {tab==='history'&&<History distributions={distributions} codes={codes} groups={groups} staff={staffList}/>}
        {tab==='reports'&&<Reports codes={codes} scanEvents={scanEvents}/>}
        {tab==='applications'&&<Applications applications={applications} onRefresh={loadAll}/>}
        {tab==='menu'&&<MenuEditor anchor={menuAnchor} onAnchorUsed={()=>setMenuAnchor(null)}/>}
        {tab==='users'&&isAdmin&&<UsersTab/>}
      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
