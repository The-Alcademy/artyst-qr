  function updateChoice(gi,ci,key,val){setGroups(g=>g.map((gp,idx)=>idx===gi?{...gp,choices:gp.choices.map((c,cidx)=>cidx===ci?{...c,[key]:key==='price_mod'?parseFloat(val)||0:val}:c)}:gp));}
  const save=async()=>{const valid=groups.every(g=>g.name&&g.choices.length>0&&g.choices.every(c=>c.label));if(!valid){flash('Every group needs a name and every choice needs a label.','error');return;}await supabase(`/rest/v1/menu_items?id=eq.${item.id}`,'PATCH',{options:groups.length>0?groups:null});flash('Options saved.');if(onSaved) onSaved();}
  return(<div style={{marginTop:'1rem',paddingTop:'1rem',borderTop:'1px solid #222'}}><div style={{fontSize:'.72rem',textTransform:'uppercase',letterSpacing:'.08em',color:'#c8a96e',marginBottom:'.8rem'}}>Customisation options</div>{status&&<div className={status.type==='error'?'error':'success'} style={{marginBottom:'.6rem'}}>{status.msg}</div>}{groups.map((group,gi)=>(<div key={gi} className='options-group' style={{borderRadius:'3px',padding:'.8rem',marginBottom:'.6rem'}}><div style={{display:'flex',gap:'.5rem',alignItems:'flex-end',marginBottom:'.6rem',flexWrap:'wrap'}}><div className="form-group" style={{margin:0,flex:'1 1 140px'}}><label>Group name</label><input value={group.name} onChange={e=>updateGroup(gi,'name',e.target.value)} placeholder="e.g. Milk, Syrup, Mixer"/></div><div className="form-group" style={{margin:0,flex:'0 0 auto'}}><label>Default</label><select value={group.default_index} onChange={e=>updateGroup(gi,'default_index',parseInt(e.target.value))}><option value={-1}>None</option>{group.choices.map((c,i)=><option key={i} value={i}>{c.label||`Choice ${i+1}`}</option>)}</select></div><label style={{display:'flex',alignItems:'center',gap:'.3rem',fontSize:'.78rem',color:'#888',cursor:'pointer',flexShrink:0,paddingBottom:'4px'}}><input type="checkbox" checked={group.required} onChange={e=>updateGroup(gi,'required',e.target.checked)} style={{width:'auto'}}/>Required</label><button className="btn btn-secondary btn-small" style={{alignSelf:'flex-end'}} onClick={()=>removeGroup(gi)}>Remove group</button></div><div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',color:'#555',marginBottom:'.4rem'}}>Choices</div>{group.choices.map((choice,ci)=>(<div key={ci} style={{display:'flex',gap:'.4rem',alignItems:'center',marginBottom:'.3rem'}}><input value={choice.label} onChange={e=>updateChoice(gi,ci,'label',e.target.value)} placeholder="e.g. Oat milk" style={{flex:2,padding:'.3rem .5rem',fontSize:'.82rem',borderRadius:'2px'}}/><div style={{display:'flex',alignItems:'center',gap:'.2rem',flex:'0 0 auto'}}><span style={{fontSize:'.75rem'}}>+£</span><input type="number" value={choice.price_mod} min="0" step="0.50" onChange={e=>updateChoice(gi,ci,'price_mod',e.target.value)} style={{width:'64px',padding:'.3rem .4rem',fontSize:'.82rem',borderRadius:'2px'}}/></div>{group.choices.length>1&&<button className="btn btn-secondary btn-small" onClick={()=>removeChoice(gi,ci)} style={{padding:'.3rem .5rem',flexShrink:0}}>✕</button>}</div>))}<button className="btn btn-secondary btn-small" style={{marginTop:'.4rem'}} onClick={()=>addChoice(gi)}>+ Add choice</button></div>))}<div style={{display:'flex',gap:'.5rem',marginTop:'.6rem'}}><button className="btn btn-secondary btn-small" onClick={addGroup}>+ Add option group</button><button className="btn btn-primary btn-small" onClick={save}>Save options</button>{groups.length>0&&<button className="btn btn-secondary btn-small" onClick={()=>{if(confirm('Remove all options?')){setGroups([]);}}}>Clear all</button>}</div></div>);
}

function OffersEditor({isAdmin}){
  const SLOT_LABELS={brunch:'Brunch (8am–12pm)',lunch:'Lunch (12–2pm)',tea:'Afternoon tea (2–5pm)',evening:'Evening (5pm–close)'};
  const [offers,setOffers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({eyebrow:'',headline:'',body:'',cta:'',item_name:'',item_description:'',item_price_display:''});
  const [status,setStatus]=useState(null);

  async function loadOffers(){
    setLoading(true);
    const res=await supabase('/rest/v1/slot_offers?order=slot');
    setOffers(Array.isArray(res)?res:[]);
    setLoading(false);
  }
  useEffect(()=>{loadOffers();},[]);

  function flash(msg,type='success'){setStatus({type,msg});setTimeout(()=>setStatus(null),2500);}

  function startEdit(offer){
    setEditing(offer.id);
    setForm({eyebrow:offer.eyebrow||'',headline:offer.headline||'',body:offer.body||'',cta:offer.cta||'',item_name:offer.item_name||'',item_description:offer.item_description||'',item_price_display:offer.item_price_display||''});
  }

  async function save(){
    if(!form.headline){flash('Headline is required.','error');return;}
    await supabase(`/rest/v1/slot_offers?id=eq.${editing}`,'PATCH',{
      eyebrow:form.eyebrow||null,
      headline:form.headline,
      body:form.body||null,
      cta:form.cta||'See the menu',
      item_name:form.item_name||null,
      item_description:form.item_description||null,
      item_price_display:form.item_price_display||null,
    });
    setEditing(null);
    flash('Saved.');
    loadOffers();
  }

  async function toggleActive(offer){
    await supabase(`/rest/v1/slot_offers?id=eq.${offer.id}`,'PATCH',{active:!offer.active});
    loadOffers();
  }

  return(
    <div className="card" id="menu-offers" style={{marginBottom:'1.5rem'}}>
      <h2>Special Offers</h2>
      <p style={{fontSize:'.82rem',color:'#888',margin:'-.4rem 0 1rem'}}>
        Time-based overlay shown to customers when they first open the menu. One offer per service slot.
      </p>
      {status&&<div className={status.type==='error'?'error':'success'} style={{marginBottom:'1rem'}}>{status.msg}</div>}
      {loading&&<div className="empty">Loading...</div>}
      {!loading&&offers.map(offer=>(
        <div key={offer.id} style={{padding:'.8rem 0',borderBottom:'1px solid #222'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.4rem'}}>
            <span style={{fontSize:'.75rem',letterSpacing:'.1em',textTransform:'uppercase',
              color:offer.active?'var(--gold,#c8a96e)':'#555',fontWeight:600}}>
              {SLOT_LABELS[offer.slot]||offer.slot}
            </span>
            <div style={{display:'flex',gap:'.3rem'}}>
              {isAdmin&&<button className={`btn btn-small ${offer.active?'btn-secondary':'btn-primary'}`}
                onClick={()=>toggleActive(offer)}>{offer.active?'Active':'Off'}</button>}
              {isAdmin&&<button className="btn btn-blue btn-small" onClick={()=>startEdit(offer)}>Edit</button>}
            </div>
          </div>
          {editing===offer.id?(
            <div style={{background:'#111',border:'1px solid #2a5a7c',borderRadius:'2px',padding:'.8rem',marginTop:'.4rem'}}>
              <div className="form-grid">
                <div className="form-group">
                  <label>Eyebrow <span style={{fontWeight:400,color:'#666'}}>e.g. "This evening"</span></label>
                  <input value={form.eyebrow} onChange={e=>setForm(f=>({...f,eyebrow:e.target.value}))} placeholder="e.g. Morning offer"/>
                </div>
                <div className="form-group">
                  <label>CTA button text</label>
                  <input value={form.cta} onChange={e=>setForm(f=>({...f,cta:e.target.value}))} placeholder="See the menu"/>
                </div>
                <div className="form-group full">
                  <label>Headline</label>
                  <input value={form.headline} onChange={e=>setForm(f=>({...f,headline:e.target.value}))} placeholder="e.g. Coffee &amp; cake — on us"/>
                </div>
                <div className="form-group full">
                  <label>Body text</label>
                  <textarea value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))}
                    rows={3} style={{width:'100%',background:'#0a0a0a',border:'1px solid #333',color:'#eee',
                      borderRadius:'2px',padding:'.5rem .6rem',fontSize:'.85rem',lineHeight:1.6,resize:'vertical'}}/>
                </div>
                <div className="form-group">
                  <label>Offer item name <span style={{fontWeight:400,color:'#666'}}>shown as first item in menu</span></label>
                  <input value={form.item_name} onChange={e=>setForm(f=>({...f,item_name:e.target.value}))} placeholder="e.g. Hot drink &amp; pastry"/>
                </div>
                <div className="form-group">
                  <label>Item price</label>
                  <input value={form.item_price_display} onChange={e=>setForm(f=>({...f,item_price_display:e.target.value}))} placeholder="e.g. £5"/>
                </div>
                <div className="form-group full">
                  <label>Item description</label>
                  <input value={form.item_description} onChange={e=>setForm(f=>({...f,item_description:e.target.value}))} placeholder="e.g. Any filter coffee or tea with any pastry"/>
                </div>
                <div className="form-group full" style={{flexDirection:'row',justifyContent:'flex-end',gap:'.4rem'}}>
                  <button className="btn btn-secondary btn-small" onClick={()=>setEditing(null)}>Cancel</button>
                  <button className="btn btn-primary btn-small" onClick={save}>Save</button>
                </div>
              </div>
            </div>
          ):(
            <div style={{opacity:offer.active?1:0.45}}>
              <div style={{fontSize:'.78rem',color:'#888',marginBottom:'2px'}}>{offer.eyebrow}</div>
              <div style={{fontSize:'.9rem',fontWeight:600,color:'#eee',marginBottom:'4px'}}>{offer.headline||<em style={{color:'#555'}}>No headline set</em>}</div>
              <div style={{fontSize:'.78rem',color:'#666',lineHeight:1.5,marginBottom:'4px'}}>{offer.body}</div>
              {offer.item_name&&<div style={{fontSize:'.78rem',marginTop:'4px',padding:'.3rem .5rem',background:'var(--gold-bg,#f5eedf)',borderRadius:'2px',border:'1px solid var(--gold-border,#e8d5a8)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{color:'var(--gold,#c8a96e)',fontWeight:500}}>{offer.item_name}</span>
                {offer.item_price_display&&<span style={{color:'var(--gold,#c8a96e)',fontWeight:600,marginLeft:'.5rem',flexShrink:0}}>{offer.item_price_display}</span>}
              </div>}
            </div>
          )}
        </div>
      ))}
      {!loading&&!offers.length&&(
        <div className="empty" style={{padding:'1.5rem'}}>
          No offers found — run the SQL setup to create the slot_offers table.
        </div>
      )}
    </div>
  );
}

function MenuEditor({anchor,onAnchorUsed,isAdmin}){
  const [categories,setCategories]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editingItem,setEditingItem]=useState(null);
  const [editVal,setEditVal]=useState('');
  const [editingDetails,setEditingDetails]=useState(null);
  const [detailVal,setDetailVal]=useState('');
  const [slotVal,setSlotVal]=useState([]);
  const [addingTo,setAddingTo]=useState(null);
  const [newItem,setNewItem]=useState({name:'',description:'',price_display:''});
  const [status,setStatus]=useState(null);
  const [addingCat,setAddingCat]=useState(false);
  const [newCat,setNewCat]=useState({name:'',slug:'',side:'cafe',sort_order:100});
  const ALL_SLOTS=[{key:'brunch',label:'Brunch',hours:'8am–12pm'},{key:'lunch',label:'Lunch',hours:'12–2pm'},{key:'tea',label:'Tea',hours:'2–5pm'},{key:'evening',label:'Evening',hours:'5pm–close'}];
  const loadMenu=async()=>{setLoading(true);const[cats,items]=await Promise.all([supabase('/rest/v1/menu_categories?order=side,sort_order'),supabase('/rest/v1/menu_items?order=category_id,sort_order')]);const grouped=(Array.isArray(cats)?cats:[]).map(cat=>({...cat,items:(Array.isArray(items)?items:[]).filter(i=>i.category_id===cat.id)}));setCategories(grouped);setLoading(false);}
  useEffect(()=>{loadMenu();},[]);
  useEffect(()=>{
    if(!anchor) return;
    const el=document.getElementById(anchor);
    if(el){el.scrollIntoView({behavior:'smooth',block:'start'});if(onAnchorUsed) onAnchorUsed();}
  },[anchor]);
  function flash(msg,type='success'){setStatus({type,msg});setTimeout(()=>setStatus(null),2500);}
  const saveMenuCat=async()=>{
    if(!newCat.name||!newCat.slug){flash('Name and slug are required.','error');return;}
    const res=await supabase('/rest/v1/menu_categories','POST',{
      name:newCat.name,
      slug:newCat.slug,
      side:newCat.side,
      sort_order:parseInt(newCat.sort_order)||100,
      active:true
    },'return=representation');
    if(res.error||(Array.isArray(res)&&res[0]?.code)){flash('Failed to add category.','error');return;}
    setNewCat({name:'',slug:'',side:'cafe',sort_order:100});
    setAddingCat(false);
    flash('Category added.');
    loadMenu();
  };
  const toggleAvailable=async(item)=>{await supabase(`/rest/v1/menu_items?id=eq.${item.id}`,'PATCH',{available:!item.available});loadMenu();}
  const toggleTakeaway=async(item)=>{await supabase(`/rest/v1/menu_items?id=eq.${item.id}`,'PATCH',{takeaway:!item.takeaway});loadMenu();}
  const toggleCategoryActive=async(cat)=>{await supabase(`/rest/v1/menu_categories?id=eq.${cat.id}`,'PATCH',{active:!cat.active});loadMenu();}
  function startEdit(item,field){setEditingDetails(null);setEditingItem({id:item.id,field});setEditVal(item[field]||'');}
  const saveEdit=async(itemId,field)=>{await supabase(`/rest/v1/menu_items?id=eq.${itemId}`,'PATCH',{[field]:editVal||null});setEditingItem(null);flash('Saved.');loadMenu();}
  function startEditDetails(item){setEditingItem(null);if(editingDetails===item.id){setEditingDetails(null);}else{setEditingDetails(item.id);setDetailVal(item.details||'');setSlotVal(item.time_slots||['brunch','lunch','tea','evening']);}}
  function toggleSlot(key){setSlotVal(prev=>prev.includes(key)?prev.filter(s=>s!==key):[...prev,key]);}
  const saveDetails=async(itemId)=>{await supabase(`/rest/v1/menu_items?id=eq.${itemId}`,'PATCH',{details:detailVal||null,time_slots:slotVal.length>0?slotVal:['brunch','lunch','tea','evening']});setEditingDetails(null);flash('Details saved.');loadMenu();}
  const deleteItem=async(id)=>{if(!confirm('Delete this item?'))return;await supabase(`/rest/v1/menu_items?id=eq.${id}`,'DELETE');loadMenu();}
  const addItem=async(categoryId)=>{if(!newItem.name){flash('Name is required.','error');return;}await supabase('/rest/v1/menu_items','POST',{category_id:categoryId,name:newItem.name,description:newItem.description||null,price_display:newItem.price_display||null,available:true,takeaway:false,sort_order:999,time_slots:['brunch','lunch','tea','evening']});setNewItem({name:'',description:'',price_display:''});setAddingTo(null);flash('Item added.');loadMenu();}
  const cafe=categories.filter(c=>c.side==='cafe');
  const bar=categories.filter(c=>c.side==='bar');
  function slotSummary(slots){if(!slots||slots.length===4)return '';if(slots.length===0)return '⚠ hidden always';return slots.join(', ');}
  function Toggle({on,onToggle,color,offColor}){
    const bg=color||'#1a5c1a';
    const off=offColor||'#3a1a1a';
    return(
      <div onClick={onToggle} style={{width:'32px',height:'18px',borderRadius:'9px',cursor:'pointer',
        background:on?bg:off,display:'flex',alignItems:'center',padding:'2px',transition:'background .15s'}}>
        <div style={{width:'12px',height:'12px',borderRadius:'50%',
          background:on?'#5aff7a':'#ff5a5a',marginLeft:on?'12px':'0',transition:'margin .15s'}}/>
      </div>
    );
  }

  function renderSection(cats,label){
    return(
      <div className="card" key={label}>
        <h2>{label}</h2>
        {cats.map(cat=>(
          <div key={cat.id} id={'menu-cat-'+cat.slug} style={{marginBottom:'1.5rem',paddingBottom:'1.5rem',borderBottom:'1px solid #222'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.6rem',padding:'.4rem .7rem',background:cat.active?'var(--gold-bg,#f5eedf)':'var(--bg-raised,#f2efe9)',borderLeft:'3px solid '+(cat.active?'var(--gold,#c8a96e)':'#ccc'),borderRadius:'2px'}}>
              <span style={{fontSize:'.8rem',letterSpacing:'.1em',textTransform:'uppercase',fontWeight:600,color:cat.active?'var(--gold,#c8a96e)':'#999'}}>{cat.name}</span>
              <div style={{display:'flex',gap:'.4rem'}}>
                {isAdmin&&<><button className={"btn btn-small "+(cat.active?'btn-secondary':'btn-primary')} onClick={()=>toggleCategoryActive(cat)}>
                  {cat.active?'Hide category':'Show category'}
                </button>
                <button className="btn btn-green btn-small" onClick={()=>setAddingTo(addingTo===cat.id?null:cat.id)}>+ Add item</button></>}
              </div>
            </div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'.82rem'}}>
              <thead>
                <tr>
                  {['Name','Description','Price','Slots','On','T/A',''].map((h,i)=>(
                    <th key={i} style={{textAlign:i>=4?'center':'left',padding:'.4rem .5rem',fontSize:'.7rem',
                      textTransform:'uppercase',letterSpacing:'.06em',color:'#555',borderBottom:'1px solid #2a2a2a'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {cat.items.map(item=>(
                  <React.Fragment key={item.id}>
                    <tr style={{opacity:item.available?1:0.45}}>
                      {['name','description','price_display'].map(field=>(
                        <td key={field} style={{padding:'.4rem .5rem',borderBottom:editingDetails===item.id?'none':'1px solid #1e1e1e',verticalAlign:'middle'}}>
                          {editingItem&&editingItem.id===item.id&&editingItem.field===field?(
                            <div style={{display:'flex',gap:'.3rem'}}>
                              <input value={editVal} onChange={e=>setEditVal(e.target.value)}
                                onKeyDown={e=>{if(e.key==='Enter')saveEdit(item.id,field);if(e.key==='Escape')setEditingItem(null);}}
                                autoFocus style={{flex:1,padding:'.3rem .4rem',fontSize:'.8rem',background:'#111',border:'1px solid #c0392b',color:'#eee',borderRadius:'2px'}}/>
                              <button className="btn btn-primary btn-small" onClick={()=>saveEdit(item.id,field)}>ok</button>
                              <button className="btn btn-secondary btn-small" onClick={()=>setEditingItem(null)}>x</button>
                            </div>
                          ):(
                            <span onClick={()=>startEdit(item,field)}
                              style={{cursor:'text',fontStyle:item[field]?'normal':'italic',display:'block',minWidth:'40px',minHeight:'20px'}}
                              title="Click to edit">{item[field]||'-'}</span>
                          )}
                        </td>
                      ))}
                      <td style={{padding:'.4rem .5rem',borderBottom:editingDetails===item.id?'none':'1px solid #1e1e1e',verticalAlign:'middle'}}>
                        <span style={{fontSize:'.72rem',color:(!item.time_slots||item.time_slots.length===4)?'#444':'#ffaa5a'}}>
                          {slotSummary(item.time_slots)||'all'}
                        </span>
                      </td>
                      <td style={{padding:'.4rem .5rem',textAlign:'center',borderBottom:editingDetails===item.id?'none':'1px solid #1e1e1e'}}>
                        {isAdmin?<Toggle on={item.available} onToggle={()=>toggleAvailable(item)}/>:<span style={{fontSize:'.75rem'}}>{item.available?'On':'Off'}</span>}

// ── APP AUTO REPLY ───────────────────────────────────────
const APP_REPLY_TYPES = [
  {id:'acknowledge', label:'Acknowledge receipt', desc:'Thank them, say you\'ll be in touch'},
  {id:'shortlist',   label:'Invite to interview', desc:'Congratulate, propose next steps'},
  {id:'reject',      label:'Polite rejection',    desc:'Thank them, wish them well'},
  {id:'more_info',   label:'Request more info',   desc:'Ask a specific follow-up question'},
];

function AppAutoReply({application}){
  const [type,setType]=useState('');
  const [draft,setDraft]=useState('');
  const [loading,setLoading]=useState(false);
  const [sent,setSent]=useState(false);
  const [error,setError]=useState('');
  const [open,setOpen]=useState(false);

  const generate=async()=>{
    if(!type) return;
    setLoading(true);setDraft('');setError('');
    try{
      const res=await fetch('/api/assistant',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001',
          max_tokens:1000,
          messages:[{role:'user',content:`You are writing on behalf of The Artyst, a cultural café, bar and events venue in Cambridge honouring Syd Barrett's legacy. Write a brief, warm, professional email response to a job application.

Applicant name: ${application.name}
Role applied for: ${application.opportunity_slug}
Response type: ${APP_REPLY_TYPES.find(t=>t.id===type)?.label}
Their message: ${application.message||'(none provided)'}

Write only the email body (no subject line, no "Dear" or sign-off needed — those will be added). Keep it under 100 words. Warm but professional. Reflect The Artyst's character — cultural, human, not corporate.`}]
        })
      });
      const data=await res.json();
      setDraft(data.content?.[0]?.text||'');
    }catch(e){setError('Generation failed.');}
    setLoading(false);
  }

  const sendReply=async()=>{
    if(!draft||!application.email) return;
    setLoading(true);
    try{
      const res=await fetch('/api/send-email',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          to:application.email,
          subject:`Re: Your application — ${application.opportunity_slug}`,
          body:draft,
          reply_to:'matthew@othersyde.co.uk'
        })
      });
      if(res.ok){setSent(true);setOpen(false);}
      else setError('Send failed.');
    }catch(e){setError('Send failed.');}
    setLoading(false);
  }

  if(sent) return <div className="success" style={{marginTop:'.8rem'}}>Response sent to {application.email}</div>;

  return(
    <div style={{marginTop:'.8rem',paddingTop:'.8rem',borderTop:'1px solid #222'}}>
      {!open?(
        <button className="btn btn-blue btn-small" onClick={()=>setOpen(true)}>Send response email</button>
      ):(
        <div>
          <div style={{fontSize:'.7rem',textTransform:'uppercase',letterSpacing:'.06em',color:'#555',marginBottom:'.5rem'}}>Auto-respond</div>
          <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap',marginBottom:'.6rem'}}>
            {APP_REPLY_TYPES.map(t=>(
              <div key={t.id} onClick={()=>setType(t.id)}
                style={{padding:'.35rem .7rem',borderRadius:'2px',cursor:'pointer',fontSize:'.78rem',
                  background:type===t.id?'#1a3a5c':'inherit',
                  color:type===t.id?'#5aafff':'inherit',
                  border:'1px solid '+(type===t.id?'#2a5a7c':'#333')}}>
                {t.label}
              </div>
            ))}
          </div>
          {type&&!draft&&<button className="btn btn-secondary btn-small" onClick={generate} disabled={loading}>{loading?'Writing...':'Generate draft'}</button>}
          {draft&&(
            <div style={{marginTop:'.5rem'}}>
              <textarea value={draft} onChange={e=>setDraft(e.target.value)} rows={5}
                style={{width:'100%',padding:'.5rem .6rem',fontSize:'.85rem',borderRadius:'2px',lineHeight:1.6,resize:'vertical'}}/>
              <div style={{display:'flex',gap:'.4rem',marginTop:'.4rem'}}>
                <button className="btn btn-secondary btn-small" onClick={generate} disabled={loading}>Regenerate</button>
                <button className="btn btn-primary btn-small" onClick={sendReply} disabled={loading}>{loading?'Sending...':'Send to '+application.email}</button>
                <button className="btn btn-secondary btn-small" onClick={()=>setOpen(false)}>Cancel</button>
              </div>
            </div>
          )}
          {error&&<div className="error" style={{marginTop:'.4rem'}}>{error}</div>}
        </div>
      )}
    </div>
  );
}

// ── REVIEW RESPONDER ─────────────────────────────────────
function ReviewResponder(){
  const [reviewText,setReviewText]=useState('');
  const [rating,setRating]=useState('5');
  const [draft,setDraft]=useState('');
  const [loading,setLoading]=useState(false);
  const [copied,setCopied]=useState(false);
  const [error,setError]=useState('');

  const generate=async()=>{
    if(!reviewText.trim()) return;
    setLoading(true);setDraft('');setError('');setCopied(false);
    try{
      const res=await fetch('/api/assistant',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001',
          max_tokens:1000,
          messages:[{role:'user',content:`You are writing a public response to a customer review on behalf of The Artyst — a cultural café, bar and events venue in Cambridge that celebrates Syd Barrett's legacy, hosts live music, exhibitions, and the Invysible College. The venue is warm, intelligent, and distinctive — not corporate.

Review rating: ${rating} stars
Review text: ${reviewText}

Write a short, genuine public response (under 80 words). If positive: thank them warmly and reflect something specific from their review. If negative or mixed: acknowledge their concern graciously, explain briefly if appropriate, invite them back. Never be defensive. Sound like a person, not a brand. Do not use hollow phrases like "we pride ourselves" or "valued feedback".

Write only the response text.`}]
        })
      });
      const data=await res.json();
      setDraft(data.content?.[0]?.text||'');
    }catch(e){setError('Generation failed.');}
    setLoading(false);
  }

  function copyToClipboard(){
    navigator.clipboard.writeText(draft);
    setCopied(true);
    setTimeout(()=>setCopied(false),3000);
  }

  return(
    <div className="card">
      <h2>Review Responder</h2>
      <p style={{fontSize:'.82rem',margin:'-.4rem 0 1rem'}}>Paste a TripAdvisor or Google review, generate a response, then copy and paste it manually into the platform.</p>
      <div className="form-grid">
        <div className="form-group">
          <label>Star rating</label>
          <select value={rating} onChange={e=>setRating(e.target.value)}>
            {['5','4','3','2','1'].map(r=><option key={r} value={r}>{r} star{r!=='1'?'s':''}</option>)}
          </select>
        </div>
        <div className="form-group full">
          <label>Review text</label>
          <textarea value={reviewText} onChange={e=>setReviewText(e.target.value)} rows={4}
            placeholder="Paste the customer review here..." style={{resize:'vertical'}}/>
        </div>
        <div className="form-group full" style={{flexDirection:'row',justifyContent:'flex-end'}}>
          <button className="btn btn-primary" onClick={generate} disabled={loading||!reviewText.trim()}>
            {loading?'Writing...':'Generate response'}
          </button>
        </div>
      </div>
      {error&&<div className="error">{error}</div>}
      {draft&&(
        <div style={{marginTop:'1rem'}}>
          <label style={{marginBottom:'.4rem',display:'block'}}>Generated response — edit if needed</label>
          <textarea value={draft} onChange={e=>setDraft(e.target.value)} rows={4}
            style={{width:'100%',padding:'.5rem .6rem',fontSize:'.88rem',borderRadius:'2px',lineHeight:1.6,resize:'vertical'}}/>
          <div style={{display:'flex',gap:'.5rem',marginTop:'.5rem'}}>
            <button className="btn btn-secondary" onClick={generate} disabled={loading}>Regenerate</button>
            <button className="btn btn-primary" onClick={copyToClipboard}>{copied?'Copied ✓':'Copy to clipboard'}</button>
            <a href="https://www.tripadvisor.com/Restaurant_Review-g186225-d34333914-Reviews-The_Artyst-Cambridge_Cambridgeshire_England.html"
              target="_blank" style={{marginLeft:'auto',fontSize:'.8rem',color:'#5aafff',alignSelf:'center',textDecoration:'none'}}>
              Open TripAdvisor ↗
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ADMIN ASSISTANT ───────────────────────────────────────
const ASSISTANT_SYSTEM = "You are the admin assistant for The Artyst QR Engine (CA-022). The Artyst is a cultural cafe, bar and events venue at 54-56 Chesterton Road, Cambridge. It is the world's only dedicated Syd Barrett heritage venue, operating with Barrett estate approval and exhibiting Mick Rock photography. Seated, table-service, events-led cultural space. Sections: Library (QR codes + scan counts), New Code (create codes), Print Queue + Poster Editor, Distribute (WhatsApp/email/screens), Screens (Window/POS/Wall zones), Communication Sources (URL library), Groups (subscriber lists), History (distribution log), Reports (scan analytics), Applications (job applications + auto-reply), Menu Editor (menu items, hours, news notices, footer promos, Play section), Reviews (generate responses), Users (admin/viewer accounts). Help staff complete tasks. For creative copy write in The Artyst voice: warm, intelligent, culturally literate, not corporate.";

function AdminAssistant(){
  const [open,setOpen]=useState(false);
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const inputRef=useRef(null);
  const bottomRef=useRef(null);

  useEffect(()=>{
    if(open&&inputRef.current) inputRef.current.focus();
  },[open]);

  useEffect(()=>{
    if(bottomRef.current) bottomRef.current.scrollIntoView({behavior:'smooth'});
  },[messages]);

  const send=async()=>{
    if(!input.trim()||loading) return;
    const userMsg={role:'user',content:input.trim()};
    const newMessages=[...messages,userMsg];
    setMessages(newMessages);
    setInput('');
    setLoading(true);
    try{
      const res=await fetch('/api/assistant',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001',
          max_tokens:1000,
          system:ASSISTANT_SYSTEM,
          messages:newMessages
        })
      });
      const data=await res.json();
      const reply=data.content?.[0]?.text||'Sorry, something went wrong.';
      setMessages(m=>[...m,{role:'assistant',content:reply}]);
    }catch(e){
      setMessages(m=>[...m,{role:'assistant',content:'Connection error — please try again.'}]);
    }
    setLoading(false);
  }

  return(
    <>
      <button
        onClick={()=>setOpen(o=>!o)}
        style={{position:'fixed',bottom:'4.5rem',right:'1.5rem',background:'#c0392b',color:'#fff',
          border:'none',borderRadius:'50%',width:'40px',height:'40px',fontSize:'1.1rem',
          cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 2px 8px rgba(0,0,0,.4)',zIndex:1000,transition:'transform .15s'}}
        title="Admin assistant">
        {open?'×':'✦'}
      </button>
      {open&&(
        <div style={{position:'fixed',bottom:'8rem',right:'1.5rem',width:'360px',maxHeight:'500px',
          display:'flex',flexDirection:'column',borderRadius:'6px',overflow:'hidden',
          boxShadow:'0 8px 32px rgba(0,0,0,.4)',zIndex:999,
          background:'var(--assistant-bg,#1a1a1a)',border:'1px solid #2a2a2a'}}>
          <div style={{padding:'.7rem 1rem',borderBottom:'1px solid #2a2a2a',display:'flex',justifyContent:'space-between',alignItems:'center',background:'#c0392b'}}>
            <span style={{fontSize:'.82rem',fontWeight:600,color:'#fff',letterSpacing:'.05em'}}>✦ Admin Assistant</span>
            <button onClick={()=>setMessages([])} style={{background:'none',border:'none',color:'rgba(255,255,255,.7)',cursor:'pointer',fontSize:'.72rem'}}>Clear</button>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'.8rem',display:'flex',flexDirection:'column',gap:'.6rem'}}>
            {messages.length===0&&(
              <div style={{fontSize:'.8rem',opacity:.5,textAlign:'center',padding:'1rem 0'}}>
                Ask me anything about the QR Engine or get help writing copy for The Artyst.
              </div>
            )}
            {messages.map((m,i)=>(
              <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
                <div style={{maxWidth:'85%',padding:'.5rem .7rem',borderRadius:'4px',fontSize:'.83rem',lineHeight:1.5,
                  background:m.role==='user'?'#c0392b':'#2a2a2a',
                  color:'#fff'}}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading&&<div style={{fontSize:'.78rem',opacity:.5}}>Thinking...</div>}
            <div ref={bottomRef}/>
          </div>
          <div style={{padding:'.6rem',borderTop:'1px solid #2a2a2a',display:'flex',gap:'.4rem'}}>
            <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}
              placeholder="Ask anything..."
              style={{flex:1,padding:'.45rem .6rem',fontSize:'.85rem',borderRadius:'3px'}}/>
            <button className="btn btn-primary btn-small" onClick={send} disabled={loading||!input.trim()}>→</button>
          </div>
        </div>
      )}
    </>
  );
}

function TaskBanner({activeTask,tab,visitedTabs,onDismiss}){
  const TAB_TO_STEP={'create':'New Code','print':'Print Queue','distribute':'Distribute',
    'screens':'Screens','menu':'Menu Editor','reports':'Reports','applications':'Applications',
    'destinations':'Destinations','groups':'Groups','library':'Library','history':'History','reviews':'Review Responder'};
  const currentStepLabel=TAB_TO_STEP[tab]||'';
  const currentIdx=activeTask.steps.findIndex(s=>s===currentStepLabel||s.startsWith(currentStepLabel));
  const nextStep=activeTask.steps[currentIdx+1]||null;
  return(
    <div style={{borderRadius:'3px',padding:'.7rem 1rem',marginBottom:'1rem',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'.5rem',background:'#1a3a5c',border:'1px solid #2a5a7c'}} className="no-print">
      <div style={{display:'flex',alignItems:'center',gap:'1rem',flex:1,minWidth:0,flexWrap:'wrap'}}>
        <span style={{fontSize:'.72rem',textTransform:'uppercase',letterSpacing:'.08em',color:'#5aafff',flexShrink:0}}>Task</span>
        <span style={{fontSize:'.85rem',color:'#fff',fontWeight:600,flexShrink:0}}>{activeTask.label}</span>
        <div style={{display:'flex',gap:'.3rem',flexWrap:'wrap'}}>
          {activeTask.steps.map((s,i)=>{
            const isCurrent=i===currentIdx||(currentIdx===-1&&i===0);
            const stepTab={'New Code':'create','Print Queue':'print','Poster':'print','Distribute':'distribute','Screens':'screens','Menu Editor':'menu','Reports':'reports','Applications':'applications','Destinations':'destinations'}[s.split(' ')[0]+' '+s.split(' ')[1]];
            const isDone=stepTab&&visitedTabs.includes(stepTab)&&!isCurrent;
            return <span key={s} style={{fontSize:'.7rem',padding:'.15rem .5rem',borderRadius:'2px',
              background:isCurrent?'#c0392b':isDone?'#1a5c1a':'#2a4a6c',
              color:isCurrent?'#fff':isDone?'#5aff7a':'#88aacc',
              textDecoration:isDone?'line-through':'none'}}>{s}</span>;
          })}
        </div>
        {nextStep&&<span style={{fontSize:'.75rem',color:'#88aacc'}}>Next: <strong style={{color:'#fff'}}>{nextStep}</strong></span>}
      </div>
      <button className="btn btn-secondary btn-small" onClick={onDismiss}>Dismiss</button>
    </div>
  );
}

function BackToTop(){
  const [visible,setVisible]=useState(false);
  useEffect(()=>{
    function onScroll(){setVisible(window.scrollY>400);}
    window.addEventListener('scroll',onScroll,{passive:true});
    return()=>window.removeEventListener('scroll',onScroll);
  },[]);
  return(
    <button
      className={"back-to-top"+(visible?'':' hidden')}
      onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}
      title="Back to top"
      aria-label="Back to top">
      ↑
    </button>
  );
}

// ── MENU PRINT EDITOR ────────────────────────────────────

const MENU_SLOTS=[
  {id:'all',label:'All day',desc:'Show everything'},
  {id:'brunch',label:'Brunch',desc:'8am – 12pm'},
  {id:'lunch',label:'Lunch',desc:'12pm – 2pm'},
  {id:'tea',label:'Afternoon tea',desc:'2pm – 5pm'},
  {id:'evening',label:'Evening',desc:'5pm – close'},
];

const MENU_FORMATS=[
  {id:'a4',label:'A4',w:'210mm',h:'297mm',cols:2},
  {id:'a5',label:'A5',w:'148mm',h:'210mm',cols:1},
  {id:'third',label:'1/3 A4',w:'99mm',h:'210mm',cols:1},
  {id:'square',label:'Square (Instagram)',w:'200mm',h:'200mm',cols:2},
  {id:'story',label:'Story (9:16)',w:'180mm',h:'320mm',cols:1},
];

const MENU_STYLES=[
  {id:'full',label:'Full Menu',desc:'All items, descriptions, dietary tags'},
  {id:'clean',label:'Clean Card',desc:'Larger text, no descriptions'},
  {id:'specials',label:'Specials',desc:'Big type, 1–2 items per section'},
  {id:'event',label:'Event Menu',desc:'Headed with title and date, course-style'},
];

function MenuPrintEditor(){
  const [cats,setCats]=useState([]);
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selectedCats,setSelectedCats]=useState(new Set());
  const [style,setStyle]=useState('full');
  const [fmt,setFmt]=useState('a4');
  const [title,setTitle]=useState('');
  const [subtitle,setSubtitle]=useState('');
  const [showDate,setShowDate]=useState(false);
  const [showBranding,setShowBranding]=useState(true);
  const [qrOption,setQrOption]=useState('none');
  const [qrUrl,setQrUrl]=useState('https://go.theartyst.co.uk/menu');
  const [slot,setSlot]=useState('all');
  const [showFooter,setShowFooter]=useState(true);
  const [showCover,setShowCover]=useState(false);
  const [coverTitle,setCoverTitle]=useState('The Artyst');
  const [coverSubtitle,setCoverSubtitle]=useState('Café · Bar · Culture · Cambridge');
  const [coverTagline,setCoverTagline]=useState('Syd Barrett taught us that creativity is serious play — psychedelic, experimental, alive.');
  const [coverDetails,setCoverDetails]=useState('54–56 Chesterton Road, Cambridge CB4 1EN\ntheartyst.co.uk');
  const [coverShowQr,setCoverShowQr]=useState(true);
  const [coverQrUrl,setCoverQrUrl]=useState('https://go.theartyst.co.uk/menu');
  const [coverQrLabel,setCoverQrLabel]=useState('Scan to open the digital menu on your phone');
  const [exporting,setExporting]=useState(false);
  const [copied,setCopied]=useState(false);
  const previewRef=useRef(null);

  useEffect(()=>{
    Promise.all([
      supabase('/rest/v1/menu_categories?select=*&active=eq.true&order=sort_order'),
      supabase('/rest/v1/menu_items?select=*&available=eq.true&order=sort_order'),
    ]).then(([c,i])=>{
      const catList=Array.isArray(c)?c:[];
      const itemList=Array.isArray(i)?i:[];
      setCats(catList);
      setItems(itemList);
      setSelectedCats(new Set(catList.map(c=>c.id)));
      setLoading(false);
    });
  },[]);

  function toggleCat(id){setSelectedCats(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});}
  function selectAll(){setSelectedCats(new Set(cats.map(c=>c.id)));}
  function selectNone(){setSelectedCats(new Set());}
  function selectSide(side){setSelectedCats(new Set(cats.filter(c=>c.side===side).map(c=>c.id)));}

  const fmtDef=MENU_FORMATS.find(f=>f.id===fmt)||MENU_FORMATS[0];

  function buildCoverHtml(){
    const today=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const slotDef=MENU_SLOTS.find(s=>s.id===slot);
    const detailLines=(coverDetails||'').split('\n').filter(Boolean);
    return `<div style="width:${fmtDef.w};height:${fmtDef.h};background:#faf8f4;font-family:Georgia,serif;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16mm;page-break-after:always;position:relative;">
      <!-- decorative top bar -->
      <div style="position:absolute;top:0;left:0;right:0;height:3mm;background:#c0392b;"></div>
      <!-- decorative bottom bar -->
      <div style="position:absolute;bottom:0;left:0;right:0;height:3mm;background:#c0392b;"></div>

      <div style="text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;">
        <!-- eyebrow -->
        <div style="font-size:7pt;letter-spacing:.25em;text-transform:uppercase;color:#c0392b;margin-bottom:6mm;">Est. 2025</div>

        <!-- main title -->
        <div style="font-size:36pt;font-weight:700;color:#1a1a18;line-height:1.1;margin-bottom:3mm;letter-spacing:-.01em;">${coverTitle||'The Artyst'}</div>

        <!-- subtitle line -->
        ${coverSubtitle?`<div style="font-size:10pt;letter-spacing:.14em;text-transform:uppercase;color:#8a6a2e;margin-bottom:8mm;">${coverSubtitle}</div>`:''}

        <!-- divider -->
        <div style="width:30mm;height:.5pt;background:#c0392b;margin-bottom:8mm;opacity:.4;"></div>

        <!-- menu type + slot -->
        <div style="font-size:16pt;font-weight:500;color:#1a1a18;margin-bottom:${coverTagline?'5mm':'8mm'};">${title||'Menu'}${slot!=='all'?' — '+slotDef.label:''}</div>

        <!-- tagline -->
        ${coverTagline?`<div style="font-size:9.5pt;color:#666;line-height:1.7;max-width:120mm;text-align:center;font-style:italic;margin-bottom:8mm;">&ldquo;${coverTagline}&rdquo;</div>`:''}

        <!-- date -->
        ${showDate?`<div style="font-size:8pt;color:#999;letter-spacing:.08em;margin-bottom:6mm;">${today}</div>`:''}

        <!-- divider -->
        <div style="width:20mm;height:.5pt;background:#ddd;margin-bottom:8mm;"></div>

        <!-- address / details -->
        ${detailLines.length?`<div style="text-align:center;">${detailLines.map(l=>`<div style="font-size:8.5pt;color:#888;line-height:1.9;letter-spacing:.04em;">${l}</div>`).join('')}</div>`:''}

        <!-- QR code -->
        ${coverShowQr?`<div style="margin-top:8mm;text-align:center;">
          <div id="cover-qr" style="display:inline-block;margin-bottom:2mm;"></div>
          <div style="font-size:7pt;color:#aaa;letter-spacing:.08em;">${coverQrLabel||'Scan to open the digital menu'}</div>
          <div style="font-size:6pt;font-family:monospace;color:#ccc;margin-top:.5mm;">${coverQrUrl}</div>
        </div>`:''}
      </div>
    </div>`;
  }

  function buildMenuHtml(){
    const activeCats=cats.filter(c=>selectedCats.has(c.id));
    const today=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const isClean=style==='clean';
    const isSpecials=style==='specials';
    const cols=isSpecials||isClean?1:fmtDef.cols;
    const slotDef=MENU_SLOTS.find(s=>s.id===slot);

    const headerHtml=`
      <div style="text-align:center;margin-bottom:${isSpecials?'8mm':'5mm'};padding-bottom:4mm;border-bottom:0.5pt solid #ccc;">
        ${showBranding?`<div style="font-size:7pt;letter-spacing:.2em;text-transform:uppercase;color:#8a6a2e;margin-bottom:2mm;">The Artyst &middot; 54&ndash;56 Chesterton Road &middot; Cambridge</div>`:''}
        ${title?`<div style="font-size:${isSpecials?'22pt':'16pt'};font-weight:600;font-family:Georgia,serif;color:#1a1a18;line-height:1.2;margin-bottom:1mm;">${title}</div>`:''}
        ${subtitle?`<div style="font-size:10pt;color:#666;margin-bottom:1mm;">${subtitle}</div>`:''}
        ${slot!=='all'?`<div style="font-size:8pt;letter-spacing:.12em;text-transform:uppercase;color:#8a6a2e;margin-bottom:1mm;">${slotDef.label} &middot; ${slotDef.desc}</div>`:''}
        ${showDate?`<div style="font-size:8pt;color:#999;letter-spacing:.08em;">${today}</div>`:''}
        ${!title&&!subtitle&&!showDate&&showBranding?`<div style="font-size:${isSpecials?'20pt':'14pt'};font-weight:600;font-family:Georgia,serif;color:#1a1a18;margin-top:2mm;">Menu</div>`:''}
      </div>`;

    const qrFooterHtml=qrOption==='footer'?`
      <div style="text-align:center;margin-top:8mm;padding-top:4mm;border-top:0.5pt solid #eee;">
        <div id="menu-export-qr" style="display:inline-block;margin-bottom:2mm;"></div>
        <div style="font-size:6pt;color:#999;letter-spacing:.1em;text-transform:uppercase;">Scan for the live digital menu</div>
        <div style="font-size:6pt;font-family:monospace;color:#bbb;margin-top:.5mm;">${qrUrl}</div>
      </div>`:'';

    // Print footer CSS — @page margin boxes for reliable cross-browser footer
    const footerCss=showFooter?`
      <style>
        @page {
          size: ${fmtDef.w} ${fmtDef.h};
          margin: 10mm;
          @bottom-left { content: "The Artyst · 54–56 Chesterton Road · Cambridge"; font-family: Georgia, serif; font-size: 7pt; color: #aaa; }
          @bottom-center { content: "${title||'Menu'}${slot!=='all'?' · '+slotDef.label:''}"; font-family: Georgia, serif; font-size: 7pt; color: #aaa; }
          @bottom-right { content: "Page " counter(page) " of " counter(pages); font-family: Georgia, serif; font-size: 7pt; color: #aaa; }
        }
        @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
      </style>`:`<style>@page{size:${fmtDef.w} ${fmtDef.h};margin:10mm;}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style>`;

    const catHtml=activeCats.map(cat=>{
      // Filter items by slot
      const catItems=items.filter(i=>{
        if(i.category_id!==cat.id) return false;
        if(slot==='all') return true;
        if(!i.time_slots||!i.time_slots.length) return true; // no restriction = always available
        return i.time_slots.includes(slot);
      });
      if(!catItems.length) return '';
      const sectionQrHtml=qrOption==='section'?`<div id="qr-sec-${cat.id}" style="float:right;margin:0 0 2mm 3mm;"></div>`:'';
      const itemHtml=catItems.slice(0,isSpecials?3:999).map(item=>`
        <div style="padding:${isSpecials?'3mm 0':'2mm 0'};border-bottom:0.3pt solid #eee;display:flex;justify-content:space-between;align-items:baseline;gap:4mm;page-break-inside:avoid;">
          <div style="flex:1;">
            <div style="font-size:${isSpecials?'13pt':isClean?'11pt':'10pt'};color:#1a1a18;font-weight:${isSpecials?600:500};line-height:1.3;">${item.name}</div>
            ${!isClean&&!isSpecials&&item.description?`<div style="font-size:7.5pt;color:#777;margin-top:.5mm;line-height:1.4;">${item.description}</div>`:''}
            ${!isClean&&item.dietary_tags&&item.dietary_tags.length?`<div style="margin-top:.5mm;">${item.dietary_tags.map(t=>`<span style="font-size:6pt;background:#f0ece7;color:#888;border-radius:2px;padding:1px 4px;margin-right:2px;">${t}</span>`).join('')}</div>`:''}
          </div>
          ${item.price_display?`<div style="font-size:${isSpecials?'13pt':isClean?'11pt':'10pt'};color:#1a1a18;font-weight:600;white-space:nowrap;flex-shrink:0;">${item.price_display}</div>`:''}
        </div>`).join('');
      return `
        <div style="margin-bottom:${isSpecials?'6mm':'4mm'};page-break-inside:avoid;">
          ${sectionQrHtml}
          <div style="font-size:${isSpecials?'8pt':'7pt'};letter-spacing:.18em;text-transform:uppercase;color:#8a6a2e;font-weight:600;margin-bottom:${isSpecials?'2mm':'1.5mm'};padding-bottom:1mm;border-bottom:0.5pt solid #e8d5a8;">${cat.name}</div>
          ${itemHtml}
        </div>`;
    }).join('');

    return `${footerCss}${showCover?buildCoverHtml():''}<div id="menu-print-root" style="width:${fmtDef.w};min-height:${fmtDef.h};background:#fff;padding:${isSpecials?'12mm':'10mm'};font-family:Georgia,serif;box-sizing:border-box;color:#1a1a18;">
      ${headerHtml}
      <div style="columns:${cols};column-gap:6mm;">${catHtml}</div>
      ${qrFooterHtml}
    </div>`;
  }

  useEffect(()=>{
    if(!previewRef.current) return;
    setTimeout(()=>{
      if(showCover&&coverShowQr){
        const el=document.getElementById('cover-qr');
        if(el&&window.QRCode){el.innerHTML='';new window.QRCode(el,{text:coverQrUrl,width:72,height:72,colorDark:'#1a1a18',colorLight:'#faf8f4'});}
      }
      if(qrOption==='footer'){
        const el=document.getElementById('menu-export-qr');
        if(el&&window.QRCode){el.innerHTML='';new window.QRCode(el,{text:qrUrl,width:60,height:60,colorDark:'#111',colorLight:'#fff'});}
      }
      if(qrOption==='section'){
        cats.filter(c=>selectedCats.has(c.id)).forEach(cat=>{
          const el=document.getElementById('qr-sec-'+cat.id);
          if(el&&window.QRCode){el.innerHTML='';new window.QRCode(el,{text:qrUrl+'?cat='+cat.slug,width:40,height:40,colorDark:'#111',colorLight:'#fff'});}
        });
      }
    },200);
  },[selectedCats,style,fmt,slot,showFooter,showCover,coverShowQr,coverQrUrl,qrOption,qrUrl,title,subtitle,showDate,showBranding,items,cats]);

  function handlePrint(){
    const w=window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><title>${title||'Menu — The Artyst'}</title>
      <style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#fff;}@page{size:${fmtDef.w} ${fmtDef.h};margin:0;}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
      </head><body>${buildMenuHtml()}</body></html>`);
    w.document.close();
    const doQr=()=>{
      if(qrOption==='footer'){const el=w.document.getElementById('menu-export-qr');if(el&&w.QRCode)new w.QRCode(el,{text:qrUrl,width:60,height:60});}
      if(qrOption==='section'){cats.filter(c=>selectedCats.has(c.id)).forEach(cat=>{const el=w.document.getElementById('qr-sec-'+cat.id);if(el&&w.QRCode)new w.QRCode(el,{text:qrUrl+'?cat='+cat.slug,width:40,height:40});});}
    };
    setTimeout(()=>{doQr();setTimeout(()=>w.print(),qrOption!=='none'?600:0);},300);
  }

  async function handleDownload(){
    setExporting(true);
    const node=previewRef.current?.querySelector('#menu-print-root');
    if(!node||!window.html2canvas){setExporting(false);return;}
    try{
      const canvas=await window.html2canvas(node,{scale:2,useCORS:true,backgroundColor:'#fff'});
      const a=document.createElement('a');
      a.download=`${(title||'artyst-menu').toLowerCase().replace(/\s+/g,'-')}.png`;
      a.href=canvas.toDataURL('image/png');
      a.click();
    }catch(e){console.error(e);}
    setExporting(false);
  }

  function handleCopyHtml(){
    navigator.clipboard.writeText(buildMenuHtml()).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  }

  if(loading) return <div style={{padding:'2rem',color:'#666',textAlign:'center'}}>Loading menu data…</div>;

  return(
    <div style={{display:'grid',gridTemplateColumns:'290px 1fr',gap:'1.5rem',alignItems:'start'}}>
      <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>

        <div className="card">
          <h2>Categories</h2>
          <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap',marginBottom:'.8rem'}}>
            {[['Café','cafe'],['Bar','bar'],['To-Go','takeout']].map(([lbl,side])=>(
              <button key={side} className="btn btn-secondary btn-small" onClick={()=>selectSide(side)}>{lbl}</button>
            ))}
            <button className="btn btn-secondary btn-small" onClick={selectAll}>All</button>
            <button className="btn btn-secondary btn-small" onClick={selectNone}>None</button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'.25rem',maxHeight:'200px',overflowY:'auto'}}>
            {cats.map(cat=>(
              <label key={cat.id} style={{display:'flex',alignItems:'center',gap:'.5rem',cursor:'pointer',fontSize:'.83rem',padding:'.15rem 0'}}>
                <input type="checkbox" checked={selectedCats.has(cat.id)} onChange={()=>toggleCat(cat.id)} style={{accentColor:'#c0392b'}}/>
                <span style={{flex:1}}>{cat.name}</span>
                <span style={{fontSize:'.7rem',color:'#555'}}>{items.filter(i=>i.category_id===cat.id).length}</span>
              </label>
            ))}
          </div>
        </div>

        <div className="card">
          <h2>Time of Day</h2>
          <div style={{display:'flex',flexDirection:'column',gap:'.3rem'}}>
            {MENU_SLOTS.map(s=>(
              <div key={s.id} onClick={()=>setSlot(s.id)}
                style={{padding:'.4rem .6rem',borderRadius:'3px',border:'1.5px solid '+(slot===s.id?'#c0392b':'#2a2a2a'),background:slot===s.id?'#1a0808':'none',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:'.83rem',fontWeight:slot===s.id?700:400,color:slot===s.id?'#c8a96e':'#ccc'}}>{s.label}</span>
                <span style={{fontSize:'.7rem',color:'#555'}}>{s.desc}</span>
              </div>
            ))}
          </div>
        </div>
          <div style={{display:'flex',flexDirection:'column',gap:'.35rem'}}>
            {MENU_STYLES.map(s=>(
              <div key={s.id} onClick={()=>setStyle(s.id)}
                style={{padding:'.45rem .6rem',borderRadius:'3px',border:'1.5px solid '+(style===s.id?'#c0392b':'#2a2a2a'),background:style===s.id?'#1a0808':'none',cursor:'pointer'}}>
                <div style={{fontSize:'.82rem',fontWeight:style===s.id?700:400,color:style===s.id?'#c8a96e':'#ccc'}}>{s.label}</div>
                <div style={{fontSize:'.7rem',color:'#555',marginTop:'.1rem'}}>{s.desc}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="card">
          <h2>Format</h2>
          <select value={fmt} onChange={e=>setFmt(e.target.value)} style={{width:'100%',padding:'.4rem .6rem',background:'var(--bg-raised)',border:'1px solid #333',color:'var(--text-1)',borderRadius:'3px',fontSize:'.83rem'}}>
            {MENU_FORMATS.map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
          </select>
        </div>

        <div className="card">
          <h2>Header</h2>
          <div style={{display:'flex',flexDirection:'column',gap:'.55rem'}}>
            <div>
              <label style={{fontSize:'.72rem',letterSpacing:'.08em',textTransform:'uppercase',color:'#888',display:'block',marginBottom:'.25rem'}}>Title</label>
              <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Lunch Menu" style={{width:'100%',padding:'.4rem .6rem',background:'var(--bg-raised)',border:'1px solid #333',color:'var(--text-1)',borderRadius:'3px',fontSize:'.83rem'}}/>
            </div>
            <div>
              <label style={{fontSize:'.72rem',letterSpacing:'.08em',textTransform:'uppercase',color:'#888',display:'block',marginBottom:'.25rem'}}>Subtitle</label>
              <input value={subtitle} onChange={e=>setSubtitle(e.target.value)} placeholder="e.g. Available 12–2pm" style={{width:'100%',padding:'.4rem .6rem',background:'var(--bg-raised)',border:'1px solid #333',color:'var(--text-1)',borderRadius:'3px',fontSize:'.83rem'}}/>
            </div>
            <label style={{display:'flex',alignItems:'center',gap:'.5rem',cursor:'pointer',fontSize:'.83rem'}}>
              <input type="checkbox" checked={showDate} onChange={e=>setShowDate(e.target.checked)} style={{accentColor:'#c0392b'}}/>Show today's date
            </label>
            <label style={{display:'flex',alignItems:'center',gap:'.5rem',cursor:'pointer',fontSize:'.83rem'}}>
              <input type="checkbox" checked={showBranding} onChange={e=>setShowBranding(e.target.checked)} style={{accentColor:'#c0392b'}}/>Show Artyst branding
            </label>
            <label style={{display:'flex',alignItems:'center',gap:'.5rem',cursor:'pointer',fontSize:'.83rem'}}>
              <input type="checkbox" checked={showFooter} onChange={e=>setShowFooter(e.target.checked)} style={{accentColor:'#c0392b'}}/>Page footers (venue · title · page number)
            </label>
          </div>
        </div>

        <div className="card">
          <h2 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>Cover Page</span>
            <label style={{display:'flex',alignItems:'center',gap:'.4rem',cursor:'pointer',fontSize:'.78rem',fontWeight:400,color:'#888'}}>
              <input type="checkbox" checked={showCover} onChange={e=>setShowCover(e.target.checked)} style={{accentColor:'#c0392b'}}/>Include
            </label>
          </h2>
          {showCover&&(
            <div style={{display:'flex',flexDirection:'column',gap:'.55rem'}}>
              <div>
                <label style={{fontSize:'.72rem',letterSpacing:'.08em',textTransform:'uppercase',color:'#888',display:'block',marginBottom:'.25rem'}}>Venue name</label>
                <input value={coverTitle} onChange={e=>setCoverTitle(e.target.value)} style={{width:'100%',padding:'.4rem .6rem',background:'var(--bg-raised)',border:'1px solid #333',color:'var(--text-1)',borderRadius:'3px',fontSize:'.83rem'}}/>
              </div>
              <div>
                <label style={{fontSize:'.72rem',letterSpacing:'.08em',textTransform:'uppercase',color:'#888',display:'block',marginBottom:'.25rem'}}>Subtitle line</label>
                <input value={coverSubtitle} onChange={e=>setCoverSubtitle(e.target.value)} placeholder="e.g. Café · Bar · Culture" style={{width:'100%',padding:'.4rem .6rem',background:'var(--bg-raised)',border:'1px solid #333',color:'var(--text-1)',borderRadius:'3px',fontSize:'.83rem'}}/>
              </div>
              <div>
                <label style={{fontSize:'.72rem',letterSpacing:'.08em',textTransform:'uppercase',color:'#888',display:'block',marginBottom:'.25rem'}}>Tagline (italic quote)</label>
                <textarea value={coverTagline} onChange={e=>setCoverTagline(e.target.value)} rows={3} style={{width:'100%',padding:'.4rem .6rem',background:'var(--bg-raised)',border:'1px solid #333',color:'var(--text-1)',borderRadius:'3px',fontSize:'.78rem',resize:'vertical'}}/>
              </div>
              <div>
                <label style={{fontSize:'.72rem',letterSpacing:'.08em',textTransform:'uppercase',color:'#888',display:'block',marginBottom:'.25rem'}}>Details (one per line)</label>

                  <input value={coverQrUrl} onChange={e=>setCoverQrUrl(e.target.value)} style={{width:'100%',padding:'.4rem .6rem',background:'var(--bg-raised)',border:'1px solid #333',color:'var(--text-1)',borderRadius:'3px',fontSize:'.78rem'}}/>
                </div>
                <div>
                  <label style={{fontSize:'.72rem',letterSpacing:'.08em',textTransform:'uppercase',color:'#888',display:'block',marginBottom:'.25rem'}}>QR label</label>
                  <input value={coverQrLabel} onChange={e=>setCoverQrLabel(e.target.value)} style={{width:'100%',padding:'.4rem .6rem',background:'var(--bg-raised)',border:'1px solid #333',color:'var(--text-1)',borderRadius:'3px',fontSize:'.83rem'}}/>
                </div>
              </>)}
            </div>
          )}
        </div>
          <div style={{display:'flex',flexDirection:'column',gap:'.35rem',marginBottom:qrOption!=='none'?'.7rem':0}}>
            {[['none','None'],['footer','Footer — one code for the whole menu'],['section','Per section']].map(([val,lbl])=>(
              <label key={val} style={{display:'flex',alignItems:'center',gap:'.5rem',cursor:'pointer',fontSize:'.83rem'}}>
                <input type="radio" name="qropt" checked={qrOption===val} onChange={()=>setQrOption(val)} style={{accentColor:'#c0392b'}}/>
                <span>{lbl}</span>
              </label>
            ))}
          </div>
          {qrOption!=='none'&&(
            <div>
              <label style={{fontSize:'.72rem',letterSpacing:'.08em',textTransform:'uppercase',color:'#888',display:'block',marginBottom:'.25rem'}}>QR destination URL</label>
              <input value={qrUrl} onChange={e=>setQrUrl(e.target.value)} style={{width:'100%',padding:'.4rem .6rem',background:'var(--bg-raised)',border:'1px solid #333',color:'var(--text-1)',borderRadius:'3px',fontSize:'.78rem'}}/>
            </div>
          )}
        </div>

        <div className="card">
          <h2>Export</h2>
          <div style={{display:'flex',flexDirection:'column',gap:'.5rem'}}>
            <button className="btn btn-primary" onClick={handlePrint} style={{justifyContent:'center'}}>🖨 Print / Save as PDF</button>
            <button className="btn btn-secondary" onClick={handleDownload} disabled={exporting} style={{justifyContent:'center'}}>{exporting?'Generating…':'⬇ Download PNG'}</button>
            <button className="btn btn-secondary" onClick={handleCopyHtml} style={{justifyContent:'center'}}>{copied?'✓ Copied!':'＜／＞ Copy HTML'}</button>
          </div>
          <div style={{fontSize:'.7rem',color:'#555',marginTop:'.6rem',lineHeight:1.5}}>PNG works for Instagram, Facebook, WhatsApp, and screen display. HTML can be embedded on theartyst.co.uk.</div>
        </div>

      </div>

      <div>
        <div style={{fontSize:'.72rem',letterSpacing:'.1em',textTransform:'uppercase',color:'#666',marginBottom:'.6rem',display:'flex',justifyContent:'space-between'}}>
          <span>Preview — {fmtDef.label}</span>
          <span style={{color:'#555'}}>{selectedCats.size} of {cats.length} sections · {items.filter(i=>selectedCats.has(i.category_id)&&(slot==='all'||!i.time_slots||!i.time_slots.length||i.time_slots.includes(slot))).length} items</span>
        </div>
        <div ref={previewRef} style={{background:'#e8e8e8',padding:'1rem',borderRadius:'4px',overflow:'auto',maxHeight:'85vh'}}>
          <div dangerouslySetInnerHTML={{__html:buildMenuHtml()}} style={{boxShadow:'0 2px 12px rgba(0,0,0,.2)'}}/>
        </div>
      </div>
    </div>
  );
}

function TabNav({tab,setTab,codes,templates,designs,newApplications,printQueue,isAdmin,showStats,setShowStats}){
  const [descTab,setDescTab]=useState(tab);
  const [seenTabs,setSeenTabs]=useState(new Set());
  const timerRef=useRef(null);

  // Derive active section from current tab
  const activeSection=SECTIONS.find(s=>s.tabs.some(t=>t.id===tab))||SECTIONS[0];

  function selectTab(id){
    setTab(id);
    setDescTab(id);
    if(!seenTabs.has(id)){
      if(timerRef.current) clearTimeout(timerRef.current);
      timerRef.current=setTimeout(()=>{
        setSeenTabs(s=>new Set([...s,id]));
      },4000);
    }
  }

  function selectSection(s){
    // Switch to first visible tab in section
    const first=s.tabs.find(t=>!t.adminOnly||isAdmin);
    if(first) selectTab(first.id);
  }

  const currentTabDef=activeSection.tabs.find(t=>t.id===tab);
  const showDesc=currentTabDef&&descTab===tab&&!seenTabs.has(tab);

  // Dynamic labels
  function tabLabel(t){
    if(t.id==='print') return `Print Queue${printQueue?.length?` (${printQueue.length})`:' '}`.trim();
    if(t.id==='library') return `Library (${codes?.length||0})`;
    if(t.id==='templates') return `Templates (${(templates?.length||0)+(designs?.length||0)})`;
    if(t.id==='applications') return newApplications?`Applications (${newApplications} new)`:'Applications';
    return t.label;
  }

  return(
    <div className="tab-nav no-print">
      <div className="section-row">
        {SECTIONS.map(s=>(
          <button key={s.id}
            className={'section-btn'+(activeSection.id===s.id?' active':'')}
            onClick={()=>selectSection(s)}>
            {s.label}
          </button>
        ))}
        <button className="stats-toggle" onClick={()=>setShowStats(v=>!v)} title="Toggle stats">{showStats?'▾ Stats':'▸ Stats'}</button>
      </div>
      <div className="subtab-row">
        {activeSection.tabs.filter(t=>!t.adminOnly||isAdmin).map(t=>(
          <button key={t.id}
            className={'subtab-btn'+(tab===t.id?' active':'')}
            onClick={()=>selectTab(t.id)}>
            {tabLabel(t)}
          </button>
        ))}
      </div>
      {showDesc&&currentTabDef&&(
        <div className="tab-desc" onClick={()=>setSeenTabs(s=>new Set([...s,tab]))}>
          <span className="tab-desc-section">{activeSection.label} — </span>
          {currentTabDef.desc}
          <span className="tab-desc-dismiss">✕</span>
        </div>
      )}
    </div>
  );
}

function TaskGuide({onSelectTask,open,setOpen}){
  function toggle(){setOpen(o=>!o);}
  return(
    <div className="task-guide no-print">
      <div className="task-guide-header" onClick={toggle}>
        <span className="task-guide-title">What do you want to do?</span>
        <span className={"task-guide-chevron"+(open?' open':'')}>▼</span>
      </div>
      {open&&(
        <div className="task-guide-body">
          {TASKS.map(t=>(
            <div key={t.id} className="task-card" onClick={()=>onSelectTask(t)}>
              <div className="task-card-label">{t.label}</div>
              <div className="task-card-desc">{t.desc}</div>
              <div className="task-card-steps">
                {t.steps.map(s=><span key={s} className="task-step">{s}</span>)}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [authChecked,setAuthChecked]=useState(false);
  const [lightMode,setLightMode]=useState(()=>{
    if(typeof window==='undefined') return true;
    const saved=sessionStorage.getItem('ca022_theme');
    return saved!=='dark';
  });

  useEffect(()=>{
    document.body.classList.toggle('light-mode',lightMode);
    sessionStorage.setItem('ca022_theme',lightMode?'light':'dark');
  },[lightMode]);
  const [tab,setTab]=useState('create');
  const [codes,setCodes]=useState([]);
  const [destinations,setDestinations]=useState([]);
  const [groups,setGroups]=useState([]);
  const [staffList,setStaffList]=useState([]);
  const [distributions,setDistributions]=useState([]);
  const [zones,setZones]=useState([]);
  const [assignments,setAssignments]=useState([]);
  const [scanEvents,setScanEvents]=useState([]);
  const [templates,setTemplates]=useState([]);
  const [designs,setDesigns]=useState([]);
  const [applications,setApplications]=useState([]);
  const [printQueue,setPrintQueue]=useState([]);
  const [distributeCode,setDistributeCode]=useState(null);
  const [menuAnchor,setMenuAnchor]=useState(null);
  const [activeTask,setActiveTask]=useState(null);
  const [guideOpen,setGuideOpen]=useState(false);
  const [showStats,setShowStats]=useState(false);
  const [sortField,setSortField]=useState('created_at');
  const [sortDir,setSortDir]=useState('desc');
  const [newCodeId,setNewCodeId]=useState(null);
  const [eventMetaMap,setEventMetaMap]=useState({});
  const [visitedTabs,setVisitedTabs]=useState([]);
  const [loading,setLoading]=useState(true);

  const isAdmin=user?.role==='admin';

  useEffect(()=>{
    const token=sessionStorage.getItem('ca022_token');
    const stored=sessionStorage.getItem('ca022_user');
    if(token&&stored){
      try{
        const u=JSON.parse(stored);
        fetch('/api/auth?action=verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})})
          .then(r=>{if(r.ok) r.json().then(d=>{setUser(d.user);setAuthChecked(true);});else{sessionStorage.removeItem('ca022_token');sessionStorage.removeItem('ca022_user');setAuthChecked(true);}})
          .catch(()=>{setUser(u);setAuthChecked(true);});
      }catch(e){setAuthChecked(true);}
    }else{setAuthChecked(true);}
  },[]);

  const loadAll=async()=>{
    setLoading(true);
    const[c,dest,g,s,d,z,a,se,tmpl,dsgn,apps]=await Promise.all([supabase('/rest/v1/qr_codes?order=created_at.desc'),supabase('/rest/v1/destinations?order=type.asc,label.asc'),supabase('/rest/v1/distribution_groups?order=name.asc'),supabase('/rest/v1/staff?order=name.asc'),supabase('/rest/v1/distributions?order=created_at.desc&limit=100'),supabase('/rest/v1/screen_zones?order=name.asc'),supabase('/rest/v1/screen_assignments?order=display_order.asc'),supabase('/rest/v1/scan_events?order=scanned_at.desc&limit=500'),supabase('/rest/v1/poster_templates?order=name.asc'),supabase('/rest/v1/poster_designs?order=name.asc'),supabase('/rest/v1/applications?order=submitted_at.desc&limit=200')]);
    setCodes(Array.isArray(c)?c:[]);setDestinations(Array.isArray(dest)?dest:[]);setGroups(Array.isArray(g)?g:[]);setStaffList(Array.isArray(s)?s:[]);setDistributions(Array.isArray(d)?d:[]);setZones(Array.isArray(z)?z:[]);setAssignments(Array.isArray(a)?a:[]);setScanEvents(Array.isArray(se)?se:[]);setTemplates(Array.isArray(tmpl)?tmpl:[]);setDesigns(Array.isArray(dsgn)?dsgn:[]);setApplications(Array.isArray(apps)?apps:[]);setLoading(false);
  }

  useEffect(()=>{if(user) loadAll();},[user]);
  useEffect(()=>{
    if(activeTask) setVisitedTabs(v=>[...new Set([...v,tab])]);
  },[tab]);

  function handleSelectTask(task){
    setGuideOpen(false);
    setTab(task.tab);
    if(task.anchor) setMenuAnchor(task.anchor);
    setActiveTask(task);
    setVisitedTabs([task.tab]);
  }

  function logout(){
    const token=sessionStorage.getItem('ca022_token');
    if(token) fetch('/api/auth',{method:'DELETE',headers:{Authorization:`Bearer ${token}`}});
    sessionStorage.removeItem('ca022_token');sessionStorage.removeItem('ca022_user');setUser(null);
  }

  function addToPrintQueue(code){const enriched={...code,_eventMeta:eventMetaMap[code.id]||null};if(!printQueue.find(c=>c.id===code.id)) setPrintQueue(q=>[...q,enriched]);setTab('print');}
  function handleDistribute(code){setDistributeCode(code);setTab('distribute');}

  const totalScans=codes.reduce((s,c)=>s+c.scan_count,0);
  const activeCodes=codes.filter(c=>c.active).length;
  const warnings=codes.filter(hasDestinationWarning).length;
  const newApplications=applications.filter(a=>a.status==='new').length;

  if(!authChecked) return null;
  if(!user) return <LoginScreen onLogin={u=>setUser(u)}/>;

  return(
    <div className="app">
      <BackToTop/>
      <AdminAssistant/>
      <header>
        <h1>QR Engine — The Artyst</h1>
        <div className="header-user">
          {!isAdmin&&<span style={{fontSize:'.72rem',color:lightMode?'#1a5a8a':'#5aafff',background:lightMode?'#d4e8f8':'#1a2a3a',padding:'.2rem .6rem',borderRadius:'2px'}}>Viewer</span>}
          <span>{user.name}</span>
          <button className="theme-toggle" onClick={()=>setLightMode(m=>!m)} title="Toggle theme">{lightMode?'Dark':'Light'}</button>
          <button className="btn btn-secondary btn-small" onClick={logout}>Sign Out</button>
        </div>
      </header>
      <TaskGuide onSelectTask={handleSelectTask} open={guideOpen} setOpen={setGuideOpen}/>
      {activeTask&&<TaskBanner activeTask={activeTask} tab={tab} visitedTabs={visitedTabs} onDismiss={()=>{setActiveTask(null);setVisitedTabs([]);setNewCodeId(null);}}/>}
      {showStats&&<div className="stats-grid no-print">
        <div className="stat"><div className="number">{codes.length}</div><div className="label">Total Codes</div></div>
        <div className="stat"><div className="number">{activeCodes}</div><div className="label">Active</div></div>
        <div className="stat"><div className="number">{totalScans}</div><div className="label">Total Scans</div></div>
        <div className="stat" style={warnings?{borderColor:'#5a3a1a'}:{}}><div className="number" style={warnings?{color:'#ffaa5a'}:{}}>{warnings}</div><div className="label">Destination Warnings</div></div>
      </div>}
      <TabNav tab={tab} setTab={setTab} codes={codes} templates={templates} designs={designs} newApplications={newApplications} printQueue={printQueue} isAdmin={isAdmin} showStats={showStats} setShowStats={setShowStats}/>
      {loading&&<div className="empty">Loading...</div>}
      {!loading&&<>
        {tab==='library'&&<Library codes={codes} destinations={destinations} onRefresh={loadAll} onAddToPrintQueue={addToPrintQueue} onDistribute={handleDistribute} isAdmin={isAdmin} sortField={sortField} setSortField={setSortField} sortDir={sortDir} setSortDir={setSortDir} newCodeId={newCodeId} activeTask={activeTask}/>}
        {tab==='create'&&isAdmin&&<CreateForm destinations={destinations} onCreate={(id,meta)=>{loadAll();setTab('library');if(id){setNewCodeId(id);if(meta){setEventMetaMap(m=>({...m,[id]:meta}));}}}}/>}
        {tab==='print'&&<PrintQueue queue={printQueue} templates={templates} designs={designs} onRemove={id=>setPrintQueue(q=>q.filter(c=>c.id!==id))} onClear={()=>setPrintQueue([])} onSaved={loadAll}/>}
        {tab==='distribute'&&isAdmin&&<Distribute codes={codes} groups={groups} staffList={staffList} onStaffCreated={loadAll} onDistributed={loadAll} initialCode={distributeCode}/>}
        {tab==='screens'&&<Screens codes={codes} zones={zones} assignments={assignments} onRefresh={loadAll} isAdmin={isAdmin}/>}
        {tab==='menuprint'&&<MenuPrintEditor/>}
        {tab==='groups'&&isAdmin&&<Groups groups={groups} onRefresh={loadAll} isAdmin={isAdmin}/>}
        {tab==='destinations'&&<Destinations destinations={destinations} codes={codes} onRefresh={loadAll} isAdmin={isAdmin}/>}
        {tab==='templates'&&isAdmin&&<Templates templates={templates} designs={designs} codes={codes} onRefresh={loadAll} isAdmin={isAdmin}/>}
        {tab==='history'&&<History distributions={distributions} codes={codes} groups={groups} staff={staffList}/>}
        {tab==='reports'&&<Reports codes={codes} scanEvents={scanEvents}/>}
        {tab==='applications'&&<Applications applications={applications} onRefresh={loadAll}/>}
        {tab==='menu'&&<MenuEditor anchor={menuAnchor} onAnchorUsed={()=>setMenuAnchor(null)} isAdmin={isAdmin}/>}
        {tab==='users'&&isAdmin&&<UsersTab/>}
        {tab==='reviews'&&<ReviewResponder/>}
      </>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
